// ZXingライブラリをフォールバックとして使用（高感度版）
async function tryZXingLibrary(videoElement, statusElement) {
    try {
        console.log('🔄 ZXingライブラリにフォールバック中...');
        if (typeof ZXing === 'undefined') {
            await new Promise(resolve => setTimeout(resolve, 1000));
            if (typeof ZXing === 'undefined') {
                throw new Error('ZXingライブラリが読み込まれていません');
            }
        }
        
        // 【改善版】MediaStreamを取得（最高画質・高感度設定）
        // ※ 毎回権限ダイアログを防ぐため、既存のストリームがあれば再利用
        let stream;
        if (currentStream && currentStream.active) {
            console.log('✅ 既存のカメラストリームを再利用');
            stream = currentStream;
        } else {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { 
                    facingMode: 'environment',
                    width: { ideal: 3840, min: 640 }, // 4K解像度理想値
                    height: { ideal: 2160, min: 480 },
                    frameRate: { ideal: 30, min: 15 }, // フレームレートを安定性重視に調整
                    focusMode: 'continuous', // 連続オートフォーカス
                    exposureMode: 'continuous', // 連続露出調整
                    zoom: 1.0 // ズームなし（デフォルト倍率）
                }
            });
            currentStream = stream; // グローバル変数に保存
        }
        
        videoElement.srcObject = stream;
        await videoElement.play();
        
        // 【改善版】QRコードリーダーを作成（多形式対応・高感度）
        const codeReader = new ZXing.BrowserQRCodeReader();
        
        // 継続的にスキャン
        window.qrScanner = {
            scanning: true,
            stop: () => {
                window.qrScanner.scanning = false;
                stream.getTracks().forEach(track => track.stop());
            },
            destroy: () => {
                window.qrScanner.scanning = false;
                stream.getTracks().forEach(track => track.stop());
            }
        };
        
        const scanLoop = async () => {
            if (!window.qrScanner.scanning) return;
            
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = videoElement.videoWidth;
                canvas.height = videoElement.videoHeight;
                
                // 【改善版】画像品質向上処理
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(videoElement, 0, 0);
                
                // パターン1: 通常スキャン（そのまま）
                let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                let code = await codeReader.decodeFromImageData(imageData).catch(() => null);
                
                if (code && code.text) {
                    console.log('✅ ZXing QR読み取り成功（通常）:', code.text.substring(0, 30) + '...');
                    handleQRScanResult(code.text);
                    return;
                }
                
                // パターン2: コントラスト強調（1.5倍）
                const data1 = imageData.data.slice();
                for (let i = 0; i < data1.length; i += 4) {
                    const avg = (data1[i] + data1[i + 1] + data1[i + 2]) / 3;
                    const val = Math.max(0, Math.min(255, (avg - 128) * 1.5 + 128));
                    data1[i] = data1[i + 1] = data1[i + 2] = val;
                }
                const tempImageData1 = new ImageData(data1, canvas.width, canvas.height);
                code = await codeReader.decodeFromImageData(tempImageData1).catch(() => null);
                
                if (code && code.text) {
                    console.log('✅ ZXing QR読み取り成功（コントラスト1.5）:', code.text.substring(0, 30) + '...');
                    handleQRScanResult(code.text);
                    return;
                }
                
                // パターン2.5: 明るさ増加（濃いQRコード用）
                const dataBright = imageData.data.slice();
                for (let i = 0; i < dataBright.length; i += 4) {
                    const avg = (dataBright[i] + dataBright[i + 1] + dataBright[i + 2]) / 3;
                    const val = Math.min(255, avg * 1.3 + 30); // 明るくする
                    dataBright[i] = dataBright[i + 1] = dataBright[i + 2] = val;
                }
                const tempImageDataBright = new ImageData(dataBright, canvas.width, canvas.height);
                code = await codeReader.decodeFromImageData(tempImageDataBright).catch(() => null);
                
                if (code && code.text) {
                    console.log('✅ ZXing QR読み取り成功（明るさ増加）:', code.text.substring(0, 30) + '...');
                    handleQRScanResult(code.text);
                    return;
                }
                
                // パターン3: コントラスト強調（2.0倍）
                const data2 = imageData.data.slice();
                for (let i = 0; i < data2.length; i += 4) {
                    const avg = (data2[i] + data2[i + 1] + data2[i + 2]) / 3;
                    const val = Math.max(0, Math.min(255, (avg - 128) * 2.0 + 128));
                    data2[i] = data2[i + 1] = data2[i + 2] = val;
                }
                const tempImageData2 = new ImageData(data2, canvas.width, canvas.height);
                code = await codeReader.decodeFromImageData(tempImageData2).catch(() => null);
                
                if (code && code.text) {
                    console.log('✅ ZXing QR読み取り成功（コントラスト2.0）:', code.text.substring(0, 30) + '...');
                    handleQRScanResult(code.text);
                    return;
                }
                
                // パターン4: 二値化（閾値128）
                const data3 = imageData.data.slice();
                for (let i = 0; i < data3.length; i += 4) {
                    const avg = (data3[i] + data3[i + 1] + data3[i + 2]) / 3;
                    const val = avg > 128 ? 255 : 0;
                    data3[i] = data3[i + 1] = data3[i + 2] = val;
                }
                const tempImageData3 = new ImageData(data3, canvas.width, canvas.height);
                code = await codeReader.decodeFromImageData(tempImageData3).catch(() => null);
                
                if (code && code.text) {
                    console.log('✅ ZXing QR読ま取り成功（二値化128）:', code.text.substring(0, 30) + '...');
                    handleQRScanResult(code.text);
                    return;
                }
                
                // パターン4.5: 二値化（閾値100 - 濃いQR用）
                const data3b = imageData.data.slice();
                for (let i = 0; i < data3b.length; i += 4) {
                    const avg = (data3b[i] + data3b[i + 1] + data3b[i + 2]) / 3;
                    const val = avg > 100 ? 255 : 0; // 低い閾値
                    data3b[i] = data3b[i + 1] = data3b[i + 2] = val;
                }
                const tempImageData3b = new ImageData(data3b, canvas.width, canvas.height);
                code = await codeReader.decodeFromImageData(tempImageData3b).catch(() => null);
                
                if (code && code.text) {
                    console.log('✅ ZXing QR読み取り成功（二値化100）:', code.text.substring(0, 30) + '...');
                    handleQRScanResult(code.text);
                    return;
                }
                
                // パターン4.7: 二値化（閾値150 - 薄いQR用）
                const data3c = imageData.data.slice();
                for (let i = 0; i < data3c.length; i += 4) {
                    const avg = (data3c[i] + data3c[i + 1] + data3c[i + 2]) / 3;
                    const val = avg > 150 ? 255 : 0; // 高い閾値
                    data3c[i] = data3c[i + 1] = data3c[i + 2] = val;
                }
                const tempImageData3c = new ImageData(data3c, canvas.width, canvas.height);
                code = await codeReader.decodeFromImageData(tempImageData3c).catch(() => null);
                
                if (code && code.text) {
                    console.log('✅ ZXing QR読み取り成功（二値化150）:', code.text.substring(0, 30) + '...');
                    handleQRScanResult(code.text);
                    return;
                }
                
                // パターン5: 適応的二値化（平均値を閾値に）
                const dataAdaptive = imageData.data.slice();
                let sum = 0, count = 0;
                for (let i = 0; i < dataAdaptive.length; i += 4) {
                    sum += (dataAdaptive[i] + dataAdaptive[i + 1] + dataAdaptive[i + 2]) / 3;
                    count++;
                }
                const avgThreshold = sum / count;
                for (let i = 0; i < dataAdaptive.length; i += 4) {
                    const avg = (dataAdaptive[i] + dataAdaptive[i + 1] + dataAdaptive[i + 2]) / 3;
                    const val = avg > avgThreshold ? 255 : 0;
                    dataAdaptive[i] = dataAdaptive[i + 1] = dataAdaptive[i + 2] = val;
                }
                const tempImageDataAdaptive = new ImageData(dataAdaptive, canvas.width, canvas.height);
                code = await codeReader.decodeFromImageData(tempImageDataAdaptive).catch(() => null);
                
                if (code && code.text) {
                    console.log('✅ ZXing QR読み取り成功（適応的二値化）:', code.text.substring(0, 30) + '...');
                    handleQRScanResult(code.text);
                    return;
                }
                
                // 【追加】中央部分重点スキャン（フォールバック）
                const centerX = Math.floor(canvas.width * 0.2);
                const centerY = Math.floor(canvas.height * 0.2);
                const centerWidth = Math.floor(canvas.width * 0.6);
                const centerHeight = Math.floor(canvas.height * 0.6);
                
                // 中央エリアをコントラスト強調してスキャン
                const centerData = ctx.getImageData(centerX, centerY, centerWidth, centerHeight);
                const cData = centerData.data;
                for (let i = 0; i < cData.length; i += 4) {
                    const avg = (cData[i] + cData[i + 1] + cData[i + 2]) / 3;
                    const val = Math.max(0, Math.min(255, (avg - 128) * 2.0 + 128));
                    cData[i] = cData[i + 1] = cData[i + 2] = val;
                }
                code = await codeReader.decodeFromImageData(centerData).catch(() => null);
                
                if (code && code.text) {
                    console.log('✅ ZXing QR読み取り成功（中央強調）:', code.text.substring(0, 30) + '...');
                    handleQRScanResult(code.text);
                    return;
                }
                
            } catch (e) {
                // QRコードが見つからない場合は正常（ログ出力なし）
            }
            
            // 100ms後に再スキャン（複数パターン処理を確実に実行）
            setTimeout(scanLoop, 100);
        };
        
        scanLoop();
        statusElement.textContent = ''; // メッセージ非表示
        console.log('✅ ZXingライブラリ開始成功');
        return true;
        
    } catch (error) {
        console.error('❌ ZXingライブラリ失敗:', error);
        return false;
    }
}

// QRリーダー停止
async function stopQRReader() {
    // console.log('QRスキャナー停止開始...');
    
    // スキャナーの停止
    if (window.qrScanner) {
        try {
            await window.qrScanner.stop();
            window.qrScanner.destroy();
            window.qrScanner = null;
            // console.log('QrScannerライブラリ停止完了');
        } catch (error) {
            console.error('❌ QRスキャナー停止エラー:', error);
        }
    }
    
    // ビデオストリームは停止せず、再利用のために保持（権限ダイアログ回避）
    const videoElement = document.getElementById('qrReader');
    if (videoElement) {
        // srcObjectは削除するが、currentStreamは保持
        videoElement.srcObject = null;
        console.log('✅ ビデオ要素をクリア（ストリームは保持）');
    }
    
    // ライト状態をリセットし、ストリームを停止してライトを消す
    flashlightEnabled = false;
    const flashlightBtn = document.getElementById('flashlightToggle');
    if (flashlightBtn) {
        flashlightBtn.classList.remove('active');
        flashlightBtn.textContent = '💡';
    }
    
    // ストリームを完全に停止してライトを消す
    if (currentStream) {
        try {
            currentStream.getTracks().forEach(track => {
                track.stop();
                console.log('✅ トラック停止（ライトオフ）:', track.kind);
            });
            currentStream = null;
        } catch (e) {
            console.warn('⚠️ ストリーム停止エラー:', e);
        }
    }
    
    // モーダルを閉じる
    const qrReaderModal = document.getElementById('qrReaderModal');
    qrReaderModal.style.display = 'none';
    
    // console.log('QRスキャナー停止完了');
}

// QRコード読み取り結果の処理
function handleQRScanResult(result) {
    try {
        console.log('🔍 QRスキャン結果受信:', result);
        
        // モーダルが表示されているかチェック
        const qrReaderModal = document.getElementById('qrReaderModal');
        if (!qrReaderModal || qrReaderModal.style.display !== 'flex') {
            console.log('⚠️ QRスキャナーモーダルが非表示のため、読み取りを無視');
            return;
        }
        
        if (!result || typeof result !== 'string') {
            console.error('❌ 無効なQRコードデータ:', result);
            alert('❌ 無効なQRコードデータです\n読み取り結果: ' + String(result));
            stopQRReader(); // エラー時はライトを消して停止
            return;
        }
        
        // QRコード読み取り成功 - まずライトを消す
        if (flashlightEnabled && currentStream) {
            const track = currentStream.getVideoTracks()[0];
            if (track && track.getCapabilities().torch) {
                track.applyConstraints({
                    advanced: [{ torch: false }]
                }).then(() => {
                    flashlightEnabled = false;
                    const flashlightBtn = document.getElementById('flashlightToggle');
                    if (flashlightBtn) {
                        flashlightBtn.classList.remove('active');
                        flashlightBtn.textContent = '💡';
                    }
                    console.log('✅ QR読み取り成功後にライトを消灯');
                }).catch(e => console.warn('⚠️ ライト消灯失敗:', e));
            }
        }
        
        // データの前後の空白をトリム
        result = result.trim();
        console.log('📋 処理対象データ:', result, '（長さ:' + result.length + '桁）');
        
        // STAMP形式のQRコードかチェック（STAMP-type-timestamp）
        if (result.startsWith('STAMP-')) {
            console.log('✅ STAMPコレクションQRコード検出:', result);
            
            // モーダルを閉じる
            const modal = document.getElementById('qrReaderModal');
            if (modal) {
                modal.style.display = 'none';
            }
            
            // QR読み取り成功音を再生
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.playSound) {
                window.webkit.messageHandlers.playSound.postMessage({ type: 'success' });
            }
            
            // STAMP-type-timestamp から情報を抽出
            const parts = result.split('-');
            if (parts.length === 3) {
                const type = parts[1];
                const timestamp = parts[2];
                
                // STAMPセクションを表示
                showSection('stamp');
                
                // 選択されたSTAMPタイプを設定
                selectedStampPrintType = type;
                
                // プレビューを表示
                const title = type === 'stamp_frame' ? 'STAMP用紙（枠有）印刷' :
                             type === 'stamp_noframe' ? 'STAMP用紙 印刷' :
                             type === 'memo_frame' ? 'メモ用紙（枠有）印刷' :
                             'メモ用紙 印刷';
                
                showStampPreview(title);
                
                console.log('📋 STAMP QR復元完了 - タイプ:', type, 'タイムスタンプ:', timestamp);
            } else {
                console.error('❌ 無効なSTAMP QRコード形式:', result);
                alert('❌ 無効なSTAMP QRコード形式です');
                stopQRReader();
            }
            return;
        }
        
        // 管理番号かチェック（TOKIで始まる16桁）
        if (!result.startsWith('TOKI')) {
            console.warn('⚠️ 外部QRコード検出:', result);
            // QR読み取りエラー音を再生
            console.log('🔊 エラー音再生要求（外部QRコード）');
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.playSound) {
                window.webkit.messageHandlers.playSound.postMessage({ type: 'error' });
                console.log('✅ エラー音メッセージ送信完了');
            } else {
                console.error('❌ playSound messageHandlerが利用できません');
            }
            alert('⚠️ このアプリで生成されたQRコードではありません\n\n読み取った内容:\n' + result + '\n\nアプリ内で印刷したQRコードをスキャンしてください。');
            stopQRReader(); // エラー時のみ停止
            return;
        }
        
        if (result.length !== 16) {
            console.error('❌ 無効な管理番号の長さ:', result, 'length:', result.length);
            // QR読み取りエラー音を再生
            console.log('🔊 エラー音再生要求（無効な管理番号の長さ）');
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.playSound) {
                window.webkit.messageHandlers.playSound.postMessage({ type: 'error' });
                console.log('✅ エラー音メッセージ送信完了');
            } else {
                console.error('❌ playSound messageHandlerが利用できません');
            }
            alert('❌ 無効な管理番号です\n\n読み取った内容:\n' + result + '\n\n長さ: ' + result.length + '桁\n（正しくは16桁である必要があります）');
            stopQRReader(); // エラー時のみ停止
            return;
        }
        
        console.log('✅ 有効な管理番号を検出:', result);
        
        // モーダルを閉じる（スキャナーは継続）
        const modal = document.getElementById('qrReaderModal');
        if (modal) {
            modal.style.display = 'none';
        }
        
        // QR読み取り成功音を再生
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.playSound) {
            window.webkit.messageHandlers.playSound.postMessage({ type: 'success' });
        }
        
        // 履歴から復元（視覚的フィードバックなしでシンプルに）
        restoreFromManagementId(result);
        
    } catch (error) {
        console.error('❌ QRコード解析エラー:', error);
        alert('❌ QRコード解析に失敗しました\n\nエラー詳細:\n' + error.message + '\n\n再度お試しください。');
        stopQRReader();
    }
}

// 管理番号からコンテンツを復元

    try {
        // 履歴から管理番号で対象アイテムを検索
        const historyList = await getAllHistory();
        
        if (historyList.length === 0) {

            item.managementId === managementId
        );

                return;
            }
            
            // 復元実行（静かに処理、ポップアップなし）

            // QR読み取りエラー音を再生

            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.playSound) {
                window.webkit.messageHandlers.playSound.postMessage({ type: 'error' });
                console.log('✅ エラー音メッセージ送信完了');
            } else {
                console.error('❌ playSound messageHandlerが利用できません');
            }
            
            // より詳細なエラー情報
            const tokiItems = historyList.filter(item =>

// === T's券機能 ===
let selectedTicketTemplate = '1';
let ticketLogoMode = 'logo'; // 'logo' or 'text'
let ticketUploadedTemplates = [];
let selectedTicketIllustration = null;
const TICKET_TEMPLATE_SLOT_COUNT = 9;
const TICKET_CREDIT_MAX_LENGTH = 23;
const TICKET_CREDIT_URL_MAX_LENGTH = 120;

function clampTicketTemplateIndex(value) {
    const parsed = parseInt(value, 10);
    if (!Number.isFinite(parsed)) {
        return 0;
    }
    return Math.max(0, Math.min(TICKET_TEMPLATE_SLOT_COUNT - 1, parsed - 1));
}

function normalizeTicketTemplateEntry(entry, fallbackName = 'デフォルト') {
    if (!entry || typeof entry !== 'object') {
        return null;
    }

    const imageData = typeof entry.imageData === 'string' ? entry.imageData.trim() : '';
    if (!imageData) {
        return null;
    }

    const name = limitTicketText(entry.name || fallbackName, 30) || fallbackName;
    const credit = limitTicketText(entry.credit || '', TICKET_CREDIT_MAX_LENGTH);
    const creditUrl = toHalfWidthUrl(entry.creditUrl || '').trim().slice(0, TICKET_CREDIT_URL_MAX_LENGTH);

    return {
        name,
        imageData,
        credit,
        creditUrl,
        logoMode: entry.logoMode === 'text' ? 'text' : 'logo'
    };
}

function normalizeTicketTemplates(rawTemplates) {
    const normalized = new Array(TICKET_TEMPLATE_SLOT_COUNT).fill(null);
    if (!Array.isArray(rawTemplates)) {
        return normalized;
    }

    const length = Math.min(rawTemplates.length, TICKET_TEMPLATE_SLOT_COUNT);
    for (let index = 0; index < length; index += 1) {
        normalized[index] = normalizeTicketTemplateEntry(rawTemplates[index], `テンプレート${index + 1}`);
    }
    return normalized;
}

function saveTicketUploadedTemplates() {
    try {
        localStorage.setItem('ticketUploadedTemplates', JSON.stringify(ticketUploadedTemplates));
    } catch (error) {
        console.warn('ticketUploadedTemplatesの保存に失敗:', error);
    }
}

function getSelectedTicketSlotIndex() {
    const slotSelect = document.getElementById('ticketTemplateSlotSelect');
    const fallbackValue = selectedTicketTemplate || '1';
    const value = slotSelect?.value || fallbackValue;
    return clampTicketTemplateIndex(value);
}

function readFileAsDataUrl(file) {
    return new Promise((resolve, reject) => {
        if (!file) {
            reject(new Error('ファイルが指定されていません'));
            return;
        }

        const reader = new FileReader();
        reader.onload = () => {
            const result = typeof reader.result === 'string' ? reader.result : '';
            if (!result) {
                reject(new Error('画像データの読込に失敗しました'));
                return;
            }
            resolve(result);
        };
        reader.onerror = () => reject(new Error('画像データの読込に失敗しました'));
        reader.readAsDataURL(file);
    });
}

async function handleTicketTemplateUploadChange(event) {

function limitTicketText(text, maxLen = 23) {
    if (!text) return '';
    return String(text).trim().slice(0, maxLen);
}

// URL文字列を保持（全角文字も許可）
function toHalfWidthUrl(text) {
    if (!text) return '';
    return String(text);
}

// URLの30文字改行処理
function splitUrlLines(url, maxLen = 30) {
    if (!url) return [];
    const lines = [];
    let currentLine = '';
    for (let i = 0; i < url.length; i++) {
        currentLine += url[i];
        if (currentLine.length >= maxLen && i < url.length - 1) {
            lines.push(currentLine);
            currentLine = '';
        }
    }
    if (currentLine) lines.push(currentLine);
    return lines;
}

function applyThermalMonochrome(imageData, width, height, options = {}) {
    if (!imageData || width <= 0 || height <= 0) return;
    const data = imageData.data;
    const palette = (options.palette && options.palette.length)
        ? options.palette.slice().sort((a, b) => a - b)
        : [0, 96, 160, 208, 255];
    const gamma = typeof options.gamma === 'number' ? options.gamma : 0.92;
    const exposure = typeof options.exposure === 'number' ? options.exposure : 1;
    const ditherMode = options.ditherMode || 'floyd';

    const grayBuffer = new Float32Array(width * height);
    for (let i = 0, p = 0; i < data.length; i += 4, p++) {
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];
        const normalized = Math.max(0, Math.min(1, (0.299 * r + 0.587 * g + 0.114 * b) / 255));
        const boosted = Math.max(0, Math.min(1, normalized * exposure));
        grayBuffer[p] = Math.pow(boosted, gamma) * 255;
    }

    if (ditherMode === 'bayer4') {
        const thresholdMap = [
            [0, 8, 2, 10],
            [12, 4, 14, 6],
            [3, 11, 1, 9],
            [15, 7, 13, 5]
        ];
        const steps = palette.length - 1;
        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                const idx = y * width + x;
                const normalized = Math.max(0, Math.min(1, grayBuffer[idx] / 255));
                const level = normalized * steps;
                const base = Math.floor(level);
                const frac = level - base;
                const threshold = (thresholdMap[y & 3][x & 3] + 0.5) / 16;
                const finalLevel = Math.min(
                    steps,
                    frac > threshold ? base + 1 : base
                );
                grayBuffer[idx] = palette[finalLevel];
            }
        }
    } else {
        const nearest = (value) => {
            let candidate = palette[0];
            let minDiff = Math.abs(value - candidate);
            for (let i = 1; i < palette.length; i++) {
                const diff = Math.abs(value - palette[i]);
                if (diff < minDiff) {
                    minDiff = diff;
                    candidate = palette[i];
                }
            }
            return candidate;
        };

        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                const idx = y * width + x;
                const oldPixel = grayBuffer[idx];
                const newPixel = nearest(oldPixel);
                grayBuffer[idx] = newPixel;
                const error = oldPixel - newPixel;

                if (x + 1 < width) grayBuffer[idx + 1] += error * 7 / 16;
                if (y + 1 < height) {
                    if (x > 0) grayBuffer[idx + width - 1] += error * 3 / 16;
                    grayBuffer[idx + width] += error * 5 / 16;
                    if (x + 1 < width) grayBuffer[idx + width + 1] += error * 1 / 16;
                }
            }
        }
    }

    for (let i = 0, p = 0; i < data.length; i += 4, p++) {
        const gray = Math.max(0, Math.min(255, grayBuffer[p]));
        data[i] = data[i + 1] = data[i + 2] = gray;
    }
}

function drawCrispQRCode(ctx, qrCanvas, x, y, size) {
    if (!ctx || !qrCanvas) return;
    const previousSmoothing = typeof ctx.imageSmoothingEnabled === 'boolean'
        ? ctx.imageSmoothingEnabled
        : true;
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(qrCanvas, x, y, size, size);
    const qrData = ctx.getImageData(x, y, size, size);
    const buffer = qrData.data;
    for (let i = 0; i < buffer.length; i += 4) {
        const value = buffer[i] < 128 ? 0 : 255;
        buffer[i] = buffer[i + 1] = buffer[i + 2] = value;
        buffer[i + 3] = 255;
    }
    ctx.putImageData(qrData, x, y);
    ctx.imageSmoothingEnabled = previousSmoothing;
}

function toFullWidthNumber(num, digits = 3) {
    const padded = String(num).padStart(digits, '0');
    return padded.replace(/[0-9]/g, s => String.fromCharCode(s.charCodeAt(0) + 0xFEE0));
}

function toFullWidthDate(now) {
    const y = toFullWidthNumber(now.getFullYear(), 4);
    const m = toFullWidthNumber(now.getMonth() + 1, 2);
    const d = toFullWidthNumber(now.getDate(), 2);
    return `${y}年${m}月${d}日`;
}

function fromFullWidthNumber(value) {
    if (value === undefined || value === null) return null;
    const normalized = String(value).replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
    const digits = normalized.replace(/[^0-9]/g, '');
    return digits ? parseInt(digits, 10) : null;
}

function normalizeRandomIssue(value) {
    const numeric = fromFullWidthNumber(value);
    if (numeric === null || Number.isNaN(numeric)) return null;
    return toFullWidthNumber(numeric % 1000, 3);
}

function loadImageAsync(src, options = {}) {
    return new Promise((resolve, reject) => {
        if (!src) {
            reject(new Error('画像ソースが空です'));
            return;
        }

        const resolvedSrc = (() => {
            try {
                if (/^(data:|blob:|https?:|file:)/i.test(src)) {
                    return src;
                }
                return new URL(src, window.location.href).href;
            } catch (_) {
                return src;
            }
        })();

        const img = new Image();
        const allowCrossOrigin = options.crossOrigin === true || /^https?:/i.test(resolvedSrc);
        if (allowCrossOrigin) {
            img.crossOrigin = 'anonymous';
        }
        img.onload = () => {
            const width = img.naturalWidth || img.width || 0;
            const height = img.naturalHeight || img.height || 0;
            if (width <= 0 || height <= 0) {
                reject(new Error('画像サイズが不正です'));
                return;
            }
            resolve(img);
        };
        img.onerror = () => reject(new Error(`画像の読み込みに失敗しました: ${resolvedSrc}`));
        img.src = resolvedSrc;
    });
}

function updateTicketGridThumbnails() {
    const grid = document.getElementById('ticketTemplateGrid');
    if (!grid) return;

    ticketUploadedTemplates = normalizeTicketTemplates(ticketUploadedTemplates);
    const selectedIndex = clampTicketTemplateIndex(selectedTicketTemplate);
    selectedTicketTemplate = String(selectedIndex + 1);

    grid.innerHTML = '';

    const visibleTemplates = [];
    for (let idx = 0; idx < TICKET_TEMPLATE_SLOT_COUNT; idx += 1) {
        const tpl = normalizeTicketTemplateEntry(ticketUploadedTemplates[idx], `テンプレート${idx + 1}`);
        if (tpl && tpl.imageData) {
            visibleTemplates.push({ idx, tpl, isFallback: false });
        } else if (idx === selectedIndex) {
            visibleTemplates.push({
                idx,
                tpl: {
                    name: `テンプレート${idx + 1}`,
                    imageData: '1.png',
                    credit: '',
                    creditUrl: '',
                    logoMode: 'logo'
                },
                isFallback: true
            });
        }
    }

    if (visibleTemplates.length === 0) {
        visibleTemplates.push({
            idx: selectedIndex,
            tpl: {
                name: `テンプレート${selectedIndex + 1}`,
                imageData: '1.png',
                credit: '',
                creditUrl: '',
                logoMode: 'logo'
            },
            isFallback: true
        });
    }

    visibleTemplates.sort((a, b) => a.idx - b.idx);

    visibleTemplates.forEach(({ idx, tpl, isFallback }) => {
        const slotNumber = idx + 1;
        const btn = document.createElement('button');
        btn.className = 'ticket-template-btn';
        btn.dataset.template = String(slotNumber);
        btn.dataset.logomode = 'logo';
        btn.setAttribute('aria-label', `テンプレート${slotNumber}`);

        btn.style.backgroundImage = `url(${tpl.imageData || '1.png'})`;
        btn.style.backgroundSize = 'cover';
        btn.style.backgroundPosition = 'center';
        btn.style.backgroundRepeat = 'no-repeat';
        btn.style.backgroundColor = '#fff';
        btn.textContent = '';

        if (isFallback) {
            btn.title = `テンプレート${slotNumber}番は未登録です。上部の「画像選択」から設定してください。`;
        }

        if (idx === selectedIndex) {
            btn.classList.add('selected');
        }

        btn.addEventListener('click', () => {
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.playSound) {
                window.webkit.messageHandlers.playSound.postMessage({});
            }

            restoredTicketPreviewContext = null;
            document.querySelectorAll('.ticket-template-btn').forEach(b => {
                b.classList.remove('selected');
                b.blur();
                b.style.transform = '';
                b.style.boxShadow = '';
            });

            btn.classList.add('selected');
            selectedTicketTemplate = btn.dataset.template;

            const slotSelect = document.getElementById('ticketTemplateSlotSelect');
            if (slotSelect) {
                slotSelect.value = selectedTicketTemplate;
            }

            ticketLogoMode = 'logo';
            selectedTicketIllustration = resolveTicketIllustration(selectedTicketTemplate);

            renderTicketPreview();

            if (ticketPrintOptions) {
                ticketPrintOptions.style.display = 'flex';
            }

            updateTicketPrintButtonState();
            updateTicketLogoChips();
        });

        grid.appendChild(btn);
    });

    const slotSelect = document.getElementById('ticketTemplateSlotSelect');
    if (slotSelect) {
        slotSelect.value = selectedTicketTemplate;
    }
}

async function buildTicketImage({
    serialNumber,
    includeDateTime,
    includeQR,
    logoMode,
    illustrationSrc,
    illustrationName,
    illustrationCredit = '',
    illustrationCreditUrl = '',
    qrDataString,
    fixedRandomIssue = null,
    fixedTimestamp = null,
    useThermalFilter = true,
    isPreview = false
}) {
    const effectiveLogoMode = (logoMode === 'text') ? 'text' : 'logo';
    const serialText = toFullWidthNumber(serialNumber, 5);
    const now = fixedTimestamp ? new Date(fixedTimestamp) : new Date();
    const mmToPx = 8; // 203dpi（MP-B20仕様）
    const topMargin = Math.round(mmToPx * 2); // 上余白2mm
    const leftMargin = Math.round(mmToPx * 2); // 左余白2mm
    const rightMargin = Math.round(mmToPx * 2); // 右余白2mm
    const bottomMargin = Math.round(mmToPx * 3); // 下余癀3mm
    const canvasWidth = Math.round(48 * mmToPx); // MP-B20最大印刷幅48mm
    const noteLines = ['※長期間保存する場合は、コピー', 'をお取り下さい'];
    const titleText = 'とき T❜s 鉄道部　　　　toki';
    const creditLine = limitTicketText(illustrationCredit);
    const creditUrlLine = toHalfWidthUrl(illustrationCreditUrl); // 全角→半角変換
    const creditLines = [];
    if (creditLine) creditLines.push(`イラスト:${creditLine}`);
    if (creditUrlLine) {
        const urlLines = splitUrlLines(creditUrlLine, 30);
        creditLines.push(...urlLines);
    }

    let logoImg = null;
    try {
        if (effectiveLogoMode === 'logo') {
            const logoCandidates = [
                window.TICKET_LOGO_DATA_URL,
                'toki_railway_logo.png',
                './toki_railway_logo.png',
                'logo/toki_railway_logo.png',
                './logo/toki_railway_logo.png',
                'rogo/toki_railway_logo.png',
                './rogo/toki_railway_logo.png'
            ].filter(Boolean);
            for (const candidate of logoCandidates) {
                try {
                    logoImg = await loadImageAsync(candidate);
                    console.log(`✅ T's券ロゴ読込成功: ${candidate}`);
                    break;
                } catch (err) {
                    console.warn(`⚠️ T's券ロゴ読込失敗: ${candidate}`, err);
                }
            }
            if (!logoImg) {
                console.warn('ロゴ画像が見つからないため、テキストロゴで代替表示します');
            }
        }
    } catch (e) {
        console.warn('ロゴ読み込み失敗:', e);
    }

    let illustImg = null;
    try {
        illustImg = await loadImageAsync(illustrationSrc);
    } catch (e) {
        console.warn('イラスト読み込み失敗、デフォルトを使用:', e);
        illustImg = await loadImageAsync('1.png');
    }

    const canLiftLogoBlock = Boolean(logoImg) && effectiveLogoMode === 'logo';
    const shouldLiftLogoBlock = canLiftLogoBlock && !isPreview;
    const logoLiftPx = shouldLiftLogoBlock ? Math.round(mmToPx * 3) : 0;

    const maxIllustWidth = Math.round((canvasWidth - leftMargin - rightMargin) * 0.80);
    const naturalIllustWidth = illustImg.naturalWidth || illustImg.width || 300;
    const naturalIllustHeight = illustImg.naturalHeight || illustImg.height || 300;
    let illustWidth = Math.min(maxIllustWidth, naturalIllustWidth); // 元画像が小さい場合はそのまま
    let illustHeight = Math.round(illustWidth * (naturalIllustHeight / naturalIllustWidth));
    const maxIllustHeightPx = Math.round(mmToPx * 30); // 3cm上限
    if (illustHeight > maxIllustHeightPx) {
        const heightScale = maxIllustHeightPx / illustHeight;
        illustHeight = maxIllustHeightPx;
        illustWidth = Math.max(1, Math.round(illustWidth * heightScale));
    }
    const logoWidth = Math.min(140, Math.round((canvasWidth - leftMargin - rightMargin) * 0.48));
    const logoHeight = effectiveLogoMode === 'logo' && logoImg
        ? Math.max(70, Math.round((logoImg.naturalHeight || logoImg.height) * (logoWidth / (logoImg.naturalWidth || logoImg.width))))
        : 60;
    const dateBlockHeight = includeDateTime ? 31 : 0;
    const noteBlockHeight = noteLines.length * 26;
    const bottomRightHeight = 23;
    const qrBlockHeight = includeQR ? 115 : 55;
    const creditBlockHeight = creditLines.length ? creditLines.length * 21 + 4 : 0;
    const canvasHeight = Math.round(topMargin + logoHeight + 7 + illustHeight + 12 + creditBlockHeight + 32 + dateBlockHeight + noteBlockHeight + bottomRightHeight + 22 + qrBlockHeight + 8 + bottomMargin);

    const canvas = document.createElement('canvas');
    canvas.width = canvasWidth;
    canvas.height = canvasHeight;
    const ctx = canvas.getContext('2d', { alpha: false });
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, canvasWidth, canvasHeight);
    ctx.fillStyle = '#000000';
    ctx.textBaseline = 'top';
    ctx.textAlign = 'center';

    let yPos = topMargin;

    if (effectiveLogoMode === 'logo' && logoImg) {
        const logoDrawY = shouldLiftLogoBlock ? Math.max(0, yPos - logoLiftPx) : yPos;
        ctx.drawImage(logoImg, leftMargin, logoDrawY, logoWidth, logoHeight);
    } else if (effectiveLogoMode === 'logo') {
        const logoDrawY = shouldLiftLogoBlock ? Math.max(0, yPos - logoLiftPx) : yPos;
        ctx.textAlign = 'left';
        ctx.font = `900 18px ${ROUNDED_THERMAL_FONT_STACK}`;
        ctx.fillText('とき T❜s 鉄道部', leftMargin, logoDrawY + 2);
        ctx.font = `700 15px ${ROUNDED_THERMAL_FONT_STACK}`;
        ctx.fillText('toki', leftMargin, logoDrawY + 28);
    } else {
        ctx.font = `900 24px ${ROUNDED_THERMAL_FONT_STACK}`;
        ctx.textAlign = 'left';
        ctx.fillText('🅃', leftMargin, yPos + 5);
    }

    console.log(`🎫 T's券ロゴモード: requested=${logoMode}, effective=${effectiveLogoMode}, loaded=${Boolean(logoImg)}`);

    ctx.font = `24px ${ROUNDED_THERMAL_FONT_STACK}`;
    ctx.textAlign = 'right';
    const serialBaseY = yPos + 7; // 0.1mm上に調整
    const serialY = shouldLiftLogoBlock ? Math.max(0, serialBaseY - logoLiftPx) : serialBaseY;
    ctx.fillText(`${serialText}`, canvasWidth - rightMargin, serialY);
    ctx.textAlign = 'center';
    yPos += logoHeight + 7;

    const illustX = Math.round((canvasWidth - illustWidth) / 2);

    // サーマルプリンタ側のディザリングが最大限活きるよう、高精度グレースケール＋濃度補正のみを実施
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = illustWidth;
    tempCanvas.height = illustHeight;
    const tempCtx = tempCanvas.getContext('2d', { alpha: false, willReadFrequently: true });
    tempCtx.imageSmoothingEnabled = true;
    tempCtx.imageSmoothingQuality = 'high';
    tempCtx.drawImage(illustImg, 0, 0, illustWidth, illustHeight);
    
    const applyThermalTone = useThermalFilter !== false;
    if (applyThermalTone) {
        const imageData = tempCtx.getImageData(0, 0, illustWidth, illustHeight);
        const pixels = imageData.data;
        const smBoost = typeof isSmS210iPrinterSelected === 'function' && isSmS210iPrinterSelected();
        const toneProfile = smBoost
            ? { contrast: 1.30, brightness: -26, gamma: 0.84 }
            : { contrast: 1.18, brightness: -12, gamma: 0.9 };
        
        for (let i = 0; i < pixels.length; i += 4) {
            const gray = pixels[i] * 0.299 + pixels[i + 1] * 0.587 + pixels[i + 2] * 0.114;
            let adjusted = gray * toneProfile.contrast + toneProfile.brightness;
            adjusted = Math.min(255, Math.max(0, adjusted));
            const normalized = adjusted / 255;
            const gammaCorrected = Math.pow(normalized, toneProfile.gamma);
            const finalValue = Math.round(gammaCorrected * 255);
            pixels[i] = pixels[i + 1] = pixels[i + 2] = finalValue;
            pixels[i + 3] = 255;
        }
        
        tempCtx.putImageData(imageData, 0, 0);
    }
    ctx.drawImage(tempCanvas, illustX, yPos, illustWidth, illustHeight);
    yPos += illustHeight + 12;

    if (creditLines.length) {
        ctx.font = `18px ${ROUNDED_THERMAL_FONT_STACK}`;
        ctx.textAlign = 'center';
        creditLines.forEach(line => {
            ctx.fillText(line, Math.round(canvasWidth / 2), yPos);
            yPos += 21;
        });
        yPos += 4;
    }

    ctx.font = `27px ${ROUNDED_THERMAL_FONT_STACK}`;
    ctx.textAlign = 'left';
    ctx.fillText(titleText, leftMargin, yPos);
    yPos += 32;

    if (includeDateTime) {
        ctx.font = `23px ${ROUNDED_THERMAL_FONT_STACK}`;
        const dateText = toFullWidthDate(now);
        ctx.textAlign = 'right';
        ctx.fillText(dateText, canvasWidth - rightMargin, yPos);
        yPos += 28;
    }

    ctx.font = `22px ${ROUNDED_THERMAL_FONT_STACK}`;
    ctx.textAlign = 'left';
    noteLines.forEach((line, index) => {
        if (index === 0) {
            // 1行目は文字間隔を広げる
            ctx.letterSpacing = '0.08em';
            ctx.fillText(line, leftMargin, yPos);
            ctx.letterSpacing = '0em'; // リセット
        } else {
            ctx.fillText(line, leftMargin, yPos);
        }
        yPos += 24;
    });

    ctx.textAlign = 'right';
    ctx.font = `500 24px ${ROUNDED_THERMAL_FONT_STACK}`;
    const randomIssue = normalizeRandomIssue(fixedRandomIssue) || toFullWidthNumber(Math.floor(Math.random() * 1000), 3);
    ctx.fillText(`０１Ⓣ発行${randomIssue}`, canvasWidth - rightMargin, yPos);
    yPos += 22;
    ctx.textAlign = 'center';

    if (includeQR && qrDataString) {
        const qrCanvas = generateQRCode(qrDataString);
        if (qrCanvas) {
            const qrSize = 115;
            const qrX = 16;
            const qrY = yPos + 8;
            ctx.drawImage(qrCanvas, qrX, qrY, qrSize, qrSize);
            yPos = qrY + qrSize;
        }
    }

    let exportCanvas = canvas;
    let exportHeight = canvasHeight;
    if (isPreview) {
        const previewBottomMarginPx = Math.max(8, Math.round(mmToPx * 2.4)); // 約2mmの余白を確保
        const contentBottom = Math.min(canvasHeight, Math.max(previewBottomMarginPx, Math.round(yPos + previewBottomMarginPx)));
        if (contentBottom < canvasHeight) {
            const trimmedCanvas = document.createElement('canvas');
            trimmedCanvas.width = canvasWidth;
            trimmedCanvas.height = contentBottom;
            const trimmedCtx = trimmedCanvas.getContext('2d');
            trimmedCtx.drawImage(canvas, 0, 0, canvasWidth, contentBottom, 0, 0, canvasWidth, contentBottom);
            exportCanvas = trimmedCanvas;
            exportHeight = contentBottom;
        } else {
            exportHeight = contentBottom;
        }
    }

    const pngDataUrl = exportCanvas.toDataURL('image/png');
    return {
        png: pngDataUrl,
        height: exportHeight,
        serialText,
        randomIssue
    };
}

async function buildTicketPdfBase64(pngDataUrl) {
    const jsPdfApi = window.jspdf && window.jspdf.jsPDF;
    if (!jsPdfApi) {
        throw new Error('jsPDFが利用できません');
    }

    const profile = typeof getThermalPrinterProfile === 'function' ? getThermalPrinterProfile() : null;
    const outputWidthMm = profile && (profile.printableWidthMm || profile.widthMm)
        ? (profile.printableWidthMm || profile.widthMm)
        : 48;

    return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
            try {
                const widthPx = img.naturalWidth || img.width;
                const heightPx = img.naturalHeight || img.height;
                if (!widthPx || !heightPx) {
                    reject(new Error('画像サイズが取得できません'));
                    return;
                }

                const outputHeightMm = Math.max(10, (heightPx / widthPx) * outputWidthMm);
                const pdf = new jsPdfApi({
                    orientation: 'portrait',
                    unit: 'mm',
                    format: [outputWidthMm, outputHeightMm],
                    compress: false
                });

                pdf.internal.pageSize.width = outputWidthMm;
                pdf.internal.pageSize.height = outputHeightMm;
                pdf.addImage(pngDataUrl, 'PNG', 0, 0, outputWidthMm, outputHeightMm, undefined, 'FAST');

                const pdfBase64 = pdf.output('datauristring').split(',')[1];
                if (!pdfBase64) {
                    reject(new Error('PDFの生成に失敗しました'));
                    return;
                }
                resolve(pdfBase64);
            } catch (error) {
                reject(error);
            }
        };
        img.onerror = () => reject(new Error('PDF化対象画像の読み込みに失敗しました'));
        img.src = pngDataUrl;
    });
}

async function executeTicketPrint() {
    const includeDateTime = true; // デザイン仕様に合わせ常に日付あり
    const copies = parseInt(document.getElementById('ticketCopiesSelect').value);
    const includeQR = document.getElementById('ticketQrPrintCheckbox').checked;
    const illustrationSrc = selectedTicketIllustration?.imageData || '1.png';
    const illustrationName = selectedTicketIllustration?.name || 'デフォルト';
    const illustrationCredit = selectedTicketIllustration?.credit || '';
    const illustrationCreditUrl = selectedTicketIllustration?.creditUrl || '';
    const serialNumber = consumeTicketSerial();
    const serialText = toFullWidthNumber(serialNumber, 5);
    const randomIssueForPrint = restoredTicketPreviewContext?.randomIssue || previewRandomIssue || null;

    const historyItem = {
        type: 'ticket',
        mode: 'ticket',
        template: selectedTicketTemplate,
        logoMode: ticketLogoMode,
        serial: serialText,
        illustration: illustrationName,
        illustrationCredit,
        illustrationCreditUrl,
        includeDateTime: includeDateTime,
        copies: copies,
        qrPrinted: includeQR,
        created: Date.now(),
        data: ''
    };

    const qrData = includeQR ? generateQRData(historyItem) : null;
    const applyTicketThermalFilter = !(typeof isSmS210iPrinterSelected === 'function' && isSmS210iPrinterSelected());

    const ticketImage = await buildTicketImage({
        serialNumber,
        includeDateTime,
        includeQR,
        logoMode: ticketLogoMode,
        illustrationSrc,
        illustrationName,
        illustrationCredit,
        illustrationCreditUrl,
        qrDataString: qrData,
        fixedRandomIssue: randomIssueForPrint,
        useThermalFilter: applyTicketThermalFilter
    });

    historyItem.serial = ticketImage?.serialText || historyItem.serial;
    historyItem.randomIssue = randomIssueForPrint || ticketImage?.randomIssue || '';
    historyItem.data = ticketImage.png;
    addHistory(historyItem).then(() => {
        console.log('T\'s券履歴保存完了:', historyItem.managementId);
    });

    console.log(`🎫 T's券印刷開始: 総枚数=${copies}枚`);
    
    // PNG画像をBase64に変換（data:image/png;base64,を除去）
    const pngBase64 = ticketImage.png.split(',')[1];
    const hasNativePrint = Boolean(window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.nativePrint);
    const thisPage = window.location.href;
    let ticketPdfBase64 = null;

    if (!hasNativePrint || copies > 1) {
        try {
            ticketPdfBase64 = await buildTicketPdfBase64(ticketImage.png);
        } catch (error) {
            console.error('❌ T\'s券PDF生成エラー:', error);
            alert('T\'s券の印刷データ生成に失敗しました');
            return;
        }
    }
    
    if (copies > 1) {
        const printJob = {
            type: 'ticket',
            totalCopies: copies,
            currentCopy: 1,
            imageData: pngBase64,
            ticketLogoMode: ticketLogoMode,
            pdfData: ticketPdfBase64,
            thisPage,
            timestamp: Date.now()
        };
        sessionStorage.setItem('printJob', JSON.stringify(printJob));
    }

    // ネイティブは画像直送、WebはURLスキーム(PDF)で印刷
    if (hasNativePrint) {
        console.log('📱 T\'s券をネイティブ印刷: ticket形式');
        window.webkit.messageHandlers.nativePrint.postMessage({
            type: 'ticket',
            data: pngBase64,
            ticketLogoMode: ticketLogoMode
        });
    } else if (ticketPdfBase64) {
        const printUrl = generatePrintUrl(ticketPdfBase64, thisPage);
        console.log('🌐 T\'s券をURLスキーム印刷で実行');
        executePrint(printUrl);
    } else {
        alert('T\'s券印刷データの生成に失敗しました');
    }

    // 印刷完了後、選択画面に戻る
    setTimeout(() => {
        resetTicketPreviewSeeds();
        showTicketSelectScreen();
        updateTicketSerialPreview();
        console.log('✅ T\'s券印刷完了 - 選択画面に戻りました');
    }, 1000);
}

// STAMP用画像データを生成（見本画像1,2,3,4.pngに準拠）
function createStampFont(scale) {
    return (px, weight = 'normal') => {
        const size = Math.max(10, Math.round(px * scale));
        const weightPrefix = weight !== 'normal' ? `${weight} ` : '';
        return `${weightPrefix}${size}px ${ROUNDED_THERMAL_FONT_STACK}`;
    };
}

function getStampOffset(scale) {
    return (value) => Math.round(value * scale);
}

async function buildStampImagePayload({
    type,
    dateStr,
    includeQr = true,
    includeDateTime = true,
    historyMode = false
}) {
    return new Promise((resolve, reject) => {
        try {
            const profile = getThermalPrinterProfile();
            const widthMm = profile.widthMm || 48;
            const mmToPx = profile.mmToPx || (203 / 25.4);
            const heightMm = historyMode ? 160 : 175;
            const widthPx = Math.floor(widthMm * mmToPx);
            let heightPx = Math.floor(heightMm * mmToPx);
            const basePxPerMm = 203 / 25.4;
            const scale = mmToPx / basePxPerMm;
            const offset = getStampOffset(scale);
            const stampFont = createStampFont(scale);
            const receiptLegacyPx = 11.8;
            const receiptDpiScale = mmToPx / receiptLegacyPx;
            const receiptScalePx = (value) => Math.round(value * receiptDpiScale);
            const receiptFooterTextPx = Math.max(12, Math.round(44 * receiptDpiScale));
            const receiptFooterDatePx = Math.max(12, Math.round(60 * receiptDpiScale));
            const receiptDateLineHeight = Math.round(receiptFooterDatePx * 1.2);

            const canvas = document.createElement('canvas');
            canvas.width = widthPx;
            canvas.height = heightPx;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            applyThermalContextDefaults(ctx);

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, widthPx, heightPx);
            ctx.fillStyle = '#000000';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';

            const hasFrame = type.endsWith('_frame');
            const isMemo = type.includes('memo');
            const topMargin = offset(18);
            const sideMargin = offset(18);
            const frameX = sideMargin;
            const frameY = topMargin;
            const frameWidth = widthPx - (sideMargin * 2);
            const frameHeight = offset(historyMode ? 860 : 903);
            const footerLabelGapPx = offset(18);
            const footerLabelY = frameY + frameHeight + footerLabelGapPx;
            const bottomContentStart = footerLabelY + offset(30);
            const referenceImageWidthPx = Math.round(58 * 11.8);
            const referenceScale = referenceImageWidthPx > 0 ? widthPx / referenceImageWidthPx : 1;
            const qrSizePx = includeQr ? Math.max(offset(72), Math.round(180 * referenceScale)) : 0;
            const qrTopGapPx = includeQr ? Math.max(offset(8), Math.round(20 * referenceScale)) : 0;
            const qrPaddingPx = Math.max(offset(3), Math.round(6 * referenceScale));
            const qrLeftPx = Math.max(offset(10), Math.round(30 * referenceScale));
            const dateFontPx = includeDateTime ? Math.max(offset(24), Math.round(60 * referenceScale)) : 0;
            const dateLineHeightPx = includeDateTime ? Math.max(offset(24), Math.round(dateFontPx * 1.2)) : 0;
            const dateExtraOffsetPx = includeDateTime ? Math.max(offset(6), Math.round(20 * referenceScale)) : 0;
            const dateRightShiftPx = includeDateTime ? Math.round(110 * referenceScale) : 0;
            const dateBottomGapPx = includeDateTime ? Math.max(offset(8), Math.round(50 * referenceScale)) : 0;
            const sharedBottomGuardPx = Math.max(offset(6), Math.round(12 * referenceScale)); // 下部余白を2mm削減 (offset 18→6, scale 24→12)
            const estimatedBottomBlock = Math.max(
                includeQr ? qrTopGapPx + qrSizePx : 0,
                includeDateTime ? (dateExtraOffsetPx + (dateLineHeightPx * 2) + dateBottomGapPx) : 0
            ) + sharedBottomGuardPx;
            heightPx = Math.max(heightPx, bottomContentStart + estimatedBottomBlock);

            if (hasFrame) {
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = Math.max(1, offset(1.5));
                ctx.setLineDash([offset(6), offset(3)]);
                ctx.strokeRect(frameX, frameY, frameWidth, frameHeight);
                ctx.setLineDash([]);
            }

            if (isMemo) {
                ctx.font = stampFont(32, 'bold');
                ctx.fillText('メモ(MEMO)', widthPx / 2, frameY + offset(8));
            } else {
                ctx.font = stampFont(32, 'bold');
                ctx.fillText('STAMP', widthPx / 2, frameY + offset(8));
                ctx.font = stampFont(20, 'bold');
                ctx.fillText('チケッター・スタンパー', widthPx / 2, frameY + offset(48));
                ctx.fillText('入鋏印・無効印・下車印', widthPx / 2, frameY + offset(78));
                ctx.font = stampFont(18, 'bold');
                ctx.fillText('その他(スタンプカード用スタンプ)', widthPx / 2, frameY + offset(108));
                ctx.font = stampFont(22, 'bold');
                ctx.fillText('収集用紙', widthPx / 2, frameY + offset(138));
            }

            const roundedFooterFontSize = Math.max(12, Math.round(24 * scale));
            ctx.font = `bold ${roundedFooterFontSize}px "Hiragino Maru Gothic ProN", "Rounded Mplus 1c", "Helvetica Rounded", "MobileKanji", "MS PGothic", "Yu Gothic", sans-serif`;
            ctx.fillText('toki01Ⓣ TPOS T-0001', widthPx / 2, footerLabelY);

            let bottomBlockFloor = bottomContentStart;
            let qrBottom = bottomContentStart;
            let qrCodeCanvas = null;

            if (includeQr) {
                const qrPayload = `STAMP-${type}-${Date.now()}`;
                qrCodeCanvas = generateQRCode(qrPayload);
                if (qrCodeCanvas) {
                    const qrX = qrLeftPx;
                    const qrY = bottomContentStart + qrTopGapPx;
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillRect(qrX - qrPaddingPx, qrY - qrPaddingPx, qrSizePx + qrPaddingPx * 2, qrSizePx + qrPaddingPx * 2);
                    ctx.fillStyle = '#000000';
                    drawCrispQRCode(ctx, qrCodeCanvas, qrX, qrY, qrSizePx);
                    qrBottom = qrY + qrSizePx;
                    bottomBlockFloor = Math.max(bottomBlockFloor, qrBottom);
                }
            }

            if (includeDateTime) {
                const now = dateStr ? new Date(dateStr) : new Date();
                const dateLine = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日`;
                const timeLine = `${now.getHours()}時${now.getMinutes()}分${now.getSeconds()}秒`;
                const isMonthTwoDigits = (now.getMonth() + 1) >= 10;
                const isDayTwoDigits = now.getDate() >= 10;
                const needsSmaller = isMonthTwoDigits && isDayTwoDigits;
                const baseDateFontPx = dateFontPx || Math.max(offset(24), Math.round(60 * referenceScale));
                const adjustedDateFontPx = needsSmaller ? Math.round(baseDateFontPx * 0.85) : baseDateFontPx;
                const lineHeightPx = Math.max(dateLineHeightPx, Math.round(baseDateFontPx * 1.2));
                ctx.imageSmoothingEnabled = true;
                if (typeof ctx.imageSmoothingQuality !== 'undefined') {
                    ctx.imageSmoothingQuality = 'high';
                }
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                const previousFill = ctx.fillStyle;
                ctx.fillStyle = '#000000';
                const dateTimeX = qrCodeCanvas ? Math.round(widthPx / 2) + dateRightShiftPx : Math.round(widthPx / 2);
                let textY = bottomContentStart + dateExtraOffsetPx;
                if (qrCodeCanvas) {
                    textY += dateExtraOffsetPx;
                }
                ctx.font = `${adjustedDateFontPx}px ${ROUNDED_THERMAL_FONT_STACK}`;
                ctx.fillText(dateLine, dateTimeX, textY);
                textY += lineHeightPx;
                ctx.font = `${baseDateFontPx}px ${ROUNDED_THERMAL_FONT_STACK}`;
                ctx.fillText(timeLine, dateTimeX, textY);
                textY += dateBottomGapPx;
                bottomBlockFloor = Math.max(bottomBlockFloor, textY + sharedBottomGuardPx);
                ctx.fillStyle = previousFill;
            } else {
                bottomBlockFloor = Math.max(bottomBlockFloor, qrBottom + sharedBottomGuardPx);
            }

            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';

            const minimumTail = bottomContentStart + offset(25);
            const sharedBottomMarginPx = calculateSharedBottomMargin(includeDateTime, includeQr, mmToPx);
            const trimmedHeightPx = Math.round(
                Math.min(
                    heightPx,
                    Math.max(bottomBlockFloor + sharedBottomMarginPx, minimumTail)
                )
            );
            let exportCanvas = canvas;
            if (trimmedHeightPx < canvas.height) {
                const trimmedCanvas = document.createElement('canvas');
                trimmedCanvas.width = widthPx;
                trimmedCanvas.height = trimmedHeightPx;
                const trimmedCtx = trimmedCanvas.getContext('2d');
                trimmedCtx.drawImage(canvas, 0, 0, widthPx, trimmedHeightPx, 0, 0, widthPx, trimmedHeightPx);
                exportCanvas = trimmedCanvas;
            }

            console.log(`✅ [STAMP] Canvas生成: 幅=${widthPx}px, 高さ=${exportCanvas.height}px, 枠=${frameHeight}px, qr=${includeQr}`);

            resolve(exportCanvas.toDataURL('image/png').split(',')[1]);
        } catch (error) {
            reject(error);
        }
    });
}

// ★★★ プリンター自動判定してSTAMP画像生成
async function generateStampImageData(type, dateStr) {
    const profile = getThermalPrinterProfile();
    console.log('📱 [STAMP] プリンター: ' + profile.name);
    return buildStampImagePayload({ type, dateStr, includeQr: true, includeDateTime: true, historyMode: false });
}

// ★★★ STAMP画像生成（QR・日付なし版）- 履歴保存用
async function generateStampImageDataForHistory(type) {
    return buildStampImagePayload({ type, includeQr: false, includeDateTime: false, historyMode: true });
}

// STAMP選択画面 → プレビュー画面に遷移
function showStampPreview(title) {
    const selectScreen = document.querySelector('.stamp-select-screen');
    const previewScreen = document.querySelector('.stamp-preview-screen');
    const previewFrame = document.getElementById('stampPreviewFrame');
    const previewHeader = document.querySelector('.stamp-preview-header');
    const previewFooter = document.querySelector('.stamp-preview-footer');
    
    console.log('showStampPreview called:', { selectScreen: !!selectScreen, previewScreen: !!previewScreen, previewFrame: !!previewFrame });
    
    if (selectScreen && previewScreen && previewFrame) {
        selectScreen.style.display = 'none';
        previewScreen.style.display = 'flex';
        
        // ヘッダーとフッターを非表示（画像内に含まれているため）
        if (previewHeader) previewHeader.style.display = 'none';
        if (previewFooter) previewFooter.style.display = 'none';
        
        // プレビューフレームをクリア
        previewFrame.innerHTML = '<div style="text-align:center; padding:2rem; color:#999;">プレビュー生成中...</div>';
        
        // 選択されたタイプに応じた画像を生成して表示
        const type = selectedStampPrintType;
        if (type) {
            generateStampImageDataForHistory(type).then(imageData => {
                previewFrame.innerHTML = '';
                const img = new Image();
                img.src = 'data:image/png;base64,' + imageData;
                img.onload = function() {
                    // 以前のレイアウト（1月上旬版）と同じスケール計算に戻す
                    let containerW = window.innerWidth * 0.995;
                    let containerH = window.innerHeight * 0.75;
                    let ratio = Math.min(containerW / img.naturalWidth, containerH / img.naturalHeight, 1);
                    ratio *= STAMP_PREVIEW_SCALE;
                    let displayW = Math.round(img.naturalWidth * ratio);
                    let displayH = Math.round(img.naturalHeight * ratio);
                    img.style.width = displayW + "px";
                    img.style.height = displayH + "px";
                    img.style.maxWidth = "100%";
                    img.style.display = "block";
                    img.style.margin = "0";
                    
                    console.log(`📐 プレビューサイズ計算(旧レイアウト): 元画像=${img.naturalWidth}x${img.naturalHeight}, 表示=${displayW}x${displayH}, ratio=${ratio.toFixed(3)}`);
                };
                previewFrame.appendChild(img);
                console.log(`📄 プレビュー表示完了: ${title}`);
            }).catch(err => {
                console.error('プレビュー生成エラー:', err);
                previewFrame.innerHTML = '<div style="text-align:center; padding:2rem; color:#f44;">プレビュー生成エラー</div>';
            });
        } else {
            console.error('selectedStampPrintType が未設定です');
        }
    } else {
        console.error('Elements not found for showStampPreview');
    }
    updateStampLayoutMode();
}

// プレビュー画面 → 選択画面に戻る
function hideStampPreview() {
    const selectScreen = document.querySelector('.stamp-select-screen');
    const previewScreen = document.querySelector('.stamp-preview-screen');
    const previewHeader = document.querySelector('.stamp-preview-header');
    const previewFooter = document.querySelector('.stamp-preview-footer');
    
    if (selectScreen && previewScreen) {
        previewScreen.style.display = 'none';
        selectScreen.style.display = 'grid';
        
        // ヘッダーとフッターを再表示
        if (previewHeader) previewHeader.style.display = '';
        if (previewFooter) previewFooter.style.display = '';
        
        // 全てのSTAMPボタンのスタイルをリセット（hover状態が残らないようにする）
        const stampButtons = selectScreen.querySelectorAll('.stamp-print-btn');
        stampButtons.forEach(btn => {
            btn.blur(); // フォーカスを外す
            btn.style.background = '';
            btn.style.color = '';
        });
        
        console.log('📋 選択画面に戻りました');
    }
    updateStampLayoutMode();
}

// STAMP印刷実行
function executeStampPrint(type) {
    // ダブルプリント防止：既に印刷中の場合は処理中止
    if (isStampPrinting) {
        console.warn('⚠️ 既に印刷処理中です。二重実行を防止しました');
        return;
    }
    
    // 印刷フラグをON
    isStampPrinting = true;
    
    // 発行ボタンを無効化
    const stampExecuteBtn = document.getElementById('stampExecuteBtn');
    if (stampExecuteBtn) {
        stampExecuteBtn.disabled = true;
        stampExecuteBtn.style.opacity = '0.5';
        stampExecuteBtn.style.cursor = 'not-allowed';
        console.log('🔒 発行ボタンを無効化しました');
    }
    
    // 自動的にQRコードと日付を付与して印刷
    const now = new Date();
    const dateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
    
    const printData = {
        type: type.startsWith('memo') ? 'memo' : 'stamp',
        paperType: type,
        includeQR: true,
        includeDateTime: true,
        dateTime: dateStr
    };
    
    console.log('📄 印刷実行:', printData);
    
    // STAMP用の画像データを生成
    generateStampImageData(type, dateStr).then(imageData => {
        console.log('✅ STAMP画像生成完了: ' + imageData.length + '文字');
        
        // ★★★ 履歴用に別途QR・日付なし画像を生成
        generateStampImageDataForHistory(type).then(historyImageData => {
            console.log('✅ STAMP履歴用画像生成完了');
            
            // ★★★ 履歴にSTAMP収集モードとして保存
            const printTimestamp = Date.now();
            const qrData = `STAMP-${type}-${printTimestamp}`;
            const historyItem = {
                type: 'stamp',  // STAMP収集モード
                mode: 'stamp',
                data: 'data:image/png;base64,' + historyImageData,  // QR・日付なし画像
                dateTime: '日付・時刻なし',
                copies: 1,
                created: printTimestamp,
                timestamp: printTimestamp,
                paperType: type,
                qrPrinted: false,  // QRなし
                managementId: qrData  // QRコードデータを管理番号として保存
            };
            
            addHistory(historyItem).then(() => {
                console.log('✅ STAMP印刷履歴保存完了 (モード: STAMP収集):', historyItem.managementId);
            }).catch(error => {
                console.error('❌ STAMP印刷履歴保存失敗:', error);
            });
        }).catch(error => {
            console.error('❌ STAMP履歴用画像生成エラー:', error);
        });
        
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.printStamp) {
            // ★★★ Swift側のprintStampメソッドを呼び出す（辞書形式）
            const stampRequest = {
                type: type.startsWith('memo') ? 'memo' : 'stamp',
                imageData: 'data:image/png;base64,' + imageData,
                copies: 1
            };
            console.log('📤 SwiftにSTAMP印刷データ送信:', stampRequest);
            window.webkit.messageHandlers.printStamp.postMessage(stampRequest);
            
            // 印刷完了待機（5秒でタイムアウト）→選択画面に戻る
            setTimeout(() => {
                hideStampPreview();
                selectedStampPrintType = null;
                resetStampPrintingState();
                console.log('✅ STAMP印刷完了 - 発行ボタンを再度有効化');
            }, 5000);
        } else {
            console.log('WebKit通信不可 - デモ実行');
            alert(`印刷: ${type}\n日時: ${dateStr}\nQRコード: 自動付与`);
            // デモ時も状態をリセット
            resetStampPrintingState();
        }
    }).catch(error => {
        console.error('❌ STAMP画像生成エラー:', error);
        alert('画像生成に失敗しました');
        resetStampPrintingState();
    });
}

// STAMP印刷状態をリセット
function resetStampPrintingState() {
    isStampPrinting = false;
    const stampExecuteBtn = document.getElementById('stampExecuteBtn');
    if (stampExecuteBtn) {
        stampExecuteBtn.disabled = false;
        stampExecuteBtn.style.opacity = '1';
        stampExecuteBtn.style.cursor = 'pointer';
        console.log('🔓 発行ボタンを再度有効化しました');
    }
}

// DOMContentLoaded時にイベントリスナーを設定
document.addEventListener('DOMContentLoaded', () => {
    // STAMP印刷ボタンのハンドラー
    const stampPrintWithFrameBtn = document.getElementById('stampPrintWithFrameBtn');
    const stampPrintNoFrameBtn = document.getElementById('stampPrintNoFrameBtn');
    const memoPrintWithFrameBtn = document.getElementById('memoPrintWithFrameBtn');
    const memoPrintNoFrameBtn = document.getElementById('memoPrintNoFrameBtn');
    const stampBackBtn = document.getElementById('stampBackBtn');
    const stampExecuteBtn = document.getElementById('stampExecuteBtn');
    
    console.log('STAMP buttons initialized:', { stampPrintWithFrameBtn: !!stampPrintWithFrameBtn, stampBackBtn: !!stampBackBtn, stampExecuteBtn: !!stampExecuteBtn });
    
    // STAMPボタンのタッチ後のhover状態をリセットする関数
    function resetStampButtonStyle(button) {
        if (button) {
            // タッチ後にhover状態が残らないようにフォーカスを外す
            button.blur();
            // 背景色と文字色を明示的にリセット
            button.style.background = '';
            button.style.color = '';
        }
    }
    
    // STAMP用紙（枠有）印刷ボタン - 選択してプレビュー表示
    if (stampPrintWithFrameBtn) {
        stampPrintWithFrameBtn.addEventListener('click', () => {
            console.log('📌 STAMP用紙（枠有）ボタン クリック');
            playTapSound();
            selectedStampPrintType = 'stamp_frame';
            showStampPreview('STAMP用紙（枠有）印刷');
            resetStampButtonStyle(stampPrintWithFrameBtn);
        });
    }
    
    // STAMP用紙印刷ボタン - 選択してプレビュー表示
    if (stampPrintNoFrameBtn) {
        stampPrintNoFrameBtn.addEventListener('click', () => {
            console.log('📌 STAMP用紙 ボタン クリック');
            playTapSound();
            selectedStampPrintType = 'stamp_noframe';
            showStampPreview('STAMP用紙 印刷');
            resetStampButtonStyle(stampPrintNoFrameBtn);
        });
    }
    
    // メモ用紙(枠有)印刷ボタン - 選択してプレビュー表示
    if (memoPrintWithFrameBtn) {
        memoPrintWithFrameBtn.addEventListener('click', () => {
            console.log('📌 メモ用紙(枠有)ボタン クリック');
            playTapSound();
            selectedStampPrintType = 'memo_frame';
            showStampPreview('メモ用紙(枠有)印刷');
            resetStampButtonStyle(memoPrintWithFrameBtn);
        });
    }
    
    // メモ用紙印刷ボタン - 選択してプレビュー表示
    if (memoPrintNoFrameBtn) {
        memoPrintNoFrameBtn.addEventListener('click', () => {
            console.log('📌 メモ用紙ボタン クリック');
            playTapSound();
            selectedStampPrintType = 'memo_noframe';
            showStampPreview('メモ用紙 印刷');
            resetStampButtonStyle(memoPrintNoFrameBtn);
        });
    }
    
    // 戻るボタン - 選択画面に戻る
    if (stampBackBtn) {
        stampBackBtn.addEventListener('click', () => {
            console.log('📌 戻るボタン クリック');
            playTapSound();
            hideStampPreview();
            selectedStampPrintType = null;
        });
    }
    
    // 発行ボタン - 印刷実行
    if (stampExecuteBtn) {
        stampExecuteBtn.addEventListener('click', () => {
            console.log('📌 発行ボタン クリック');
            playTapSound();
            if (selectedStampPrintType) {
                executeStampPrint(selectedStampPrintType);
            }
        });
    }

    // ポップアップの背景クリックで閉じる処理
    const popupOverlays = document.querySelectorAll('.popup-overlay');
    popupOverlays.forEach(overlay => {
        overlay.addEventListener('click', function(e) {
            if (e.target === overlay) {
                overlay.classList.remove('show');
            }
        });
    });
}); // DOMContentLoaded終了
</script>
