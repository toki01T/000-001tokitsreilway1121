            const textDateTime = document.getElementById('textDateTimeChoice');
            const textPrintOptions = document.getElementById('textPrintOptions');
            if (textDateTime) textDateTime.style.display = 'flex';
            if (textPrintOptions) textPrintOptions.style.display = 'flex';

            if (signatureDateTime) signatureDateTime.style.display = 'flex';
            if (signaturePrintOptions) signaturePrintOptions.style.display = 'flex';

    if (mode === 'signature') {
        setTimeout(function(){initSignaturePad();}, 50);
    }
    
    // 【QR復元用】履歴ドロワーのモード選択ボタンを更新
    const historyModeButton = document.getElementById('modeToggleUnified');
    if (historyModeButton) {
        // 現在のモードに応じてボタンテキストを更新（modeNamesを使用）
        setModeToggle(mode);
        console.log('🔵 モード選択ボタンを更新:', historyModeButton.textContent);
    }

function previewImage(event) {
    const input = event?.target;
    const files = input?.files;
    const file = files && files.length > 0 ? files[0] : null;
    const reader = new FileReader();
    reader.onloadend = function() {
        const img = new Image();
        img.src = reader.result;
        img.onload = function() {
            let containerW = Math.min(window.innerWidth * 0.98, 480);
            let containerH = 360;
            let ratio = Math.min(containerW / img.naturalWidth, containerH / img.naturalHeight, 1);
            let displayW = Math.round(img.naturalWidth * ratio);
            let displayH = Math.round(img.naturalHeight * ratio);
            img.style.width = displayW + "px";
            img.style.height = displayH + "px";
            img.style.maxWidth = "100%";
            img.style.maxHeight = "360px";
            img.style.display = "block";
            img.style.margin = "0 auto";
            lastPreviewImageNaturalWidth = img.naturalWidth;
            lastPreviewImageNaturalHeight = img.naturalHeight;
        };
        const previewContainer = document.getElementById('imagePreviewContainer');
        previewContainer.innerHTML = '';
        previewContainer.appendChild(img);
        document.getElementById('dateTimeChoice').style.display = 'flex';
        const imageChips = document.querySelectorAll('#dateTimeChoice .chip');
        imageChips.forEach(chip => chip.classList.remove('selected'));
        selectedChip = '';
        document.getElementById('imagePrintOptions').style.display = 'flex';
        updatePrintButtonState();
        
        // 📸 カメラで撮影した画像のみ写真アプリに自動保存（既存の写真選択は保存しない）
        // ファイルの最終更新日時が現在時刻から30秒以内なら「撮影した」と判断
        if (file && file.lastModified) {
            const timeDiff = Date.now() - file.lastModified;
            const isRecentlyTaken = timeDiff < 30000; // 30秒以内
            
            if (isRecentlyTaken && window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.saveImage) {
                console.log('📸 撮影画像を写真アプリに保存します（撮影から' + Math.round(timeDiff/1000) + '秒）');
                try {
                    window.webkit.messageHandlers.saveImage.postMessage({
                        imageData: reader.result
                    });
                } catch (saveError) {
                    console.warn('⚠️ saveImage通知に失敗:', saveError);
                }
            } else if (!isRecentlyTaken) {
                console.log('📁 既存の写真を選択（保存しません・撮影から' + Math.round(timeDiff/1000) + '秒）');
            }
        }
    };
    if (file) {
        reader.readAsDataURL(file);
    }
    else {
        document.getElementById('dateTimeChoice').style.display = 'none';
        document.getElementById('imagePrintOptions').style.display = 'none';
        selectedChip = '';
        updatePrintButtonState();
    }
}

function getSignaturePadSize() {
    let w = 260, h = 340;
    if (window.innerWidth < 500) {
        w = Math.min(window.innerWidth * 0.9, 260);
        h = Math.min(window.innerWidth * 1.1, 340);
    }
    return {width: Math.round(w), height: Math.round(h)};
}
function resizeSignaturePadCanvas(canvas, ctx, size, ratio, imageDataUrl) {
    // 画像データがある場合のみtoDataURL()を呼び出す（空canvasの黒化を防ぐ）
    let dataUrl = imageDataUrl;
    if (!dataUrl && canvas.width > 0 && canvas.height > 0) {
        // signaturePadが存在し、空でない場合のみdataURLを取得
        if (window.signaturePad && !window.signaturePad.isEmpty()) {
            try {
                dataUrl = canvas.toDataURL();
            } catch(e) {
                console.warn('Canvas toDataURL失敗:', e);
            }
        }
    }
    // Canvas サイズ変更前に現在の背景を白で初期化
    canvas.width = size.width * ratio;
    canvas.height = size.height * ratio;
    
    // キャンバスを白で填める（黒くなるのを防ぐ）
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    canvas.style.width = size.width + "px";
    canvas.style.height = size.height + "px";
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.globalCompositeOperation = 'source-over';
    // 背景を白で塗りつぶす（黒化を防ぐ）
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.scale(ratio, ratio);
    if (dataUrl) {
        let img = new window.Image();
        img.onload = function() {
            ctx.drawImage(img, 0, 0, size.width, size.height);
        };
        img.src = dataUrl;
    }
}
function initSignaturePad(imageDataUrl, fromHistory) {
    const canvas = document.getElementById('signaturePad');
    const size = getSignaturePadSize();
    const ratio = Math.max(window.devicePixelRatio || 1, 1);
    const ctx = canvas.getContext("2d", { willReadFrequently: true, alpha: false });
    
    // コンテキスト検証
    if (!ctx) {
        console.error('❌ キャンバスコンテキストの取得に失敗しました');
        return;
    }
    
    let dataUrl = imageDataUrl || null;
    if (!dataUrl && signaturePad && !signaturePad.isEmpty()) {
        try {
            dataUrl = signaturePad.toDataURL();
        } catch (e) {
            console.warn('⚠️ 既存署名データの取得に失敗 (initSignaturePad):', e);
        }
    }
    
    resizeSignaturePadCanvas(canvas, ctx, size, ratio, dataUrl);
    
    // キャンバスを白で塗りつぶす（黒くなるのを確実に防ぐ）
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    signaturePad = new window.SignaturePad(canvas, {
        backgroundColor: "#fff",
        penColor: "#222",
        minWidth: 1.5,
        maxWidth: 2.5,
        throttle: 10,
        velocityFilterWeight: 0.7
    });
    signaturePad.clear();
    if (imageDataUrl) {
        const img = new window.Image();
        img.onload = function() {
            // 再度白で塗りつぶしてから画像を描画（黒背景の防止）
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, size.width, size.height);
            if (fromHistory) {
                signaturePad._data = [[{x:0,y:0,time:Date.now()}]];
            }
            updateSignaturePrintButtonState();
        };
        img.src = imageDataUrl;
    }
    document.getElementById('signatureClearBtn').onclick = function() {
        signaturePad.clear();
        updateSignaturePrintButtonState();
    };
    canvas.onmouseup = updateSignaturePrintButtonState;
    canvas.ontouchend = updateSignaturePrintButtonState;
    canvas.onmouseout = updateSignaturePrintButtonState;
    canvas.addEventListener('touchstart', function(e) {
        if (e.touches.length === 1) e.preventDefault();
    }, { passive: false });
    canvas.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    canvas.addEventListener('selectstart', function(e) { e.preventDefault(); });
    updateSignaturePrintButtonState();
}
let signatureResizeTimer = null;
window.addEventListener('resize', function() {
    if (document.getElementById('signatureSection').style.display !== 'none') {
        // リサイズイベントのデバウンス処理（連続発火を防ぐ）

});

// 手書き印刷の実行関数
function executeSignaturePrint() {
    if (!signaturePad || (signaturePad.isEmpty() && (!signaturePad._data || signaturePad._data.length === 0)) || selectedSignatureChip === '') {
        console.log('❌ 手書き印刷の条件が満たされていません');
        return;
    }
    
    console.log('🖋️ 手書き印刷を開始します');
    const returnMode = currentHistoryType || 'signature';
    
    const qrPrintEnabled = document.getElementById('signatureQrPrintCheckbox').checked; // 最初に取得
    const canvas = document.getElementById('signaturePad');
    const ratio = Math.max(window.devicePixelRatio || 1, 1);
    const srcW = canvas.width / ratio;
    const srcH = canvas.height / ratio;
    const printW = 57; // mm（57mm幅）
    const pxPerMm = 3.38; // 1mm=3.38px（58mm=196px基準）
    const outW = Math.round(printW * pxPerMm);
    const scale = outW / srcW;
    const outH = Math.round(srcH * scale);
    const tmpCanvas = document.createElement('canvas');
    tmpCanvas.width = outW;
    tmpCanvas.height = outH;
    const tmpCtx = tmpCanvas.getContext('2d', { willReadFrequently: true });
    tmpCtx.fillStyle = "#fff";
    tmpCtx.fillRect(0, 0, outW, outH);
    tmpCtx.drawImage(canvas, 0, 0, srcW * ratio, srcH * ratio, 0, 0, outW, outH);
    const paperWidth = 56;  // 印刷幅（mm）56mm相当）
    const imgW = 56, imgH = Math.round(outH / pxPerMm);
    const marginX = Math.floor((paperWidth - imgW) / 2);
    const marginY = 4;
    const isDateTimeEnabled = selectedSignatureChip === 'with';
    const dateTimeHeight = 16;
    const bottomMargin = isDateTimeEnabled ? 16 : 18;
    const totalHeight = marginY + imgH + (isDateTimeEnabled ? dateTimeHeight : 0) + bottomMargin;
    const selectedCopies = parseInt(document.getElementById('signatureCopiesSelect').value);
    
    function printSignatureCopy() {
        // 新しいキャンバスで全体を合成
        const compositeCanvas = document.createElement('canvas');
        const compositeCtx = compositeCanvas.getContext('2d');
        
        const mmToPx = 11.8; // 1mm = 11.8px（300DPI換算）
        const canvasWidth = Math.round(56 * mmToPx); // 56mm（最大印字幅）
        
        // サイン画像のサイズを取得
        const signatureImg = new Image();
        signatureImg.onload = function() {
            // 日付・時刻の高さを計算
            let dateTimeHeight = 0;
            if (isDateTimeEnabled) {
                const fontSize = 48; // 48px（1.2倍）
                dateTimeHeight = fontSize * 2.5; // 2行 + 余白
            }
            
            // 全体の高さを計算（手書き用の余白設定、サイズ縮小）
            const signatureTopMargin = 8; // 手書き用上余白
            
            // 下部余白（4パターン固定値）
            let signatureBottomMargin;
            if (isDateTimeEnabled && qrPrintEnabled) {
                signatureBottomMargin = 250; // 日付あり + QRあり
            } else if (!isDateTimeEnabled && qrPrintEnabled) {
                signatureBottomMargin = 400; // 日付なし + QRあり
            } else if (isDateTimeEnabled && !qrPrintEnabled) {
                signatureBottomMargin = 230; // 日付あり + QRなし
            } else {
                signatureBottomMargin = 190; // 日付なし + QRなし
            }

            // サインサイズを0.9倍に縮小（全体が印刷されるように）
            const signatureScale = 0.9; // 0.9倍にスケール（縮小して全体を印刷）
            const signatureWidth = Math.round((outW / pxPerMm * mmToPx) * signatureScale);
            const signatureHeight = Math.round((outH / pxPerMm * mmToPx) * signatureScale);
            const totalHeight = signatureTopMargin + signatureHeight + dateTimeHeight + signatureBottomMargin;
            
            compositeCanvas.width = canvasWidth;
            compositeCanvas.height = totalHeight;
            
            // 背景を白にする
            compositeCtx.fillStyle = '#FFFFFF';
            compositeCtx.fillRect(0, 0, canvasWidth, totalHeight);
            
            // サインを描画（中央配置、大きく印字）
            const signatureX = Math.round((canvasWidth - signatureWidth) / 2); // 中央配置
            const signatureY = signatureTopMargin; // 手書き用上余白
            
            compositeCtx.drawImage(tmpCanvas, signatureX, signatureY, signatureWidth, signatureHeight);
            
            // QRコードを生成して左側に配置（チェックボックス確認）
            let qrCodeCanvas = null;
            // console.log('手書き印刷 - QRチェックボックス状態:', qrPrintEnabled);
            if (qrPrintEnabled) {
                // console.log('QRコード生成開始（手書き）');
                const printTimestamp = window.restoredDateTime || Date.now();
                const historyItem = {
                    type: 'signature',
                    mode: 'signature',
                    data: tmpCanvas.toDataURL("image/png"),
                    dateTime: selectedSignatureChip,
                    copies: selectedCopies,
                    created: Date.now(),
                    timestamp: printTimestamp,
                    qrPrinted: qrPrintEnabled // 確実にチェックボックスの状態を保存
                };
                
                // 先に履歴を保存してからQRコード生成
                const qrData = generateQRData(historyItem);
                if (qrData) {
                    // 履歴を即座に保存
                    addHistory(historyItem).then(() => {
                        console.log('履歴保存完了:', historyItem.managementId);
                    });
                    
                    qrCodeCanvas = generateQRCode(qrData);
                    if (qrCodeCanvas) {
                        const qrSize = 180; // QRコードのサイズ（1.2倍）
                        const qrX = 25; // 左端から25pxの位置
                        let qrY;
                        if (isDateTimeEnabled) {
                            // 日付・時刻ありの場合：日付・時刻の左側に配置
                            qrY = signatureY + signatureHeight + 20; // サインの下、日付の横
                        } else {
                            // 日付・時刻なしの場合：手書きの下部左側（印刷範囲内に調整）
                            qrY = signatureY + signatureHeight + 40; // サインの下に40px離して配置
                        }
                        
                        // QRコードを完全な黒白で描画（画像印刷と同じ処理）
                        const qrPadding = 10; // 周囲に10pxの白い余白
                        const qrBgX = qrX - qrPadding;
                        const qrBgY = qrY - qrPadding;
                        const qrBgWidth = qrSize + qrPadding * 2;
                        const qrBgHeight = qrSize + qrPadding * 2;
                        
                        // 1. 白背景を描画
                        compositeCtx.fillStyle = '#FFFFFF';
                        compositeCtx.fillRect(qrBgX, qrBgY, qrBgWidth, qrBgHeight);
                        
                        // 2. QRコードを元のキャンバスから直接ピクセル単位でコピー
                        const qrCtx = qrCodeCanvas.getContext('2d');
                        const qrSourceData = qrCtx.getImageData(0, 0, qrCodeCanvas.width, qrCodeCanvas.height);
                        
                        // 3. 目的のサイズに合わせてリサンプリング（最近傍補間で鮮明に）
                        const tempCanvas = document.createElement('canvas');
                        tempCanvas.width = qrSize;
                        tempCanvas.height = qrSize;
                        const tempCtx = tempCanvas.getContext('2d', { alpha: false });
                        
                        // 完全に補間を無効化
                        tempCtx.imageSmoothingEnabled = false;
                        tempCtx.webkitImageSmoothingEnabled = false;
                        tempCtx.mozImageSmoothingEnabled = false;
                        tempCtx.msImageSmoothingEnabled = false;
                        
                        // QRコードをリサイズ
                        tempCtx.drawImage(qrCodeCanvas, 0, 0, qrCodeCanvas.width, qrCodeCanvas.height, 
                                         0, 0, qrSize, qrSize);
                        
                        // 4. リサイズ後のデータを完全に2値化（閾値127で標準的に）
                        const resizedData = tempCtx.getImageData(0, 0, qrSize, qrSize);
                        const resizedBuffer = resizedData.data;
                        for (let i = 0; i < resizedBuffer.length; i += 4) {
                            // 標準的な2値化（閾値127 = 中間値）
                            const value = resizedBuffer[i] > 127 ? 255 : 0;
                            resizedBuffer[i] = resizedBuffer[i + 1] = resizedBuffer[i + 2] = value;
                            resizedBuffer[i + 3] = 255;
                        }
                        tempCtx.putImageData(resizedData, 0, 0);
                        
                        // 5. 最終的にメインキャンバスに描画
                        compositeCtx.imageSmoothingEnabled = false;
                        compositeCtx.drawImage(tempCanvas, qrX, qrY);
                        
                        console.log('✅ QRコード描画完了（手書き・完全2値化）:', qrX, qrY, qrSize);
                    }
                }
            } else {
                // console.log('QRコードなしで印刷（手書き）');
            }
            
            // 日付・時刻を描画
            if (isDateTimeEnabled) {
                console.log('📅 日付・時刻描画開始 - QR有効:', qrPrintEnabled);
                
                // 履歴から復元された場合はその時刻を使用、新規印刷は現在時刻
                const dateTimeToUse = window.restoredDateTime ? new Date(window.restoredDateTime) : new Date();
                const year = dateTimeToUse.getFullYear();
                const month = dateTimeToUse.getMonth() + 1;
                const day = dateTimeToUse.getDate();
                const hour = dateTimeToUse.getHours();
                const minute = dateTimeToUse.getMinutes();
                const second = dateTimeToUse.getSeconds();
                
                const fontSize = 60; // 60px（他の印刷モードと同じサイズ）
                // 月と日が両方2桁の場合、フォントサイズを自動縮小
                const isMonthTwoDigits = month >= 10;
                const isDayTwoDigits = day >= 10;
                const needsSmaller = isMonthTwoDigits && isDayTwoDigits;
                const adjustedDateFontSize = needsSmaller 
                    ? Math.round(fontSize * 0.85) 
                    : fontSize;
                
                compositeCtx.fillStyle = '#000000';
                compositeCtx.textAlign = 'center'; // 常に中央揃え
                compositeCtx.textBaseline = 'top';
                
                // QRコードの有無でX座標を調整（中央揃えのまま）
                let dateTimeX;
                let yPos = signatureY + signatureHeight + 5; // 縮小されたサインの下
                
                // 現在のチェックボックス状態を直接確認
                const currentQrEnabled = document.getElementById('signatureQrPrintCheckbox').checked;
                if (currentQrEnabled) {
                    // QRコード印刷ありの場合：QRコードの右側に配置
                    dateTimeX = Math.round(canvasWidth / 2) + 110; // 中央より右に110px移動
                    yPos += 20; // QRありの場合20px下に移動
                    console.log('✅ QRあり - 中央+110px配置:', dateTimeX);
                } else {
                    // QRコード印刷なしの場合：完全に中央配置
                    dateTimeX = Math.round(canvasWidth / 2); // 完全中央
                    console.log('✅ QRなし - 完全中央配置:', dateTimeX);
                }
                
                // 日付行（縮小サイズ適用）
                compositeCtx.font = `${adjustedDateFontSize}px ${ROUNDED_THERMAL_FONT_STACK}`;
                const dateText = `${year}年${month}月${day}日`;
                compositeCtx.fillText(dateText, dateTimeX, yPos);
                yPos += fontSize * 1.2;
                
                // 時刻行（元のサイズ）
                compositeCtx.font = `${fontSize}px ${ROUNDED_THERMAL_FONT_STACK}`;
                const timeText = `${hour}時${minute}分${second}秒`;
                compositeCtx.fillText(timeText, dateTimeX, yPos);
            }
            
            // 合成キャンバスをJPEGに変換（高品質90%）
            const jpegDataUrl = compositeCanvas.toDataURL('image/jpeg', 0.90);
            
            // jsPDFを使用してPDFを生成
            const { jsPDF } = window.jspdf;
            const pdfHeight = Math.round(totalHeight / mmToPx);
            
            const pdf = new jsPDF({
                orientation: 'portrait',
                unit: 'mm',
                format: [58, pdfHeight],
                compress: true  // PDF圧縮を有効化
            });
            
            // PDFの設定を直接操作
            pdf.internal.pageSize.width = 58;
            pdf.internal.pageSize.height = pdfHeight;
            
            // 合成画像をJPEGとしてPDFに追加（PNGより軽量）
            pdf.addImage(jpegDataUrl, 'JPEG', 0, 0, 58, pdfHeight);
            
            // PDFをBase64形式で取得
            const pdfBase64 = pdf.output('datauristring').split(',')[1];
            
            let thisPage = window.location.href;
            
            // iOS/Android両対応の印刷URLを生成
            let printUrl = generatePrintUrl(pdfBase64, thisPage);
            
            // 【革新的枚数印刷システム】sessionStorageによる永続化方式
            
            console.log(`署名印刷開始: 総枚数=${selectedCopies}枚, デバイス=${isAndroid() ? 'Android' : 'iOS'}`);
            
            // 枚数印刷情報をsessionStorageに保存
            if (selectedCopies > 1) {
                const printJob = {
                    type: 'signature',
                    totalCopies: selectedCopies,
                    currentCopy: 1,
                    pdfData: pdfBase64,
                    thisPage: thisPage,
                    timestamp: Date.now()
                };
                sessionStorage.setItem('printJob', JSON.stringify(printJob));
                console.log(`署名印刷ジョブ保存: ${selectedCopies}枚中1枚目実行`);
            }
            
            // 1枚目を印刷（ネイティブアプリの場合はBase64、Web版はURL）
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.nativePrint) {
                executePrint(pdfBase64, 'signature');
            } else {
                executePrint(printUrl);
            }
            
        };
        
        signatureImg.src = tmpCanvas.toDataURL("image/png");
    }
    
    // 現在の1枚を印刷（シンプル実行）
    printSignatureCopy();
    
    // QRコードなしの場合のみ履歴保存
    if (!qrPrintEnabled) {
        addHistory({
            type: 'signature',
            mode: 'signature',
            data: tmpCanvas.toDataURL("image/png"),
            dateTime: selectedSignatureChip,
            copies: selectedCopies,
            qrPrinted: false,
            created: Date.now()
        });
    }
    
    // 印刷完了後、発行元モードに戻る
    setTimeout(() => {
        resetAllModes();
        showSection(returnMode);
    }, 1000);
};

const ROUNDED_THERMAL_FONT_STACK = '"Hiragino Maru Gothic ProN", "Rounded Mplus 1c", "Helvetica Rounded", "MobileKanji", "MS PGothic", "Yu Gothic", sans-serif';

// --- 領収書印刷 ---
async function executeReceiptPrint(withMemo) {

    lastReceiptPrintTime = currentTime;
    
    console.log('🧾 領収書印刷を開始します', withMemo ? '(メモ付き)' : '(メモなし)');
    const returnMode = currentHistoryType || 'receipt';

    const printerProfile = getThermalPrinterProfile();
    const printableWidthMm = printerProfile.printableWidthMm || printerProfile.widthMm;
    const printerNameLabel = (printerProfile.name || '').toString();
    console.log('🖨️ 使用プリンター:', printerNameLabel, `(${printerProfile.widthMm}mm / 印字可能${printableWidthMm}mm ${Math.round(printerProfile.mmToPx * 100) / 100}px/mm)`);
    const mmToPx = printerProfile.mmToPx;

    const receiptNumber = await getNextReceiptNumber();

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    applyThermalContextDefaults(ctx);
    
    const legacyMmToPx = 11.8; // 既存数値（300dpi想定）
    const dpiScale = mmToPx / legacyMmToPx;
    const isSms210Family = printerNameLabel.toUpperCase().includes('SM-S210');
    const widthFontScale = isSms210Family
        ? 1
        : ((printerProfile.widthMm && printerProfile.widthMm > 0 && printableWidthMm)
            ? Math.min(1, printableWidthMm / printerProfile.widthMm)
            : 1);
    const printerFontScale = typeof printerProfile.fontScale === 'number' ? printerProfile.fontScale : 1;
    const scaledFontSize = (value) => Math.max(12, Math.round(value * widthFontScale * printerFontScale));
    const scalePx = (value) => Math.round(value * dpiScale);
    const referencePrintableWidthMm = 58;
    const receiptVisualScale = Math.min(1, printableWidthMm / referencePrintableWidthMm);
    const scaledReferencePx = (value) => Math.max(1, Math.round(value * receiptVisualScale));

    // フォントサイズ設定（テキスト印刷より3段階細く）
    const receiptFontScale = 0.7; // 宛名・QRバランス優先でさらに縮小
    const textFontSize = scaledFontSize(Math.round(37 * receiptFontScale));
    const companyNameFontSize = scaledFontSize(Math.round(42 * receiptFontScale));
    const labelFontSize = scaledFontSize(Math.round(37 * receiptFontScale));
    const dateFontSize = scaledFontSize(Math.round(50 * receiptFontScale));
    const referenceImageDatePx = 60; // 画像印刷と同じ見た目を保つための基準サイズ
    const receiptDateFontSizePx = Math.max(
        dateFontSize,
        Math.round((scaledReferencePx(referenceImageDatePx) / legacyMmToPx) * mmToPx)
    );
    
    // 宛名の文字数チェック（最大14文字、9文字で表示変更）
    const companyNameLength = companyName.length;
    let companyNameFormat = ''; // 'short' or 'long'
    
    // 9文字以内か10文字以上かで表示形式を決定
    if (companyNameLength <= 9) {
        companyNameFormat = 'short'; // 宛名は「○○○○○○○○○」形式（1行）
    } else {
        companyNameFormat = 'long'; // 宛名は改行して「○○○○○○○○○○○○○○」形式（2行）
    }
    
    // 但し書きの文字数チェック（最大15文字、6文字で表示変更）
    let memoFormat = ''; // 'short' or 'long'
    if (withMemo && memo) {
        // 6文字以内か7文字以上かで表示形式を決定
        if (memo.length <= 6) {
            memoFormat = 'short'; // 但し ○○○○○○ として
        } else {
            memoFormat = 'long'; // 但し改行○○○○○○○○○○○○○○○改行として
        }
    }
    
    // 「宛名記入不可」かどうかをチェック
    const isNoNameReceipt = receiptNoNameEnabled && receiptNoNameData && receiptNoNameData.category === '領収書宛名記入不可';
    
    // 領収書のテキスト内容を構築
    let receiptLines = [];
    receiptLines.push('領収書');
    receiptLines.push('');
    
    // ✔️不可ボタンが選択されているかチェック
    console.log('🔍 [executeReceiptPrint] receiptNoNameEnabled:', receiptNoNameEnabled);
    console.log('🔍 [executeReceiptPrint] receiptNoNameData:', receiptNoNameData);
    
    if (isNoNameReceipt) {
        // 領収書宛名記入不可の場合
        receiptLines.push('');
        receiptLines.push('※領収書宛名・但し書き記入不可※');
        receiptLines.push('');
    } else if (!receiptNoNameEnabled) {
        // 通常の領収書
        receiptLines.push('こちらでお願い致します。');
        
        // 小文字オプションが選択されている場合のみ追加
        if (receiptSmallTextEnabled) {
            receiptLines.push('(小文字でお願い致します。)');
        }
        receiptLines.push('');
        
        console.log('📄 通常の文言を追加します');
        receiptLines.push('領収書に｢宛名｣を記入して頂き');
        receiptLines.push('宛名が合っておりましたら');
        receiptLines.push('ボールペンまたは印鑑で');
        receiptLines.push('下部の枠に印を付けて下さい✔️');
    } else {
        // ✔️記入・取得不可（領収書宛名記入不可以外）
        receiptLines.push('こちらでお願い致します。');
        
        if (receiptSmallTextEnabled) {
            receiptLines.push('(小文字でお願い致します。)');
        }
        receiptLines.push('');
    }
    
    const printText = receiptLines.join('\n');
    
    // フォント設定（SM-S210i用に鮮明なフォント）
    ctx.font = thermalFont(textFontSize);
    ctx.fillStyle = '#000000';
    
    // テキストの行数から高さを計算
    const lines = printText.split('\n');
    const lineHeight = textFontSize * 1.2;
    const companyLineHeight = companyNameFontSize * 1.2; // 宛名行の高さ
    let textHeight = 0;
    
    // 各行の高さを個別に計算
    for (let i = 0; i < lines.length; i++) {
        textHeight += lineHeight;
    }
    
    // 宛名行の高さを追加（新仕様：9文字以内/10文字以上）
    if (!isNoNameReceipt) {
        if (companyNameFormat === 'short') {
            // 9文字以内: 宛名は「○○○○○○○○○」形式（1行）
            textHeight += companyLineHeight * 1.2; // 1行分
        } else {
            // 10文字以上: 宛名は改行して「○○○○○○○○○○○○○○」形式（3行）
            textHeight += labelFontSize * 1.2; // "宛名は"
            textHeight += companyLineHeight * 1.2; // 「宛名内容」
        }
        
        // 但し書きの高さを追加（新仕様：6文字以内/7文字以上）
        if (withMemo && memo) {
            if (memoFormat === 'short') {
                // 6文字以内: 但し ○○○○○○ として形式（1行）
                textHeight += textFontSize * 1.2; // 1行分
            } else {
                // 7文字以上: 但し改行○○○○○○○○○○○○○○○改行として（3行）
                textHeight += labelFontSize * 1.2; // "但し"
                textHeight += textFontSize * 1.2; // メモ内容
                textHeight += labelFontSize * 1.2; // "代として"
            }
        }
    }
    
    // 金額の高さを追加
    if (amount) {
        textHeight += dateFontSize * 1.2; // 金額行の高さ
    }
    
    // ✔️不可の高さを追加
    if (receiptNoNameEnabled && receiptNoNameData) {
        const category = receiptNoNameData.category || '';
        const subcategory = receiptNoNameData.subcategory || '';
        const detail1 = receiptNoNameData.detail1 || '';
        const detail2 = receiptNoNameData.detail2 || '';
        
        if (category === '領収書宛名記入不可') {
            // 宛名記入不可の場合の高さ計算
            textHeight += textFontSize * 1.2; // 「領収書宛名・但し書き記入不可」
            textHeight += textFontSize * 1.2; // 「(相手確認済)」
            textHeight += textFontSize * 0.3; // 余白
            textHeight += labelFontSize * 1.2; // 区分行
            
            // サブカテゴリに応じて詳細行の高さを追加
            if (subcategory === '車内' && detail1) {
                // 列車名の行数を計算（幅20で改行）
                let trainNameHeight = 0;
                let currentWidth = 0;
                let lineCount = 1;
                
                for (let i = 0; i < detail1.length; i++) {
                    const char = detail1[i];
                    const isFullWidth = char.match(/[^\x01-\x7E]/) ? true : false;
                    const charWidth = isFullWidth ? 2 : 1;
                    
                    if (currentWidth + charWidth > 20) {
                        lineCount++;
                        currentWidth = charWidth;
                    } else {
                        currentWidth += charWidth;
                    }
                }
                
                trainNameHeight = labelFontSize * 1.2 * lineCount;
                textHeight += trainNameHeight;
                
                // 列車番号が別行になる可能性
                if (detail2) {
                    // 列車名の最初の行の幅を計算
                    let firstLineWidth = 0;
                    currentWidth = 0;
                    for (let i = 0; i < detail1.length; i++) {
                        const char = detail1[i];
                        const isFullWidth = char.match(/[^\x01-\x7E]/) ? true : false;
                        const charWidth = isFullWidth ? 2 : 1;
                        
                        if (currentWidth + charWidth > 20) break;
                        firstLineWidth += charWidth;
                        currentWidth += charWidth;
                    }
                    
                    if (firstLineWidth >= 14 || lineCount > 1) {
                        textHeight += labelFontSize * 1.2; // 列車番号の別行
                    }
                }
            } else if ((subcategory === '店舗' || subcategory === '飲食店' || subcategory === 'ホームセンター' || subcategory === 'コンビニ') && detail1) {
                // 店舗系の場合
                if (detail1.length <= 14) {

                } else {

                    textHeight += labelFontSize * 1.2 * lines;
                }
                
                if (detail2) {
                    textHeight += labelFontSize * 1.2; // detail2の行
                }
            } else if (subcategory === 'その他' && detail1) {
                textHeight += labelFontSize * 1.2; // 自由記入の行
            }
            
            // 説明文の高さを追加（5行、下部余白なし）
            textHeight += textFontSize * 0.5; // 余白
            textHeight += textFontSize * 1.2 * 5; // 説明文5行
        } else {
            // ✔️記入・取得不可（領収書宛名記入不可以外）のカテゴリー
            const category = receiptNoNameData.category || '';
            const detail1 = receiptNoNameData.detail1 || '';
            const detail2 = receiptNoNameData.detail2 || '';
            
            textHeight += textFontSize * 1.2; // ✔️記入不可(相手確認済)
            textHeight += textFontSize * 0.2; // 余白
            textHeight += labelFontSize * 1.2; // 区分行
            
            // 詳細行の高さを正確に計算
            if (category === '車内' && detail1) {
                // 列車名の行数を計算
                let lineCount = 1;
                let currentWidth = 0;
                for (let i = 0; i < detail1.length; i++) {
                    const char = detail1[i];
                    const isFullWidth = char.match(/[^\x01-\x7E]/) ? true : false;
                    const charWidth = isFullWidth ? 2 : 1;
                    
                    if (currentWidth + charWidth > 20) {
                        lineCount++;
                        currentWidth = charWidth;
                    } else {
                        currentWidth += charWidth;
                    }
                }
                
                textHeight += labelFontSize * 1.2 * lineCount;
                
                // 列車番号が別行になる可能性
                if (detail2) {
                    let firstLineWidth = 0;
                    currentWidth = 0;
                    for (let i = 0; i < detail1.length; i++) {
                        const char = detail1[i];
                        const isFullWidth = char.match(/[^\x01-\x7E]/) ? true : false;
                        const charWidth = isFullWidth ? 2 : 1;
                        
                        if (currentWidth + charWidth > 20) break;
                        firstLineWidth += charWidth;
                        currentWidth += charWidth;
                    }
                    
                    if (firstLineWidth >= 14 || lineCount > 1) {
                        textHeight += labelFontSize * 1.2; // 列車番号の別行
                    }
                }
            } else if (category === '店舗' || category === '飲食店' || category === 'ホームセンター' || category === 'コンビニ') {
                // 店舗系の場合
                if (detail1) {
                    if (detail1.length <= 14) {
                        textHeight += labelFontSize * 1.2; // 1行
                    } else {
                        // 14文字で改行
                        const lines = Math.ceil(detail1.length / 14);
                        textHeight += labelFontSize * 1.2 * lines;
                    }
                }
            } else if ((category === 'その他' || category === 'その他(自由記入)') && detail1) {
                const reasonLines = Math.ceil(detail1.length / 14) || 1;
                textHeight += labelFontSize * 1.2 * reasonLines; // 自由記入の内容
            }
            
            // 「領収書に｢宛名｣を記入して頂き」の文言（2行）
            textHeight += textFontSize * 1.2 * 2; // 2行分
            textHeight += textFontSize * 0.5; // 説明文前の余白
            textHeight += textFontSize * 1.2 * 5; // 説明文5行
        }
    }
    
    // 枠の高さを追加（Canvas APIで描画）
    if (!isNoNameReceipt) {
        const stampBoxHeight = scalePx(120);
        textHeight += stampBoxHeight + scalePx(30); // 枠の高さ + 上下の余白
    }
    
    // QRコード・日付用のスペースを追加（適切なサイズに調整）
    const dateLineHeight = receiptDateFontSizePx * 1.2;
    const qrSize = scalePx(140); // QRサイズをさらに縮小
    const qrTopGap = receiptNoNameEnabled ? 0 : scalePx(20);
    const qrLeftPx = scalePx(10); // QRの左位置をさらに左端に
    const qrPadding = receiptNoNameEnabled ? 0 : scalePx(6);
    const dateTopGap = receiptNoNameEnabled ? 0 : scalePx(10);
    const dateQrVerticalShift = receiptNoNameEnabled ? 0 : scalePx(15); // 日付の縦位置調整
    const dateBottomGap = receiptNoNameEnabled ? scalePx(12) : scalePx(30);
    const dateRightShift = scalePx(70); // 日付位置をさらに左寄りに調整
    const qrBlockHeight = qrTopGap + qrSize;
    const dateBlockHeight = dateTopGap + dateQrVerticalShift + (dateLineHeight * 2) + dateBottomGap;
    const bottomSafetyGap = receiptNoNameEnabled ? 0 : scalePx(12);
    const bottomBlockHeight = Math.max(qrBlockHeight, dateBlockHeight) + bottomSafetyGap;
    textHeight += bottomBlockHeight;

    // 画像印刷と同じ余白ロジックで下部の巻き取りスペースを確保
    const receiptDateTimeEnabled = true; // 領収書は常に日付・時刻を印字
    const receiptQrEnabled = true; // 領収書は常にQRコードを印字
    const baseBottomMargin = calculateSharedBottomMargin(receiptDateTimeEnabled, receiptQrEnabled, mmToPx);
    const noNameTailMarginPx = Math.round(mmToPx * 12); // ✔️記入不可は指定どおり12mmの巻き取りを確保
    const normalTailGuardPx = Math.round(mmToPx * 2); // 通常領収書は+2mmの余裕を常に確保
    const minimalBottomMarginPx = receiptNoNameEnabled ? noNameTailMarginPx : Math.round(mmToPx * 5);
    const standardTailMarginPx = receiptNoNameEnabled
        ? noNameTailMarginPx
        : Math.min(baseBottomMargin, Math.round(mmToPx * 9));
    let bottomMargin = receiptNoNameEnabled
        ? minimalBottomMarginPx
        : Math.max(minimalBottomMarginPx, standardTailMarginPx) + normalTailGuardPx;
    
    const topMargin = scalePx(24); // 上余白3mm
    const canvasHeight = Math.round(topMargin + textHeight + bottomMargin);
    canvas.width = canvasWidth;
    canvas.height = canvasHeight;
    
    // 背景を白にする
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, canvasWidth, canvasHeight);
    
    // テキスト描画設定
    ctx.fillStyle = '#000000';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    
    // 真ん中の位置を正確に計算（完全中央揃え）
    const exactCenterX = Math.round(canvasWidth / 2); // 完全中央揃え
    
    // テキストを描画（上部余白3mm）
    let yPos = topMargin; // 上余白3mm
    let qrBottom = yPos; // QR描画の最下位置を追跡
    let memoInserted = false;
    let amountInserted = false;
    let lineIndex = 0; // 実際の行インデックス
    
    for (let i = 0; i < lines.length; i++) {
        ctx.font = thermalFont(textFontSize);
        ctx.textAlign = 'center';
        
        // 「領収書」の行の場合は領収書宛名と連番を追加
        if (i === 0 && lines[i] === '領収書') {
            // 1行目: 「領収書宛名」（左）と連番（右）
            ctx.font = thermalFont(textFontSize);
            ctx.textAlign = 'left';
            const receiptTitleX = scalePx(30); // 領収書宛名の位置（左端からの距離、調整可能）
            ctx.fillText('領収書宛名', receiptTitleX, yPos);
            
            // 連番を右側に描画（全角数字）
            ctx.textAlign = 'right';
            const numberX = canvasWidth - scalePx(30); // 連番の位置（右寄せ）
            ctx.fillText(receiptNumber, numberX, yPos);
            
            yPos += lineHeight;
            lineIndex++; // 1行分進める
            continue; // 通常描画をスキップ
        }
        
        // 「※領収書宛名・但し書き記入不可※」の行は小さめのフォントで描画
        if (lines[i].includes('※領収書宛名・但し書き記入不可※')) {
            const smallFontSize = scaledFontSize(Math.round(32 * receiptFontScale)); // 通常より小さめ
            ctx.font = thermalFont(smallFontSize);
        }
        
        // 通常の行は中央揃えで描画
        ctx.fillText(lines[i], exactCenterX, yPos);
        yPos += lineHeight;
        lineIndex++;
        
        // 「領収書宛名+連番」の次の空行の後に宛名を挿入
        if (lineIndex === 2 && !isNoNameReceipt) { // 2行目（空行）の後、宛名記入不可以外

            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            
            ctx.font = thermalFont(companyNameFontSize);
            ctx.textAlign = 'center';
            
            if (companyNameFormat === 'short') {
                // 9文字以内: 宛名は「○○○○○○○○○」形式（1行）
                ctx.fillText(`宛名は「${companyName}」`, exactCenterX, yPos);
                yPos += companyLineHeight * 1.2;
            } else {
                // 10文字以上: 宛名は改行「○○○○○○○○○○○○○○」形式（2行）
                ctx.font = thermalFont(labelFontSize);
                ctx.fillText('宛名は', exactCenterX, yPos);
                yPos += labelFontSize * 1.2;
                
                ctx.font = thermalFont(companyNameFontSize);
                ctx.fillText(`「${companyName}」`, exactCenterX, yPos);
                yPos += companyLineHeight * 1.2;
            }
        }
        
        // 小文字オプションの後に但し書きと金額を挿入
        if (!memoInserted && i >= 3) {
            // 但し書きがある場合は表示
            if (withMemo && memo && (receiptNoNameEnabled && receiptNoNameData && receiptNoNameData.category !== '領収書宛名記入不可' || !isNoNameReceipt)) {
                // T's券と同等の高品質レンダリング設定を適用

                ctx.textAlign = 'center';
                
                if (memoFormat === 'short') {

                    const suffixText = suffix ? ` ${suffix}として` : '';
                    ctx.fillText(`但し ${memo}${suffixText}`, exactCenterX, yPos);
                    yPos += textFontSize * 1.2;
                } else {
                    // 7文字以上: 但し改行○○○○○○○○○○○○○○○改行代として形式（3行、中央揃え）

            if (amount && !amountInserted) {

                // 「金額」ラベルは元の位置（間隔なし）

                // 「¥○○○○円」を右揃えで描画（こちらだけ1mm上げる）

                yPos += dateFontSize * 1.2;

            }
            
            // ✔️不可ボタンが選択されている場合の印字処理（金額の後）
            if (receiptNoNameEnabled && receiptNoNameData && receiptNoNameData.category !== '領収書宛名記入不可') {

                ctx.imageSmoothingQuality = 'high';

                yPos += textFontSize * 1.2;

                if (category === '車内') {

                    ctx.font = thermalFont(labelFontSize); // 列車名は元のサイズに戻す
                    
                    if (detail1) {

                        const trainNumber = detail2 || '';
                        const leftX = scalePx(30);

                        // 列車名を幅20（全角10文字相当）で分割
                        const trainNameLines = [];

                        let currentWidth = 0;
                        
                        for (let i = 0; i < trainName.length; i++) {
                            const char = trainName[i];
                            // 全角文字は幅2、半角文字は幅1
                            const isFullWidth = char.match(/[^\x01-\x7E]/) ? true : false;
                            const charWidth = isFullWidth ? 2 : 1;

                yPos += textFontSize * 1.2;
                ctx.fillText('宛名のご確認お願い致します。', exactCenterX, yPos);
                yPos += textFontSize * 1.0; // 余白削減
            } else if (receiptNoNameEnabled && receiptNoNameData && receiptNoNameData.category === '領収書宛名記入不可') {

                const leftX = scalePx(30);
                
                // 「領収書宛名・但し書き記入不可」（中央揃え）
                ctx.textAlign = 'center';
                ctx.fillText('領収書宛名・但し書き記入不可', exactCenterX, yPos);
                yPos += textFontSize * 1.2;
                
                // 「（相手確認済）」（中央揃え）
                ctx.fillText('（相手確認済）', exactCenterX, yPos);
                yPos += textFontSize * 1.2;
                
                // サブカテゴリ（車内、店舗など）
                const category = receiptNoNameData.category || '';
                const subcategory = receiptNoNameData.subcategory || '';
                const detail1 = receiptNoNameData.detail1 || '';
                const detail2 = receiptNoNameData.detail2 || '';

                if (subcategory === '車内') {
                    categoryLabel = '車内購入';
                }
                
                // 「区分:〇〇〇〇」（中央揃え）

                ctx.textAlign = 'center';
                ctx.fillText(`区分:${categoryLabel}`, exactCenterX, yPos);
                yPos += labelFontSize * 1.2;
                
                // 詳細情報（車内の場合は列車名・列車番号、店舗の場合は店舗名など）

                    // 車内の場合: 列車名（左）と列車番号（右）

                        const trainName = detail1;
                        const trainNumber = detail2 || '';
                        const rightX = canvasWidth - scalePx(30);
                        
                        // 列車名を幅20（全角10文字相当）で分割

                        let currentWidth = 0;

                            const char = trainName[i];

                        // 列車名の幅を計算

                        for (let i = 0; i < trainNameLines[0].length; i++) {
                            const char = trainNameLines[0][i];
                            const isFullWidth = char.match(/[^\x01-\x7E]/) ? true : false;

                        }
                        
                        const needsSeparateLine = firstLineWidth >= 14;
                        
                        if (needsSeparateLine || trainNameLines.length > 1) {
                            ctx.textAlign = 'left';
                            for (let line of trainNameLines) {
                                ctx.fillText(line, leftX, yPos);
                                yPos += labelFontSize * 1.2;
                            }
                            
                            if (trainNumber) {
                                const displayNumber = trainNumber.substring(0, 6);
                                ctx.textAlign = 'right';
                                ctx.fillText(displayNumber, rightX, yPos);
                                yPos += labelFontSize * 1.2;
                            }
                        } else {
                            ctx.textAlign = 'left';
                            ctx.fillText(trainName, leftX, yPos);
                            
                            if (trainNumber) {
                                const displayNumber = trainNumber.substring(0, 6);
                                ctx.textAlign = 'right';
                                ctx.fillText(displayNumber, rightX, yPos);
                            }
                            yPos += labelFontSize * 1.2;
                        }
                    }
                } else if (subcategory === '店舗' || subcategory === '飲食店' || subcategory === 'ホームセンター' || subcategory === 'コンビニ') {
                    // 店舗系の場合: 店舗名（中央または左）
                    if (detail1) {
                        if (detail1.length <= 20) {
                            // 20文字以内は中央揃え
                            ctx.textAlign = 'center';
                            ctx.fillText(detail1, exactCenterX, yPos);
                            yPos += labelFontSize * 1.2;
                        } else {
                            // 20文字を超える場合は左寄せで改行
                            ctx.textAlign = 'left';
                            for (let i = 0; i < detail1.length; i += 20) {
                                ctx.fillText(detail1.substring(i, i + 20), leftX, yPos);

                        ctx.textAlign = 'left';
                        for (let i = 0; i < detail1.length; i += 14) {

                });
            }
            
            memoInserted = true;
        }
    }
    
    // 枠をCanvas APIで直接描画（✔️不可の場合は枠なし）
    if (!receiptNoNameEnabled && !isNoNameReceipt) {
        const boxWidth = scalePx(280); // 枠の幅（大きくしました）
        const boxHeight = scalePx(120); // 枠の高さ（大きくしました）
        const boxX = exactCenterX - boxWidth / 2; // 中央揃え
        const boxY = yPos + scalePx(5); // 上の余白を減らす
        
        // 枠を描画
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 2; // 線の太さ（少し細く調整）
        ctx.strokeRect(boxX, boxY, boxWidth, boxHeight);
        
        // 枠の高さ分yPosを進める
        yPos = boxY + boxHeight + scalePx(10); // 下の余白も減らす
    } else if (receiptNoNameEnabled) {
        // ✔️記入不可の場合は枠の代わりに余白完全ゼロ
        // yPosを進めない
    }
    
    // QRコードを生成して左側に配置（テキスト印刷と同じ方式）
    let qrCodeCanvas = null;
    
    // 履歴アイテムを先に作成
    const timestamp = Date.now();
    // 内容ベースの一意なIDを生成（重複防止のため）
    const contentHash = `${companyName}_${memo}_${suffix}_${amount}_${receiptNumber}_${receiptSmallTextEnabled}`.replace(/\s/g, '');
    const managementId = `receipt_${timestamp}_${contentHash.substring(0, 20)}`;
    
    const historyItem = {
        type: 'receipt',
        mode: 'receipt',
        companyName: companyName,
        memo: (withMemo && memo) ? memo : '', // memoが空なら空文字
        suffix: (withMemo && memo) ? suffix : '', // memoが空なら接尾辞も空
        amount: amount || '', // 金額を保存
        receiptNumber: receiptNumber, // 連番を保存
        smallTextEnabled: receiptSmallTextEnabled, // 小文字オプションの状態を保存
        noNameData: receiptNoNameData, // 宛名記入不可データを保存
        managementId: managementId, // 内容ベースの一意のID
        data: '', // 後で設定
        created: timestamp,
        qrPrinted: true // 常にQRコード付き
    };
    
    // QRデータを生成
    const qrData = generateQRData(historyItem);
    if (qrData) {
        qrCodeCanvas = generateQRCode(qrData);
        if (qrCodeCanvas) {
            const qrX = qrLeftPx;
            const textEndY = yPos;
            const qrY = textEndY + qrTopGap;
            if (qrPadding > 0) {
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(qrX - qrPadding, qrY - qrPadding, qrSize + qrPadding * 2, qrSize + qrPadding * 2);
                ctx.fillStyle = '#000000';
            }
            drawCrispQRCode(ctx, qrCodeCanvas, qrX, qrY, qrSize);
            qrBottom = Math.max(qrBottom, qrY + qrSize);
        }
    }
    
    // 日付・時刻を描画（適切な位置に配置）
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth() + 1;
    const day = now.getDate();
    const hour = now.getHours();
    const minute = now.getMinutes();
    const second = now.getSeconds();
    
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    
    // 月と日が両方2桁の場合、フォントサイズを自動縮小
    const isMonthTwoDigits = month >= 10;
    const isDayTwoDigits = day >= 10;
    const needsSmaller = isMonthTwoDigits && isDayTwoDigits;
    const adjustedDateFontSize = needsSmaller 
        ? Math.round(receiptDateFontSizePx * 0.85) 
        : receiptDateFontSizePx;
    
    const qrPresent = Boolean(qrCodeCanvas);
    // 日付位置：QRがある場合は右側、ない場合は中央
    const dateTimeX = qrPresent
        ? Math.round(canvasWidth / 2) + dateRightShift
        : Math.round(canvasWidth / 2);
    yPos += dateTopGap + (qrPresent ? dateQrVerticalShift : 0);
    
    // 日付行（縮小サイズ適用）
    ctx.font = thermalFont(adjustedDateFontSize);
    ctx.textAlign = 'center';
    const dateText = `${year}年${month}月${day}日`;
    ctx.fillText(dateText, dateTimeX, yPos);
    yPos += dateLineHeight;
    
    // 時刻行（元のサイズに戻す）
    ctx.font = thermalFont(receiptDateFontSizePx);
    const timeText = `${hour}時${minute}分${second}秒`;
    ctx.fillText(timeText, dateTimeX, yPos);
    yPos += dateLineHeight;
    yPos += dateBottomGap;
    
    // 実際に使用した高さでキャンバスをトリミングし、不要な余白を除去
    const contentBottom = Math.max(yPos, qrBottom);
    const trimmedHeight = Math.ceil(Math.min(canvas.height, contentBottom + bottomMargin));
    const exportCanvas = trimmedHeight < canvas.height ? (() => {
        const trimmed = document.createElement('canvas');
        trimmed.width = canvasWidth;
        trimmed.height = trimmedHeight;
        const trimmedCtx = trimmed.getContext('2d');
        trimmedCtx.drawImage(canvas, 0, 0);
        return trimmed;
    })() : canvas;
    // キャンバスをPNGに変換（領収書は罫線文字があるため高品質PNG使用）
    const pngDataUrl = exportCanvas.toDataURL('image/png');
    const pngBase64 = (pngDataUrl.split(',')[1]) || '';
    
    // 履歴アイテムにデータを設定
    historyItem.data = pngDataUrl;
    
    // 履歴を保存
    addHistory(historyItem).then(() => {
        console.log('領収書履歴保存完了:', historyItem.managementId);
    });
    
    const hasNativePrint = Boolean(window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.nativePrint);

    if (hasNativePrint && pngBase64) {
        console.log('🖨️ ネイティブ用にPNGを直接送信（高画質）');
        executePrint(pngBase64, 'receipt');
    } else {
        // jsPDFを使用してPDFを生成（Web版やPNG生成失敗時のフォールバック）
        const { jsPDF } = window.jspdf;
        const pdfHeight = Math.max(40, Math.round(exportCanvas.height / mmToPx));
        const outputWidthMm = printableWidthMm;
        
        const pdf = new jsPDF({
            orientation: 'portrait',
            unit: 'mm',
            format: [outputWidthMm, pdfHeight],
            compress: true  // PDF圧縮を有効化
        });
        
        pdf.internal.pageSize.width = outputWidthMm;
        pdf.internal.pageSize.height = pdfHeight;
        pdf.addImage(pngDataUrl, 'PNG', 0, 0, outputWidthMm, pdfHeight);
        
        const pdfBase64 = pdf.output('datauristring').split(',')[1];
        const thisPage = window.location.href;
        const printUrl = generatePrintUrl(pdfBase64, thisPage);
        
        if (hasNativePrint) {
            executePrint(pdfBase64, 'receipt');
        } else {
            executePrint(printUrl);
        }
    }
    
    console.log('🧾 領収書印刷が完了しました, デバイス=' + (isAndroid() ? 'Android' : 'iOS'));
    
    // 印刷完了後、発行元モードに戻る
    setTimeout(() => {
        resetAllModes();
        showSection(returnMode);
    }, 1000);
}

// 領収書用テキスト折り返し関数
function wrapTextForReceipt(text, maxWidth, fontSize) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    ctx.font = `${fontSize}px ${ROUNDED_THERMAL_FONT_STACK}`;
    
    const lines = [];
    const words = text.split('');
    let currentLine = '';
    
    for (let i = 0; i < words.length; i++) {
        const testLine = currentLine + words[i];
        const metrics = ctx.measureText(testLine);
        
        if (metrics.width > maxWidth && currentLine !== '') {
            lines.push(currentLine);
            currentLine = words[i];
        } else {
            currentLine = testLine;
        }
    }
    
    if (currentLine) {
        lines.push(currentLine);
    }
    
    return lines;
}

// 下部余白を画像印刷と共通ロジックで算出（SM-S210iの巻き取り挙動を統一）
function calculateSharedBottomMargin(hasDateTime, hasQr, mmToPxOverride) {
    const profile = getThermalPrinterProfile();
    const mmToPx = typeof mmToPxOverride === 'number' ? mmToPxOverride : profile.mmToPx;
    const printableWidthMm = profile.printableWidthMm || profile.widthMm || 58;
    const normalizedName = (profile.name || '').toString().toUpperCase();
    const isNarrow48mm = printableWidthMm <= 50 || normalizedName.includes('TM-P20');

    const pickMargin = (base, dateOnly, qrOnly, both) => {
        if (hasDateTime && hasQr) return both;
        if (!hasDateTime && hasQr) return qrOnly;
        if (hasDateTime && !hasQr) return dateOnly;
        return base;
    };

    const marginMm = isNarrow48mm
        ? pickMargin(4.0, 12.0, 21.0, 15.0)  // プレビュー用途でさらに5mm削減 (48mm)
        : pickMargin(5.0, 16.0, 31.0, 21.0);  // プレビュー用途でさらに5mm削減 (58mm)

    return Math.round(marginMm * mmToPx);
}

// --- 画像印刷 ---
function sendToPrintAssist(event) {
    event.preventDefault();

        }, 10000); // 10秒でタイムアウト

            console.error('❌ 画像読み込みエラー');
            alert('画像の読み込みに失敗しました。');
        };
        
        img.onload = function() {
            clearTimeout(imageLoadTimeout); // タイムアウトをクリア
            let origW = img.naturalWidth;
            let origH = img.naturalHeight;
            let ratio = Math.min(paperWidth / origW, 1);
            let imgW = Math.round(origW * ratio);
            let imgH = Math.round(origH * ratio);
            let x = Math.round((paperWidth - imgW) / 2);
            let y = 2;
            const isDateTimeEnabled = selectedChip === 'with';
            const topMargin = 2;
            const bottomMargin = isDateTimeEnabled ? 16 : 18;
            const totalHeight = topMargin + imgH + (isDateTimeEnabled ? 16 : 0) + bottomMargin;
            const selectedCopies = parseInt(document.getElementById('copiesSelect').value);
            
            function printImageCopy() {
                // 新しいキャンバスで全体を合成
                const compositeCanvas = document.createElement('canvas');
                const compositeCtx = compositeCanvas.getContext('2d', { 
                    alpha: false,
                    willReadFrequently: false,
                    colorSpace: 'srgb',
                    desynchronized: false
                });
                
                const printerProfile = typeof getThermalPrinterProfile === 'function' ? getThermalPrinterProfile() : null;
                const normalizedPrinterName = (printerProfile?.name || '').toString().toUpperCase();
                const isSmS210i = normalizedPrinterName.includes('SM-S210');
                const printableWidthMm = (printerProfile && (printerProfile.printableWidthMm || printerProfile.widthMm))
                    ? (printerProfile.printableWidthMm || printerProfile.widthMm)
                    : 58;
                const mmToPx = isSmS210i ? 8 : (printerProfile?.mmToPx || 11.8);
                const canvasWidth = isSmS210i ? 384 : Math.round(printableWidthMm * mmToPx);
                const pxPerMillimeter = mmToPx;
                
                // アップロードされた画像を読み込み
                const uploadedImg = new Image();
                uploadedImg.crossOrigin = 'anonymous'; // 画像品質向上
                uploadedImg.onerror = function() {
                    console.error('❌ 画像の読み込みに失敗しました');
                    alert('画像の読み込みに失敗しました。画像ファイルを確認してください。');
                };
                uploadedImg.onload = function() {
                    // 画像サイズの検証
                    if (!uploadedImg.naturalWidth || !uploadedImg.naturalHeight || uploadedImg.naturalWidth === 0 || uploadedImg.naturalHeight === 0) {
                        console.error('❌ 画像サイズが不正です');
                        alert('画像サイズが不正です。別の画像を選択してください。');
                        return;
                    }

                    const referenceOverlayWidth = Math.round(58 * 11.8);
                    const overlayScale = Math.max(0.56, Math.min(1, canvasWidth / referenceOverlayWidth));
                    const overlayDateFontSize = Math.max(34, Math.round(60 * overlayScale));
                    const overlayQrSize = Math.max(100, Math.round(180 * overlayScale));
                    const overlayQrX = Math.max(16, Math.round(25 * overlayScale));
                    const overlayDateOffsetXWithQr = Math.max(68, Math.round(110 * overlayScale));
                    const overlayGapWithQr = Math.max(8, Math.round(20 * overlayScale));
                    const overlayGapWithoutDateQr = Math.max(20, Math.round(40 * overlayScale));
                    const overlayDateBottomGap = Math.max(24, Math.round(50 * overlayScale));
                    const imageBottomMarginReference = (isDateTimeEnabled && qrPrintEnabled)
                        ? 204

// --- テキスト印刷 ---
function wrapText(text) {
    text = toZenkaku(text);
    const lines = [];
    const paragraphs = text.split('\n');
    
    for (let paragraph of paragraphs) {
        if (paragraph.length === 0) {
            lines.push('');
            continue;
        }
        
        let remainingText = paragraph;
        while (remainingText.length > 0) {
            let currentLine = '';
            let charCount = 0;
            let widthCount = 0;
            
            for (let i = 0; i < remainingText.length; i++) {
                const char = remainingText[i];
                const isFullWidth = char.match(/[^\x01-\x7E]/) ? true : false;
                const charWidth = isFullWidth ? 2 : 1;
                
                // 文字数制限の判定（テキストボックスと同じルール）
                let shouldBreak = false;
                if (isFullWidth && charCount >= 15) {
                    shouldBreak = true;
                } else if (!isFullWidth && charCount >= 23) {
                    shouldBreak = true;
                } else if (widthCount + charWidth > 30) { // 混在時は全角15文字相当
                    shouldBreak = true;
                }
                
                if (shouldBreak) break;
                
                currentLine += char;
                charCount++;
                widthCount += charWidth;
            }
            
            // 空行でない場合のみ追加
            if (currentLine.length > 0) {
                lines.push(currentLine);
                remainingText = remainingText.substring(currentLine.length);
            } else {
                // 1文字も入らない場合は強制的に1文字追加（無限ループ防止）
                lines.push(remainingText[0]);
                remainingText = remainingText.substring(1);
            }
        }
    }
    return lines;
}
function safeEncodeURIComponent(str) {
    return encodeURIComponent(str)
        .replace(/!/g, '%21')
        .replace(/'/g, '%27')
        .replace(/\(/g, '%28')
        .replace(/\)/g, '%29')
        .replace(/\*/g, '%2A')
        .replace(/%20/g, '%20');
}

        }
        
        const topMargin = 24; // 上余白3mm
        const canvasHeight = Math.round(topMargin + textHeight + bottomMargin);
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;
        
        // 背景を白にする
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);
        
        // テキスト描画設定
        ctx.fillStyle = '#000000';
        ctx.font = `${textFontSize}px ${ROUNDED_THERMAL_FONT_STACK}`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        
        // 真ん中の位置を正確に計算（中央揃え）
        const exactCenterX = Math.round(canvasWidth / 2); // 完全中央揃え
        
        // テキストを描画（上部余白3mm）
        let yPos = 24; // 上余白3mm
        for (let i = 0; i < lines.length; i++) {
            ctx.fillText(lines[i], exactCenterX, yPos); // 真ん中に配置
            yPos += lineHeight;
        }
        
        // QRコードを生成して左側に配置（チェックボックス確認）
        let qrCodeCanvas = null;
        // console.log('テキスト印刷 - QRチェックボックス状態:', qrPrintEnabled);
        if (qrPrintEnabled) {
            // console.log('QRコード生成開始（テキスト）');
            const printTimestamp = window.restoredDateTime || Date.now();
            const historyItem = {
                type: 'text',
                mode: 'text',
                data: textInput.value,
                dateTime: selectedTextChip,
                copies: selectedTextCopies,
                created: Date.now(),
                timestamp: printTimestamp,
                qrPrinted: qrPrintEnabled // 確実にチェックボックスの状態を保存
            };
            
            // 先に履歴を保存してからQRコード生成
            const qrData = generateQRData(historyItem);
            if (qrData) {
                // 履歴を即座に保存
                addHistory(historyItem).then(() => {
                    console.log('履歴保存完了:', historyItem.managementId);
                });
                
                qrCodeCanvas = generateQRCode(qrData);
                if (qrCodeCanvas) {
                    const qrSize = 180; // QRコードのサイズ（1.2倍）
                    const qrX = 25; // 左端から25pxの位置
                    const textEndY = yPos;
                    let qrY;
                    if (isDateTimeEnabled) {
                        // 日付・時刻ありの場合：日付・時刻の左側に配置
                        qrY = textEndY + 20; // テキストの下、日付の横
                    } else {
                        // 日付・時刻なしの場合：画像・手書きと同じ方式で印刷範囲内に調整
                        qrY = Math.max(textEndY - qrSize + 10, textEndY + 10);
                    }
                    // console.log('QRコード描画位置:', qrX, qrY, qrSize);
                    drawCrispQRCode(ctx, qrCodeCanvas, qrX, qrY, qrSize);
                }
            }
        } else {
            // console.log('QRコードなしで印刷（テキスト）');
        }
        
        // 日付・時刻を描画
        if (isDateTimeEnabled) {
            // 履歴から復元された場合はその時刻を使用、新規印刷は現在時刻
            const dateTimeToUse = window.restoredDateTime ? new Date(window.restoredDateTime) : new Date();
            const year = dateTimeToUse.getFullYear();
            const month = dateTimeToUse.getMonth() + 1;
            const day = dateTimeToUse.getDate();
            const hour = dateTimeToUse.getHours();
            const minute = dateTimeToUse.getMinutes();
            const second = dateTimeToUse.getSeconds();
            
            yPos += lineHeight * 0.3; // 余白を小さく
            
            // 月と日が両方2桁の場合、フォントサイズを自動縮小
            const isMonthTwoDigits = month >= 10;
            const isDayTwoDigits = day >= 10;
            const needsSmaller = isMonthTwoDigits && isDayTwoDigits;
            const adjustedDateFontSize = needsSmaller 
                ? Math.round(dateFontSize * 0.85) 
                : dateFontSize;
            
            // 日付・時刻用のフォント設定
            ctx.textAlign = 'center'; // 常に中央揃え
            const dateLineHeight = dateFontSize * 1.2;
            
            // QRコードの有無でX座標を調整（中央揃えのまま）
            let dateTimeX;
            // 現在のチェックボックス状態を直接確認
            const currentQrEnabled = qrPrintEnabled;
            if (currentQrEnabled) {
                // QRコード印刷ありの場合：QRコードの右側に配置
                dateTimeX = Math.round(canvasWidth / 2) + 110; // 中央より右に110px移動
                yPos += 20; // QRありの場合20px下に移動
            } else {
                // QRコード印刷なしの場合：完全に中央配置
                dateTimeX = Math.round(canvasWidth / 2); // 完全中央
            }
            
            // 日付行（縮小サイズ適用）
            ctx.font = `${adjustedDateFontSize}px ${ROUNDED_THERMAL_FONT_STACK}`;
            const dateText = `${year}年${month}月${day}日`;
            ctx.fillText(dateText, dateTimeX, yPos);
            yPos += dateLineHeight;
            
            // 時刻行（元のサイズ）
            ctx.font = `${dateFontSize}px ${ROUNDED_THERMAL_FONT_STACK}`;
            const timeText = `${hour}時${minute}分${second}秒`;
            ctx.fillText(timeText, dateTimeX, yPos);
        }
        
        // キャンバスをJPEGに変換（高品質90%）
        const jpegDataUrl = canvas.toDataURL('image/jpeg', 0.90);
        
        // jsPDFを使用してPDFを生成
        const { jsPDF } = window.jspdf;
        const pdfHeight = Math.round(canvasHeight / mmToPx);
        
        const pdf = new jsPDF({
            orientation: 'portrait',
            unit: 'mm',
            format: [58, pdfHeight],
            compress: true  // PDF圧縮を有効化
        });
        
        // PDFの設定を直接操作
        pdf.internal.pageSize.width = 58;
        pdf.internal.pageSize.height = pdfHeight;
        
        // JPEG画像をPDFに追加（PNGより軽量）
        pdf.addImage(jpegDataUrl, 'JPEG', 0, 0, 58, pdfHeight);
        
        // PDFをBase64形式で取得
        const pdfBase64 = pdf.output('datauristring').split(',')[1];
        
        let thisPage = window.location.href;
        
        // iOS/Android両対応の印刷URLを生成
        let printUrl = generatePrintUrl(pdfBase64, thisPage);
        
        // 【革新的枚数印刷システム】sessionStorageによる永続化方式
        
        console.log(`テキスト印刷開始: 総枚数=${selectedTextCopies}枚, デバイス=${isAndroid() ? 'Android' : 'iOS'}`);
        
        // 枚数印刷情報をsessionStorageに保存
        if (selectedTextCopies > 1) {
            const printJob = {
                type: 'text',
                totalCopies: selectedTextCopies,
                currentCopy: 1,
                pdfData: pdfBase64,
                thisPage: thisPage,
                timestamp: Date.now()
            };
            sessionStorage.setItem('printJob', JSON.stringify(printJob));
            console.log(`テキスト印刷ジョブ保存: ${selectedTextCopies}枚中1枚目実行`);
        }
        
        // 1枚目を印刷（ネイティブアプリの場合はBase64、Web版はURL）
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.nativePrint) {
            executePrint(pdfBase64, 'text');
        } else {
            executePrint(printUrl);
        }
        
    }
    
    // 現在の1枚を印刷（シンプル実行）
    printTextCopy();
    
    // QRコードなしの場合のみ履歴保存
    if (!qrPrintEnabled) {
        addHistory({
            type: 'text',
            mode: 'text',
            data: textInput.value,
            dateTime: selectedTextChip,
            copies: selectedTextCopies,
            qrPrinted: false,
            created: Date.now()
        });
    }
    
    // 印刷完了後、発行元モードに戻る
    setTimeout(() => {
        resetAllModes();
        showSection(returnMode);
    }, 1000);
}

// テキスト入力の自動改行機能
function checkTextInputLimit(textarea) {
    const text = textarea.value;
    const cursorPosition = textarea.selectionStart;
    const lines = text.split('\n');
    let newText = '';
    let newCursorPosition = cursorPosition;
    let cursorAdjustment = 0;
    
    for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        let processedLine = '';
        let charCount = 0;
        let widthCount = 0;
        
        for (let j = 0; j < line.length; j++) {
            const char = line[j];
            const isFullWidth = char.match(/[^\x01-\x7E]/) ? true : false;
            const charWidth = isFullWidth ? 2 : 1;
            
            // 文字数制限の判定
            let shouldBreak = false;
            if (isFullWidth && charCount >= 15) {
                shouldBreak = true;
            } else if (!isFullWidth && charCount >= 23) {
                shouldBreak = true;
            } else if (widthCount + charWidth > 30) { // 混在時は全角15文字相当
                shouldBreak = true;
            }
            
            if (shouldBreak) {
                // 自動改行を挿入（最後の文字が改行でない場合のみ）
                if (processedLine.length > 0 && processedLine[processedLine.length - 1] !== '\n') {
                    processedLine += '\n';
                    if (newText.length + processedLine.length <= cursorPosition) {
                        cursorAdjustment += 1; // 改行文字分カーソル位置を調整
                    }
                }
                charCount = 1; // 新しい行の最初の文字
                widthCount = charWidth;
            } else {
                charCount++;
                widthCount += charWidth;
            }
            
            processedLine += char;
        }
        
        newText += processedLine;
        if (i < lines.length - 1) {
            newText += '\n';
        }
    }
    
    // テキストエリアの内容を更新
    if (newText !== text) {
        textarea.value = newText;
        // カーソル位置を調整
        const newPosition = cursorPosition + cursorAdjustment;
        textarea.setSelectionRange(newPosition, newPosition);
    }
}

function autoWrap(textarea) {
    const text = textarea.value;
    const wrappedLines = wrapText(text);
    textarea.value = wrappedLines.join('\n');
}

// QRコード画像の生成
function generateQRCode(data) {
    try {
        // qrcodeライブラリの確認
        if (typeof qrcode === 'undefined') {
            console.error('QRコード生成ライブラリが読み込まれていません');
            return null;
        }
        
        // データの長さを制限（QRコードの容量制限対応・短いほど読み取りやすい）
        if (data.length > 100) {
            console.warn('QRコードデータが長すぎます:', data.length);
            data = data.substring(0, 100);
        }
        
        // エラー訂正レベルM（中程度・約15%復元可能）
        // ※Hは最高品質だが複雑になり読み取りにくい、Mで十分
        const qr = qrcode(0, 'M');
        qr.addData(data);
        qr.make();
        
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const size = 200; // QRコードサイズ
        const moduleCount = qr.getModuleCount();

        // 【超高解像度レンダリング】5倍解像度で描画（印刷品質向上）
        const renderScale = 5; // 5倍解像度（印刷時の鮮明度最大化）
        canvas.width = size * renderScale;
        canvas.height = size * renderScale;
        ctx.scale(renderScale, renderScale);
        
        // Quiet Zone（余白）をモジュール数に基づいて計算
        // QR規格では最低4モジュール分の余白が必要
        const quietZoneModules = 4; // 4モジュール分の余白
        const totalModules = moduleCount + (quietZoneModules * 2);
        const cellSize = size / totalModules;
        const margin = cellSize * quietZoneModules;
        
        // 【最高画質設定】アンチエイリアス完全無効化
        ctx.imageSmoothingEnabled = false;
        ctx.webkitImageSmoothingEnabled = false;
        ctx.mozImageSmoothingEnabled = false;
        ctx.msImageSmoothingEnabled = false;
        
        // 背景を完全な白で塗りつぶし
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, size, size);
        
        // 【印刷品質最適化】完全な黒で鮮明に印刷
        ctx.fillStyle = '#000000'; // 完全な黒（2値化で確実に黒になる）
        
        // QRコードを高精度描画（余白を考慮、セルを完全に塗りつぶし）
        for (let row = 0; row < moduleCount; row++) {
            for (let col = 0; col < moduleCount; col++) {
                if (qr.isDark(row, col)) {
                    // より正確なピクセル位置計算（隙間をなくす）
                    const x = margin + (col * cellSize);
                    const y = margin + (row * cellSize);
                    // セルサイズを少し大きめに描画して隙間を完全になくす
                    const w = cellSize + 0.5;
                    const h = cellSize + 0.5;
                    ctx.fillRect(x, y, w, h);
                }
            }
        }
        
        // QRコード全体を完全に2値化（閾値127で標準的に）
        const finalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const finalBuffer = finalImageData.data;
        for (let i = 0; i < finalBuffer.length; i += 4) {
            // 標準的な2値化（閾値127 = 中間値）
            const luminance = finalBuffer[i];
            const value = luminance > 127 ? 255 : 0;
            finalBuffer[i] = finalBuffer[i + 1] = finalBuffer[i + 2] = value;
            finalBuffer[i + 3] = 255;
        }
        ctx.putImageData(finalImageData, 0, 0);
        
        console.log('🔥 高品質QRコード生成完了（エラー訂正:M, Quiet Zone:4モジュール）:', 
                   'サイズ=' + size + 'px', 
                   'モジュール数=' + moduleCount, 
                   'セルサイズ=' + cellSize.toFixed(2) + 'px',
                   'データ長=' + data.length);
        return canvas;
    } catch (error) {
        console.error('QRコード生成エラー:', error);
        return null;
    }
}

async function toggleFlashlight() {
    try {
        const flashlightBtn = document.getElementById('flashlightToggle');
        
        if (!currentStream) {
            console.warn('カメラストリームが利用できません');
            return;
        }
        
        const track = currentStream.getVideoTracks()[0];
        if (!track) {
            console.warn('ビデオトラックが見つかりません');

        }
        
        const capabilities = track.getCapabilities();
        if (!capabilities.torch) {
            console.warn('このデバイスはフラッシュライトをサポートしていません');

        });

        if (flashlightEnabled) {

            flashlightBtn.textContent = '🔦';

            flashlightBtn.textContent = '💡';

        alert('ライトの制御に失敗しました');

async function startQRReader() {

    const videoElement = document.getElementById('qrReader');
    const statusElement = document.getElementById('qrReaderStatus');

    videoElement.style.width = '100%';
    videoElement.style.height = '100%';
    videoElement.style.objectFit = 'cover';
    
    // 既存のスキャナーがあれば確実に停止
    if (window.qrScanner) {
        console.log('既存のスキャナーを停止中...');
        try {
            await window.qrScanner.stop();
            window.qrScanner.destroy();
        } catch (e) {
            console.warn('既存スキャナー停止時のエラー:', e);
        }
        window.qrScanner = null;
    }
    
    // 既存のストリームも停止
    if (videoElement.srcObject) {
        try {
            videoElement.srcObject.getTracks().forEach(track => {
                track.stop();
                console.log('ビデオトラック停止:', track.kind);
            });
            videoElement.srcObject = null;
        } catch (e) {
            console.warn('ビデオストリーム停止エラー:', e);
        }
    }
    
    // タイムアウト設定（45秒に延長）
    const timeoutId = setTimeout(() => {
        console.warn('QRスキャナータイムアウト');
        closeQRReader();
        alert('カメラの起動に時間がかかっています。\n・カメラの権限を許可してください\n・明るい場所でお試しください');
    }, 45000);
    
    try {
        console.log('🚀 QRスキャナー起動開始');
        // まずjsQRライブラリを試す（最も安定・高速）
        if (await tryJsQRLibrary(videoElement, statusElement)) {
            clearTimeout(timeoutId);
            return;
        }
        
        // フォールバック1: QrScannerライブラリを試す（高感度版）
        if (await tryQrScannerLibrary(videoElement, statusElement)) {
            clearTimeout(timeoutId);
            return;
        }
        
        // フォールバック2: ZXingライブラリを試す
        if (await tryZXingLibrary(videoElement, statusElement)) {
            clearTimeout(timeoutId);
            return;
        }
        
        // 全て失敗した場合
        clearTimeout(timeoutId);
        statusElement.textContent = 'QRスキャナーの初期化に失敗しました';
        setTimeout(() => {
            closeQRReader();
            alert('QRコードリーダーが利用できません\nブラウザまたはデバイスがサポートしていない可能性があります');
        }, 3000);
    } catch (error) {
        clearTimeout(timeoutId);
        console.error('QRスキャナー開始エラー:', error);
        closeQRReader();
        alert('QRコードリーダーの開始中にエラーが発生しました');
    }
}

// jsQRライブラリを使用（最も安定・高速・高精度）
async function tryJsQRLibrary(videoElement, statusElement) {
    try {
        console.log('🔍 jsQRライブラリを起動中...');
        
        // ライブラリの確認
        if (typeof jsQR === 'undefined') {
            await new Promise(resolve => setTimeout(resolve, 1000));
            if (typeof jsQR === 'undefined') {
                throw new Error('jsQRライブラリが読み込まれていません');
            }
        }
        
        // MediaStreamを取得
        let stream;
        if (currentStream && currentStream.active) {
            console.log('✅ 既存のカメラストリームを再利用');
            stream = currentStream;
        } else {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { 
                    facingMode: 'environment',
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                }
            });
            currentStream = stream;
        }
        
        videoElement.srcObject = stream;
        await videoElement.play();
        
        // Canvasを作成（OffscreenCanvas使用で高速化）
        const canvas = new OffscreenCanvas(videoElement.videoWidth, videoElement.videoHeight);
        const context = canvas.getContext('2d');
        
        // スキャナーオブジェクトを作成
        window.qrScanner = {
            scanning: true,
            stop: () => {
                window.qrScanner.scanning = false;
                if (window.qrScanner.timer) {
                    clearInterval(window.qrScanner.timer);
                }
            },
            destroy: () => {
                window.qrScanner.scanning = false;
                if (window.qrScanner.timer) {
                    clearInterval(window.qrScanner.timer);
                }
            },
            timer: null
        };
        
        // 定期的にスキャン（200ms間隔 - Qiita記事参考）
        window.qrScanner.timer = setInterval(() => {
            if (!window.qrScanner.scanning) return;
            
            try {
                // ビデオからImageDataを取得
                context.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                
                // jsQRでスキャン
                const code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: "dontInvert" // 反転処理をスキップして高速化
                });
                
                if (code && code.data) {
                    console.log('✅ jsQR読み取り成功:', code.data.substring(0, 30) + '...');
                    handleQRScanResult(code.data);
                }
            } catch (e) {

    } catch (error) {

}
