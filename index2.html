    // 9文字以内か10文字以上かで表示形式を決定
    if (companyNameLength <= 9) {
        companyNameFormat = 'short'; // 宛名は「○○○○○○○○○」形式（1行）
    } else {
        companyNameFormat = 'long'; // 宛名は改行して「○○○○○○○○○○○○○○」形式（2行）
    }
    
    // 但し書きの文字数チェック（最大15文字、6文字で表示変更）
    let memoFormat = ''; // 'short' or 'long'
    if (withMemo && memo) {
        // 6文字以内か7文字以上かで表示形式を決定
        if (memo.length <= 6) {
            memoFormat = 'short'; // 但し ○○○○○○ として
        } else {
            memoFormat = 'long'; // 但し改行○○○○○○○○○○○○○○○改行として
        }
    }
    
    // 「宛名記入不可」かどうかをチェック
    const isNoNameReceipt = receiptNoNameEnabled && receiptNoNameData && receiptNoNameData.category === '領収書宛名記入不可';
    
    // 領収書のテキスト内容を構築
    let receiptLines = [];
    receiptLines.push('領収書');
    receiptLines.push('');
    
    // ✔️不可ボタンが選択されているかチェック
    console.log('🔍 [executeReceiptPrint] receiptNoNameEnabled:', receiptNoNameEnabled);
    console.log('🔍 [executeReceiptPrint] receiptNoNameData:', receiptNoNameData);
    
    if (isNoNameReceipt) {
        // 領収書宛名記入不可の場合
        receiptLines.push('');
        receiptLines.push('※領収書宛名・但し書き記入不可※');
        receiptLines.push('');
    } else if (!receiptNoNameEnabled) {
        // 通常の領収書
        receiptLines.push('こちらでお願い致します。');
        
        // 小文字オプションが選択されている場合のみ追加
        if (receiptSmallTextEnabled) {
            receiptLines.push('(小文字でお願い致します。)');
        }
        receiptLines.push('');
        
        console.log('📄 通常の文言を追加します');
        receiptLines.push('領収書に｢宛名｣を記入して頂き');
        receiptLines.push('宛名が合っておりましたら');
        receiptLines.push('ボールペンまたは印鑑で');
        receiptLines.push('下部の枠に印を付けて下さい✔️');
    } else {
        // ✔️記入・取得不可（領収書宛名記入不可以外）
        receiptLines.push('こちらでお願い致します。');
        
        if (receiptSmallTextEnabled) {
            receiptLines.push('(小文字でお願い致します。)');
        }
        receiptLines.push('');
    }
    
    const printText = receiptLines.join('\n');
    
    // フォント設定（罫線文字対応のため）
    ctx.font = buildCanvasFont(textFontSize, { fallbackStack: CANVAS_FONT_STACK_GOTHIC });
    ctx.fillStyle = '#000000';
    
    // テキストの行数から高さを計算
    const lines = printText.split('\n');
    const lineHeight = textFontSize * 1.2;
    const companyLineHeight = companyNameFontSize * 1.2; // 宛名行の高さ
    let textHeight = 0;
    
    // 各行の高さを個別に計算
    for (let i = 0; i < lines.length; i++) {
        textHeight += lineHeight;
    }
    
    // 宛名行の高さを追加（新仕様：9文字以内/10文字以上）
    if (!isNoNameReceipt) {
        if (companyNameFormat === 'short') {
            // 9文字以内: 宛名は「○○○○○○○○○」形式（1行）
            textHeight += companyLineHeight * 1.2; // 1行分
        } else {
            // 10文字以上: 宛名は改行して「○○○○○○○○○○○○○○」形式（3行）
            textHeight += labelFontSize * 1.2; // "宛名は"
            textHeight += companyLineHeight * 1.2; // 「宛名内容」
        }
        
        // 但し書きの高さを追加（新仕様：6文字以内/7文字以上）
        if (withMemo && memo) {
            if (memoFormat === 'short') {
                // 6文字以内: 但し ○○○○○○ として形式（1行）
                textHeight += textFontSize * 1.2; // 1行分
            } else {
                // 7文字以上: 但し改行○○○○○○○○○○○○○○○改行として（3行）
                textHeight += labelFontSize * 1.2; // "但し"
                textHeight += textFontSize * 1.2; // メモ内容
                textHeight += labelFontSize * 1.2; // "代として"
            }
        }
    }
    
    // 金額の高さを追加
    if (amount) {
        textHeight += dateFontSize * 1.2; // 金額行の高さ
    }
    
    // ✔️不可の高さを追加
    if (receiptNoNameEnabled && receiptNoNameData) {
        const category = receiptNoNameData.category || '';
        const subcategory = receiptNoNameData.subcategory || '';
        const detail1 = receiptNoNameData.detail1 || '';
        const detail2 = receiptNoNameData.detail2 || '';
        
        if (category === '領収書宛名記入不可') {
            // 宛名記入不可の場合の高さ計算
            textHeight += textFontSize * 1.2; // 「領収書宛名・但し書き記入不可」
            textHeight += textFontSize * 1.2; // 「(相手確認済)」
            textHeight += textFontSize * 0.3; // 余白
            textHeight += labelFontSize * 1.2; // 区分行
            
            // サブカテゴリに応じて詳細行の高さを追加
            if (subcategory === '車内' && detail1) {
                // 列車名の行数を計算（幅20で改行）
                let trainNameHeight = 0;
                let currentWidth = 0;
                let lineCount = 1;
                
                for (let i = 0; i < detail1.length; i++) {
                    const char = detail1[i];
                    const isFullWidth = char.match(/[^\x01-\x7E]/) ? true : false;
                    const charWidth = isFullWidth ? 2 : 1;
                    
                    if (currentWidth + charWidth > 20) {
                        lineCount++;
                        currentWidth = charWidth;
                    } else {
                        currentWidth += charWidth;
                    }
                }
                
                trainNameHeight = labelFontSize * 1.2 * lineCount;
                textHeight += trainNameHeight;
                
                // 列車番号が別行になる可能性
                if (detail2) {
                    // 列車名の最初の行の幅を計算
                    let firstLineWidth = 0;
                    currentWidth = 0;
                    for (let i = 0; i < detail1.length; i++) {
                        const char = detail1[i];
                        const isFullWidth = char.match(/[^\x01-\x7E]/) ? true : false;
                        const charWidth = isFullWidth ? 2 : 1;
                        
                        if (currentWidth + charWidth > 20) break;
                        firstLineWidth += charWidth;
                        currentWidth += charWidth;
                    }
                    
                    if (firstLineWidth >= 14 || lineCount > 1) {
                        textHeight += labelFontSize * 1.2; // 列車番号の別行
                    }
                }
            } else if (detail1) {
                // 店舗系の場合
                if (detail1.length <= 14) {
                    textHeight += labelFontSize * 1.2; // 1行
                } else {
                    // 14文字で改行
                    const lines = Math.ceil(detail1.length / 14);
                    textHeight += labelFontSize * 1.2 * lines;
                }
                
                if (detail2) {
                    textHeight += labelFontSize * 1.2; // detail2の行
                }
            }
            
            // 説明文の高さを追加（5行、下部余白なし）
            textHeight += textFontSize * 0.5; // 余白
            textHeight += textFontSize * 1.2 * 5; // 説明文5行
        } else {
            // ✔️記入・取得不可（領収書宛名記入不可以外）のカテゴリー
            const category = receiptNoNameData.category || '';
            const detail1 = receiptNoNameData.detail1 || '';
            const detail2 = receiptNoNameData.detail2 || '';
            
            textHeight += textFontSize * 1.2; // ✔️記入不可(相手確認済)
            textHeight += textFontSize * 0.2; // 余白
            textHeight += labelFontSize * 1.2; // 区分行
            
            // 詳細行の高さを正確に計算
            if (category === '車内' && detail1) {
                // 列車名の行数を計算
                let lineCount = 1;
                let currentWidth = 0;
                for (let i = 0; i < detail1.length; i++) {
                    const char = detail1[i];
                    const isFullWidth = char.match(/[^\x01-\x7E]/) ? true : false;
                    const charWidth = isFullWidth ? 2 : 1;
                    
                    if (currentWidth + charWidth > 20) {
                        lineCount++;
                        currentWidth = charWidth;
                    } else {
                        currentWidth += charWidth;
                    }
                }
                
                textHeight += labelFontSize * 1.2 * lineCount;
                
                // 列車番号が別行になる可能性
                if (detail2) {
                    let firstLineWidth = 0;
                    currentWidth = 0;
                    for (let i = 0; i < detail1.length; i++) {
                        const char = detail1[i];
                        const isFullWidth = char.match(/[^\x01-\x7E]/) ? true : false;
                        const charWidth = isFullWidth ? 2 : 1;
                        
                        if (currentWidth + charWidth > 20) break;
                        firstLineWidth += charWidth;
                        currentWidth += charWidth;
                    }
                    
                    if (firstLineWidth >= 14 || lineCount > 1) {
                        textHeight += labelFontSize * 1.2; // 列車番号の別行
                    }
                }
            } else if (category === '店舗' || category === '飲食店' || category === 'ホームセンター' || category === 'コンビニ') {
                // 店舗系の場合
                if (detail1) {
                    if (detail1.length <= 14) {
                        textHeight += labelFontSize * 1.2; // 1行
                    } else {
                        // 14文字で改行
                        const lines = Math.ceil(detail1.length / 14);
                        textHeight += labelFontSize * 1.2 * lines;
                    }
                }
            } else if (category === 'その他(自由記入)' && detail1) {
                textHeight += labelFontSize * 1.2; // 自由記入の内容
            }
            
            // 「領収書に｢宛名｣を記入して頂き」の文言（2行）
            textHeight += textFontSize * 0.3; // 少し余白
            textHeight += textFontSize * 1.2 * 2; // 2行分
        }
    }
    
    // 枠の高さを追加（Canvas APIで描画）
    if (!isNoNameReceipt) {
        const stampBoxHeight = 120;
        textHeight += stampBoxHeight + 30; // 枠の高さ + 上下の余白
    }
    
    // 日付・時刻のスペースを追加（常に有効）
    const dateLineHeight = dateFontSize * 1.2;
    textHeight += dateLineHeight * 2.5; // 日付2行 + 少ない余白
    
    // 下部余白（固定値：領収書は常に日付あり+QRあり）
    const bottomMargin = 204; // 日付あり + QRあり
    
    const topMargin = 24; // 上余白3mm
    const canvasHeight = Math.round(topMargin + textHeight + bottomMargin);
    canvas.width = canvasWidth;
    canvas.height = canvasHeight;
    
    // 背景を白にする
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, canvasWidth, canvasHeight);
    
    // テキスト描画設定
    ctx.fillStyle = '#000000';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    
    // 真ん中の位置を正確に計算（完全中央揃え）
    const exactCenterX = Math.round(canvasWidth / 2); // 完全中央揃え
    
    // テキストを描画（上部余白3mm）
    let yPos = 24; // 上余白3mm
    let memoInserted = false;
    let amountInserted = false;
    let lineIndex = 0; // 実際の行インデックス
    
    for (let i = 0; i < lines.length; i++) {
        ctx.font = buildCanvasFont(textFontSize);
        ctx.textAlign = 'center';
        
        // 「領収書」の行の場合は領収書宛名と連番を追加
        if (i === 0 && lines[i] === '領収書') {
            // 1行目: 「領収書宛名」（左）と連番（右）
            ctx.font = buildCanvasFont(textFontSize, { fallbackStack: CANVAS_FONT_STACK_GOTHIC });
            ctx.textAlign = 'left';
            const receiptTitleX = 30; // 領収書宛名の位置（左端からの距離、調整可能）
            ctx.fillText('領収書宛名', receiptTitleX, yPos);
            
            // 連番を右側に描画（全角数字）
            ctx.textAlign = 'right';
            const numberX = canvasWidth - 30; // 連番の位置（右寄せ）
            ctx.fillText(receiptNumber, numberX, yPos);
            
            yPos += lineHeight;
            lineIndex++; // 1行分進める
            continue; // 通常描画をスキップ
        }
        
        // 通常の行は中央揃えで描画
        ctx.fillText(lines[i], exactCenterX, yPos);
        yPos += lineHeight;
        lineIndex++;
        
        // 「領収書宛名+連番」の次の空行の後に宛名を挿入
        if (lineIndex === 2 && !isNoNameReceipt) { // 2行目（空行）の後、宛名記入不可以外
            ctx.font = buildCanvasFont(companyNameFontSize);
            ctx.textAlign = 'center';
            
            if (companyNameFormat === 'short') {
                // 9文字以内: 宛名は「○○○○○○○○○」形式（1行）
                ctx.fillText(`宛名は「${companyName}」`, exactCenterX, yPos);
                yPos += companyLineHeight * 1.2;
            } else {
                // 10文字以上: 宛名は改行「○○○○○○○○○○○○○○」形式（2行）
                ctx.font = buildCanvasFont(labelFontSize);
                ctx.fillText('宛名は', exactCenterX, yPos);
                yPos += labelFontSize * 1.2;
                
                ctx.font = buildCanvasFont(companyNameFontSize);
                ctx.fillText(`「${companyName}」`, exactCenterX, yPos);
                yPos += companyLineHeight * 1.2;
            }
        }
        
        // 小文字オプションの後に但し書きと金額を挿入
        if (!memoInserted && i >= 3) {
            // 但し書きがある場合は表示
            if (withMemo && memo && (receiptNoNameEnabled && receiptNoNameData && receiptNoNameData.category !== '領収書宛名記入不可' || !isNoNameReceipt)) {
                ctx.font = buildCanvasFont(textFontSize);
                ctx.textAlign = 'center';
                
                if (memoFormat === 'short') {
                    // 6文字以内: 但し ○○○○○○ 代として形式（1行、中央揃え）
                    const suffixText = suffix ? ` ${suffix}として` : '';
                    ctx.fillText(`但し ${memo}${suffixText}`, exactCenterX, yPos);
                    yPos += textFontSize * 1.2;
                } else {
                    // 7文字以上: 但し改行○○○○○○○○○○○○○○○改行代として形式（3行、中央揃え）
                    ctx.font = buildCanvasFont(labelFontSize);
                    ctx.fillText('但し', exactCenterX, yPos);
                    yPos += labelFontSize * 1.2;
                    
                    ctx.font = buildCanvasFont(textFontSize);
                    ctx.fillText(memo, exactCenterX, yPos);
                    yPos += textFontSize * 1.2;
                    
                    ctx.font = buildCanvasFont(labelFontSize);
                    const suffixText = suffix ? `${suffix}として` : '';
                    if (suffixText) {
                        ctx.fillText(suffixText, exactCenterX, yPos);
                        yPos += labelFontSize * 1.2;
                    }
                }
            }
            
            // 金額を描画（但し書きの有無に関わらず、金額が入力されていれば表示）
            if (amount && !amountInserted) {
                // 「金額」ラベルは元の位置（間隔なし）
                
                // 「金額」を左揃えで描画
                const leftAlignX = 30; // 左側の位置（領収書宛名と同じ位置）
                ctx.font = buildCanvasFont(labelFontSize);
                ctx.textAlign = 'left';
                ctx.fillText('金額', leftAlignX, yPos + 6);
                
                // 「¥○○○○円」を右揃えで描画（こちらだけ1mm上げる）
                const rightAlignX = canvasWidth - 30; // 右側の位置（日付と同じ右寄せ）
                ctx.font = buildCanvasFont(dateFontSize);
                ctx.textAlign = 'right';
                ctx.fillText(`¥${amount}円`, rightAlignX, yPos - 5); // 1mm(約3px)上げる
                
                yPos += dateFontSize * 1.2;
                amountInserted = true;
            }
            
            // ✔️不可ボタンが選択されている場合の印字処理（金額の後）
            if (receiptNoNameEnabled && receiptNoNameData && receiptNoNameData.category !== '領収書宛名記入不可') {
                ctx.textAlign = 'center';
                ctx.font = buildCanvasFont(textFontSize);
                
                // ✔️記入不可(相手確認済)を追加
                ctx.fillText('✔️記入不可(相手確認済)', exactCenterX, yPos);
                yPos += textFontSize * 1.2;
                yPos += textFontSize * 0.2; // 少し余白
                
                const category = receiptNoNameData.category || '';
                const detail1 = receiptNoNameData.detail1 || '';
                const detail2 = receiptNoNameData.detail2 || '';
                
                ctx.font = buildCanvasFont(labelFontSize);
                
                if (category === '車内') {
                    // 車内の場合: 区分:車内購入 + 列車名（幅20=全角10文字相当で改行、左寄せ） + 列車番号（右寄せ）
                    ctx.textAlign = 'center';
                    ctx.fillText('区分:車内購入', exactCenterX, yPos);
                    yPos += labelFontSize * 1.2;
                    
                    if (detail1) {
                        const trainName = detail1;
                        const trainNumber = detail2 || '';
                        const leftX = 30;
                        const rightX = canvasWidth - 30;
                        
                        // 列車名を幅20（全角10文字相当）で分割
                        const trainNameLines = [];
                        let currentLine = '';
                        let currentWidth = 0;
                        
                        for (let i = 0; i < trainName.length; i++) {
                            const char = trainName[i];
                            // 全角文字は幅2、半角文字は幅1
                            const isFullWidth = char.match(/[^\x01-\x7E]/) ? true : false;
                            const charWidth = isFullWidth ? 2 : 1;
                            
                            if (currentWidth + charWidth > 20) {
                                // 幅20を超える場合は改行
                                trainNameLines.push(currentLine);
                                currentLine = char;
                                currentWidth = charWidth;
                            } else {
                                currentLine += char;
                                currentWidth += charWidth;
                            }
                        }
                        
                        // 残りの文字を追加
                        if (currentLine) {
                            trainNameLines.push(currentLine);
                        }
                        
                        // 列車名の幅を計算（最初の行の幅で判定）
                        let firstLineWidth = 0;
                        for (let i = 0; i < trainNameLines[0].length; i++) {
                            const char = trainNameLines[0][i];
                            const isFullWidth = char.match(/[^\x01-\x7E]/) ? true : false;
                            firstLineWidth += isFullWidth ? 2 : 1;
                        }
                        
                        // 列車名の幅が14以上の場合、列車番号は別行
                        const needsSeparateLine = firstLineWidth >= 14;
                        
                        if (needsSeparateLine || trainNameLines.length > 1) {
                            // 列車名：各行左寄せで表示
                            ctx.textAlign = 'left';
                            for (let line of trainNameLines) {
                                ctx.fillText(line, leftX, yPos);
                                yPos += labelFontSize * 1.2;
                            }
                            
                            // 列車番号：右寄せで別行に表示（6文字まで）
                            if (trainNumber) {
                                const displayNumber = trainNumber.substring(0, 6);
                                ctx.textAlign = 'right';
                                ctx.fillText(displayNumber, rightX, yPos);
                                yPos += labelFontSize * 1.2;
                            }
                        } else {
                            // 列車名の幅が13以下：列車名と列車番号を同じ行に
                            ctx.textAlign = 'left';
                            ctx.fillText(trainName, leftX, yPos);
                            
                            // 列車番号を右寄せ（6文字まで）
                            if (trainNumber) {
                                const displayNumber = trainNumber.substring(0, 6);
                                ctx.textAlign = 'right';
                                ctx.fillText(displayNumber, rightX, yPos);
                            }
                            yPos += labelFontSize * 1.2;
                        }
                    }
                } else if (category === '店舗' || category === '飲食店' || category === 'ホームセンター' || category === 'コンビニ') {
                    // 店舗系の場合: 区分:店舗名（選択した区分）+ 店舗名（14文字で改行、左寄せ）
                    ctx.textAlign = 'center';
                    ctx.fillText(`区分:${category}`, exactCenterX, yPos);
                    yPos += labelFontSize * 1.2;
                    
                    if (detail1) {
                        const leftX = 30;
                        
                        // 店舗名を14文字ごとに分割
                        const storeNameLines = [];
                        for (let i = 0; i < detail1.length; i += 14) {
                            storeNameLines.push(detail1.substring(i, i + 14));
                        }
                        
                        // 各行を左寄せで表示
                        ctx.textAlign = 'left';
                        for (let line of storeNameLines) {
                            ctx.fillText(line, leftX, yPos);
                            yPos += labelFontSize * 1.2;
                        }
                    }
                } else if (category === 'その他(自由記入)') {
                    // その他の場合: 区分:その他(自由記入) + 内容
                    ctx.textAlign = 'center';
                    ctx.fillText(`区分:${category}`, exactCenterX, yPos);
                    yPos += labelFontSize * 1.2;
                    
                    if (detail1) {
                        ctx.fillText(detail1, exactCenterX, yPos);
                        yPos += labelFontSize * 1.2;
                    }
                }
                
                // 「領収書に｢宛名｣を記入して頂き」の文言を追加
                yPos += textFontSize * 0.3; // 少し余白
                ctx.textAlign = 'center';
                ctx.font = buildCanvasFont(textFontSize);
                ctx.fillText('領収書に｢宛名｣を記入して頂き', exactCenterX, yPos);
                yPos += textFontSize * 1.2;
                ctx.fillText('宛名のご確認お願い致します。', exactCenterX, yPos);
                yPos += textFontSize * 1.2;
            } else if (receiptNoNameEnabled && receiptNoNameData && receiptNoNameData.category === '領収書宛名記入不可') {
                // 領収書宛名記入不可の場合
                ctx.font = buildCanvasFont(textFontSize);
                const leftX = 30;
                
                // 「領収書宛名・但し書き記入不可」（中央揃え）
                ctx.textAlign = 'center';
                ctx.fillText('領収書宛名・但し書き記入不可', exactCenterX, yPos);
                yPos += textFontSize * 1.2;
                
                // 「（相手確認済）」（中央揃え）
                ctx.fillText('（相手確認済）', exactCenterX, yPos);
                yPos += textFontSize * 1.2;
                
                // サブカテゴリ（車内、店舗など）
                const subcategory = receiptNoNameData.subcategory || '';
                const detail1 = receiptNoNameData.detail1 || '';
                const detail2 = receiptNoNameData.detail2 || '';
                
                // 「区分:〇〇〇〇」（中央揃え）
                ctx.font = buildCanvasFont(labelFontSize);
                ctx.textAlign = 'center';
                ctx.fillText(`区分:${subcategory}`, exactCenterX, yPos);
                yPos += labelFontSize * 1.2;
                
                // 詳細情報（車内の場合は列車名・列車番号、店舗の場合は店舗名など）
                if (subcategory === '車内') {
                    // 車内の場合: 列車名（左）と列車番号（右）
                    if (detail1) {
                        const trainName = detail1;
                        const trainNumber = detail2 || '';
                        const rightX = canvasWidth - 30;
                        
                        // 列車名を幅20（全角10文字相当）で分割
                        const trainNameLines = [];
                        let currentLine = '';
                        let currentWidth = 0;
                        
                        for (let i = 0; i < trainName.length; i++) {
                            const char = trainName[i];
                            const isFullWidth = char.match(/[^\x01-\x7E]/) ? true : false;
                            const charWidth = isFullWidth ? 2 : 1;
                            
                            if (currentWidth + charWidth > 20) {
                                trainNameLines.push(currentLine);
                                currentLine = char;
                                currentWidth = charWidth;
                            } else {
                                currentLine += char;
                                currentWidth += charWidth;
                            }
                        }
                        
                        if (currentLine) {
                            trainNameLines.push(currentLine);
                        }
                        
                        // 列車名の幅を計算
                        let firstLineWidth = 0;
                        for (let i = 0; i < trainNameLines[0].length; i++) {
                            const char = trainNameLines[0][i];
                            const isFullWidth = char.match(/[^\x01-\x7E]/) ? true : false;
                            firstLineWidth += isFullWidth ? 2 : 1;
                        }
                        
                        const needsSeparateLine = firstLineWidth >= 14;
                        
                        if (needsSeparateLine || trainNameLines.length > 1) {
                            ctx.textAlign = 'left';
                            for (let line of trainNameLines) {
                                ctx.fillText(line, leftX, yPos);
                                yPos += labelFontSize * 1.2;
                            }
                            
                            if (trainNumber) {
                                const displayNumber = trainNumber.substring(0, 6);
                                ctx.textAlign = 'right';
                                ctx.fillText(displayNumber, rightX, yPos);
                                yPos += labelFontSize * 1.2;
                            }
                        } else {
                            ctx.textAlign = 'left';
                            ctx.fillText(trainName, leftX, yPos);
                            
                            if (trainNumber) {
                                const displayNumber = trainNumber.substring(0, 6);
                                ctx.textAlign = 'right';
                                ctx.fillText(displayNumber, rightX, yPos);
                            }
                            yPos += labelFontSize * 1.2;
                        }
                    }
                } else if (detail1) {
                    // 店舗系の場合: 店舗名を左寄せ、または14文字で改行
                    const storeNameLines = [];
                    
                    if (detail1.length <= 14) {
                        // 14文字以内の場合は1行で表示
                        ctx.textAlign = 'left';
                        ctx.fillText(detail1, leftX, yPos);
                        
                        // detail2があれば右寄せで同じ行に表示
                        if (detail2) {
                            const rightX = canvasWidth - 30;
                            ctx.textAlign = 'right';
                            ctx.fillText(detail2, rightX, yPos);
                        }
                        yPos += labelFontSize * 1.2;
                    } else {
                        // 14文字を超える場合は左寄せで改行
                        for (let i = 0; i < detail1.length; i += 14) {
                            storeNameLines.push(detail1.substring(i, i + 14));
                        }
                        
                        ctx.textAlign = 'left';
                        for (let line of storeNameLines) {
                            ctx.fillText(line, leftX, yPos);
                            yPos += labelFontSize * 1.2;
                        }
                        
                        // detail2があれば右寄せで別行に表示
                        if (detail2) {
                            const rightX = canvasWidth - 30;
                            ctx.textAlign = 'right';
                            ctx.fillText(detail2, rightX, yPos);
                            yPos += labelFontSize * 1.2;
                        }
                    }
                }
                
                // 説明文を追加（中央揃え、5行）
                yPos += textFontSize * 0.5; // 余白
                ctx.textAlign = 'center';
                ctx.font = buildCanvasFont(textFontSize);
                ctx.fillText('宛名並びに但し書きの記入が', exactCenterX, yPos);
                yPos += textFontSize * 1.2;
                ctx.fillText('お断りされた為､本用紙を', exactCenterX, yPos);
                yPos += textFontSize * 1.2;
                ctx.fillText('記録用紙として保管します。', exactCenterX, yPos);
                yPos += textFontSize * 1.2;
                ctx.fillText('領収書と一緒に保管して下さい。', exactCenterX, yPos);
                yPos += textFontSize * 1.2;
                ctx.fillText('　　ときT❜s鉄道部 T❜s time', exactCenterX, yPos);
                yPos += textFontSize * 1.2;
                
                // 下部余白を削除（bottomMarginで管理）
            }
            
            memoInserted = true;
        }
    }
    
    // 枠をCanvas APIで直接描画（✔️不可の場合は枠なし）
    if (!receiptNoNameEnabled && !isNoNameReceipt) {
        const boxWidth = 280; // 枠の幅（大きくしました）
        const boxHeight = 120; // 枠の高さ（大きくしました）
        const boxX = exactCenterX - boxWidth / 2; // 中央揃え
        const boxY = yPos + 5; // 上の余白を減らす
        
        // 枠を描画
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 3; // 線の太さ（少し太くしました）
        ctx.strokeRect(boxX, boxY, boxWidth, boxHeight);
        
        // 枠の高さ分yPosを進める
        yPos = boxY + boxHeight + 10; // 下の余白も減らす
    }
    
    // QRコードを生成して左側に配置（テキスト印刷と同じ方式）
    let qrCodeCanvas = null;
    
    // 履歴アイテムを先に作成
    const timestamp = Date.now();
    // 内容ベースの一意なIDを生成（重複防止のため）
    const contentHash = `${companyName}_${memo}_${suffix}_${amount}_${receiptNumber}_${receiptSmallTextEnabled}`.replace(/\s/g, '');
    const managementId = `receipt_${timestamp}_${contentHash.substring(0, 20)}`;
    
    const historyItem = {
        type: 'receipt',
        mode: 'receipt',
        companyName: companyName,
        memo: (withMemo && memo) ? memo : '', // memoが空なら空文字
        suffix: (withMemo && memo) ? suffix : '', // memoが空なら接尾辞も空
        amount: amount || '', // 金額を保存
        receiptNumber: receiptNumber, // 連番を保存
        smallTextEnabled: receiptSmallTextEnabled, // 小文字オプションの状態を保存
        noNameData: receiptNoNameData, // 宛名記入不可データを保存
        managementId: managementId, // 内容ベースの一意のID
        data: '', // 後で設定
        created: timestamp,
        qrPrinted: true // 常にQRコード付き
    };
    
    // QRデータを生成
    const qrData = generateQRData(historyItem);
    if (qrData) {
        qrCodeCanvas = generateQRCode(qrData);
        if (qrCodeCanvas) {
            const qrSize = 180; // QRコードのサイズ（1.2倍）
            const qrX = 25; // 左端から25pxの位置
            const textEndY = yPos;
            const qrY = textEndY + 20; // テキストの下、日付の横
            
            // QRコードを描画
            ctx.drawImage(qrCodeCanvas, qrX, qrY, qrSize, qrSize);
        }
    }
    
    // 日付・時刻を描画（テキスト印刷と同じ方式）
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth() + 1;
    const day = now.getDate();
    const hour = now.getHours();
    const minute = now.getMinutes();
    const second = now.getSeconds();
    
    ctx.font = buildCanvasFont(dateFontSize);
    ctx.textAlign = 'center'; // 中央揃えに統一
    
    // 領収書は常にQRありなので+110で配置
    const dateTimeX = Math.round(canvasWidth / 2) + 110; // 中央より右に110px移動
    yPos += 20; // 他のモードと同様に下に移動
    
    // 日付行
    const dateText = `${year}年${month}月${day}日`;
    ctx.fillText(dateText, dateTimeX, yPos);
    yPos += dateLineHeight;
    
    // 時刻行
    const timeText = `${hour}時${minute}分${second}秒`;
    ctx.fillText(timeText, dateTimeX, yPos);
    
    // キャンバスをPNGに変換（領収書は罫線文字があるため高品質PNG使用）
    if (isSmPrinter) {
        enhanceCanvasForThermalPrint(canvas, {
            contrast: 1.5,
            gamma: 1.0,
            threshold: 160,
            ditherAlgorithm: 'none'
        });
    }
    const pngDataUrl = canvas.toDataURL('image/png');
    const pngBase64 = pngDataUrl.split(',')[1];

    if (isSmPrinter) {
        registerSmS210iPayload({
            imageBase64: pngBase64,
            widthMM: 58,
            dpi: resolvePrinterDpi(203),
            description: 'receipt'
        });
    }
    
    // 履歴アイテムにデータを設定
    historyItem.data = pngDataUrl;
    
    // 履歴を保存
    addHistory(historyItem).then(() => {
        console.log('領収書履歴保存完了:', historyItem.managementId);
    });
    
    // jsPDFを使用してPDFを生成
    const { jsPDF } = window.jspdf;
    const pdfHeight = Math.round(canvasHeight / mmToPx);
    
    const pdf = new jsPDF({
        orientation: 'portrait',
        unit: 'mm',
        format: [58, pdfHeight],
        compress: true  // PDF圧縮を有効化
    });
    
    // PDFの設定を直接操作
    pdf.internal.pageSize.width = 58;
    pdf.internal.pageSize.height = pdfHeight;
    
    // PNG画像をPDFに追加（領収書は罫線文字保持のためPNG使用）
    pdf.addImage(pngDataUrl, 'PNG', 0, 0, 58, pdfHeight);
    
    // PDFをBase64形式で取得
    const pdfBase64 = pdf.output('datauristring').split(',')[1];
    
    let thisPage = window.location.href;
    
    // iOS/Android両対応の印刷URLを生成
    let printUrl = generatePrintUrl(pdfBase64, thisPage);
    
    // 印刷実行（ネイティブアプリの場合はBase64、Web版はURL）
    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.nativePrint) {
        executePrint(pdfBase64, 'receipt');
    } else {
        executePrint(printUrl);
    }
    
    console.log('🧾 領収書印刷が完了しました, デバイス=' + (isAndroid() ? 'Android' : 'iOS'));
    
    // 印刷完了後、メインメニュー（画像選択画面）に戻る
    setTimeout(() => {
        // 履歴モードを「画像・T's券」にリセット
        currentHistoryType = 'image';
        if (typeof setModeToggle === 'function') {
            setModeToggle('image');
            console.log('🔄 印刷後: モード選択ボタンを「画像・T\'s券」にリセット');
        }
        resetAllModes();
        showSection('image');
    }, 1000);
}

// 領収書用テキスト折り返し関数
function wrapTextForReceipt(text, maxWidth, fontSize) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    ctx.font = buildCanvasFont(fontSize);
    
    const lines = [];
    const words = text.split('');
    let currentLine = '';
    
    for (let i = 0; i < words.length; i++) {
        const testLine = currentLine + words[i];
        const metrics = ctx.measureText(testLine);
        
        if (metrics.width > maxWidth && currentLine !== '') {
            lines.push(currentLine);
            currentLine = words[i];
        } else {
            currentLine = testLine;
        }
    }
    
    if (currentLine) {
        lines.push(currentLine);
    }
    
    return lines;
}

// --- 画像印刷 ---
function sendToPrintAssist(event) {
    event.preventDefault();
    let fileInput = document.getElementById('imageUpload');
    let file = fileInput.files[0];
    let base64Image = null;
    let usePreview = false;
    const qrPrintEnabled = document.getElementById('qrPrintCheckbox').checked; // 最初に取得
    if (!file && document.getElementById('imagePreviewContainer').firstChild && document.getElementById('imagePreviewContainer').firstChild.tagName === 'IMG') {
        let img = document.getElementById('imagePreviewContainer').firstChild;
        base64Image = img.src.split(',')[1];
        usePreview = true;
    }
    if ((!file && !usePreview) || selectedChip === '') return;
    
    function doPrint(base64Image) {
        const paperWidth = 57;  // 印刷幅（mm・57mm幅）
        let img = new window.Image();
        
        // タイムアウト処理を追加（Androidフリーズ対策）
        let imageLoadTimeout = setTimeout(() => {
            console.error('❌ 画像読み込みタイムアウト（10秒）');
            alert('画像の読み込みに時間がかかりすぎています。画像サイズを小さくしてください。');
        }, 10000); // 10秒でタイムアウト
        
        img.onerror = function() {
            clearTimeout(imageLoadTimeout);
            console.error('❌ 画像読み込みエラー');
            alert('画像の読み込みに失敗しました。');
        };
        
        img.onload = function() {
            clearTimeout(imageLoadTimeout); // タイムアウトをクリア
            let origW = img.naturalWidth;
            let origH = img.naturalHeight;
            let ratio = Math.min(paperWidth / origW, 1);
            let imgW = Math.round(origW * ratio);
            let imgH = Math.round(origH * ratio);
            let x = Math.round((paperWidth - imgW) / 2);
            let y = 2;
            const isDateTimeEnabled = selectedChip === 'with';
            const topMargin = 2;
            const bottomMargin = isDateTimeEnabled ? 16 : 18;
            const totalHeight = topMargin + imgH + (isDateTimeEnabled ? 16 : 0) + bottomMargin;
            const selectedCopies = parseInt(document.getElementById('copiesSelect').value);
            
            function printImageCopy() {
                // 新しいキャンバスで全体を合成
                const compositeCanvas = document.createElement('canvas');
                const compositeCtx = compositeCanvas.getContext('2d', { 
                    alpha: false,
                    willReadFrequently: false,
                    colorSpace: 'srgb',
                    desynchronized: false
                });
                
                const isSmPrinter = isSmS210iFamilyPrinter();
                const mmToPx = isSmPrinter ? 8 : resolvePrinterMmToPx(300);
                const canvasWidth = isSmPrinter ? 384 : Math.round(58 * mmToPx);
                
                // アップロードされた画像を読み込み
                const uploadedImg = new Image();
                uploadedImg.crossOrigin = 'anonymous'; // 画像品質向上
                uploadedImg.onload = function() {
                    // 日付・時刻の高さを計算
                    let dateTimeHeight = 0;
                    if (isDateTimeEnabled) {
                        const fontSize = 60; // 60px（1.2倍）
                        dateTimeHeight = fontSize * 2.5; // 2行 + 余白
                    }
                    
                    // 画像のサイズを大幅に拡大（キャンバスの1.2倍）
                    const maxImgWidth = Math.round(canvasWidth * 1.2); // 684 * 1.2 = 821px
                    const imgRatio = uploadedImg.naturalHeight / uploadedImg.naturalWidth;
                    const finalImgWidth = maxImgWidth; // 常に最大幅まで拡大
                    const finalImgHeight = finalImgWidth * imgRatio;
                    
                    // デバッグ出力
                    console.log('🖼️ 画像サイズ計算:');
                    console.log('  canvasWidth:', canvasWidth);
                    console.log('  maxImgWidth:', maxImgWidth);
                    console.log('  元画像幅:', uploadedImg.naturalWidth);
                    console.log('  元画像高さ:', uploadedImg.naturalHeight);
                    console.log('  finalImgWidth:', finalImgWidth);
                    console.log('  finalImgHeight:', finalImgHeight);
                    console.log('  imgX:', -59);
                    
                    // 全体の高さを計算（画像用の余白設定）
                    const imageTopMargin = -50; // 画像用上余白（参照ファイルと同じ値）
                    
                    // 下部余白（4パターン固定値）
                    let imageBottomMargin;
                    if (isDateTimeEnabled && qrPrintEnabled) {
                        imageBottomMargin = 250; // 日付あり + QRあり
                    } else if (!isDateTimeEnabled && qrPrintEnabled) {
                        imageBottomMargin = 400; // 日付なし + QRあり
                    } else if (isDateTimeEnabled && !qrPrintEnabled) {
                        imageBottomMargin = 230; // 日付あり + QRなし
                    } else {
                        imageBottomMargin = 170; // 日付なし + QRなし
                    }
                    
                    const totalHeight = imageTopMargin + finalImgHeight + dateTimeHeight + imageBottomMargin;
                    
                    compositeCanvas.width = canvasWidth;
                    compositeCanvas.height = totalHeight;
                    
                    // 背景を白にする
                    compositeCtx.fillStyle = '#FFFFFF';
                    compositeCtx.fillRect(0, 0, canvasWidth, totalHeight);
                    
                    // 【文字鮮明化】画像スムージング完全無効化
                    compositeCtx.imageSmoothingEnabled = false;
                    compositeCtx.webkitImageSmoothingEnabled = false;
                    compositeCtx.mozImageSmoothingEnabled = false;
                    compositeCtx.msImageSmoothingEnabled = false;
                    compositeCtx.globalCompositeOperation = 'source-over';
                    compositeCtx.globalAlpha = 1.0;
                    
                    // 画像の色域とコントラストを保持するための設定
                    compositeCtx.filter = 'none'; // フィルターを一旦無効化
                    
                    
                    // 画像を描画（右に1mmずらして配置）
                    const shiftRight = Math.round(1 * mmToPx); // 1mm右シフト
                    const imgX = Math.round((canvasWidth - finalImgWidth) / 2) + shiftRight;
                    const imgY = imageTopMargin; // 画像用上余白
                    
                    // まず画像を描画
                    compositeCtx.drawImage(uploadedImg, imgX, imgY, finalImgWidth, finalImgHeight);
                    
                    // QRコードを生成して左側に配置（チェックボックス確認）
                    let qrCodeCanvas = null;
                    let qrCodePosition = null; // QRコード描画位置を保存
                    // console.log('画像印刷 - QRチェックボックス状態:', qrPrintEnabled);
                    if (qrPrintEnabled) {
                        // console.log('QRコード生成開始（画像）');
                        const printTimestamp = window.restoredDateTime || Date.now();
                        const historyItem = {
                            type: 'image',
                            mode: 'image',
                            data: 'data:image/png;base64,' + base64Image,
                            dateTime: selectedChip,
                            copies: selectedCopies,
                            created: Date.now(),
                            timestamp: printTimestamp,
                            qrPrinted: qrPrintEnabled // 確実にチェックボックスの状態を保存
                        };
                        
                        // 先に履歴を保存してからQRコード生成
                        const qrData = generateQRData(historyItem);
                        if (qrData) {
                            // 履歴を即座に保存
                            addHistory(historyItem).then(() => {
                                console.log('履歴保存完了:', historyItem.managementId);
                            });
                            
                            qrCodeCanvas = generateQRCode(qrData);
                            if (qrCodeCanvas) {
                                const qrSize = 180; // QRコードのサイズ（1.2倍）
                                const qrX = 30; // 左端から30pxの位置
                                let qrY;
                                if (isDateTimeEnabled) {
                                    // 日付・時刻ありの場合：日付・時刻の左側に配置
                                    qrY = imgY + finalImgHeight + 20; // 画像の下、日付の横
                                } else {
                                    // 日付・時刻なしの場合：画像の下部左側（印刷範囲内に調整）
                                    qrY = Math.max(imgY + finalImgHeight - qrSize + 10, imgY + finalImgHeight + 10);
                                }
                                // QRコード描画位置を保存（グレースケール変換後に描画）
                                qrCodePosition = { x: qrX, y: qrY, size: qrSize };
                                // console.log('QRコード描画位置保存:', qrX, qrY, qrSize);
                            }
                        }
                    } else {
                        // console.log('QRコードなしで印刷（画像）');
                    }
                    
                    // 【シンプル高品質】グレースケール変換のみ（点々なし）
                    const imageData = compositeCtx.getImageData(imgX, imgY, finalImgWidth, finalImgHeight);
                    const data = imageData.data;
                    
                    const width = finalImgWidth;
                    const height = finalImgHeight;
                    
                    // シンプルなグレースケール変換（点々・ディザリングなし）
                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i];
                        const g = data[i + 1];
                        const b = data[i + 2];
                        
                        // 標準的なグレースケール変換
                        const gray = Math.round(0.299 * r + 0.587 * g + 0.114 * b);
                        
                        // そのまま適用（点々なし）
                        data[i] = gray;
                        data[i + 1] = gray;
                        data[i + 2] = gray;
                    }
                    
                    // 処理完了（文字判定・ディザリングなし）
                    
                    // グレースケール処理済みデータを描画
                    compositeCtx.putImageData(imageData, imgX, imgY);
                    
                    // グレースケール変換後にQRコードを描画（崩れ防止）
                    if (qrCodeCanvas && qrCodePosition) {
                        // QRコード領域に白背景を先に描画（周囲のグレーの影響を防止）
                        compositeCtx.fillStyle = '#FFFFFF';
                        compositeCtx.fillRect(
                            qrCodePosition.x - 5, 
                            qrCodePosition.y - 5, 
                            qrCodePosition.size + 10, 
                            qrCodePosition.size + 10
                        );
                        
                        // QRコードを描画
                        compositeCtx.drawImage(qrCodeCanvas, qrCodePosition.x, qrCodePosition.y, qrCodePosition.size, qrCodePosition.size);
                        console.log('✅ QRコード描画完了（白背景保護+グレースケール変換後）:', qrCodePosition);
                    }
                    
                    // 日付・時刻を描画
                    if (isDateTimeEnabled) {
                        // 履歴から復元された場合はその時刻を使用、新規印刷は現在時刻
                        const dateTimeToUse = window.restoredDateTime ? new Date(window.restoredDateTime) : new Date();
                        const year = dateTimeToUse.getFullYear();
                        const month = dateTimeToUse.getMonth() + 1;
                        const day = dateTimeToUse.getDate();
                        const hour = dateTimeToUse.getHours();
                        const minute = dateTimeToUse.getMinutes();
                        const second = dateTimeToUse.getSeconds();
                        
                        const fontSize = 60;// 60px（1.2倍）
                        compositeCtx.fillStyle = '#000000';
                        compositeCtx.font = buildCanvasFont(fontSize);
                        compositeCtx.textAlign = 'center'; // 常に中央揃え
                        compositeCtx.textBaseline = 'top';
                        
                        // QRコードの有無でX座標を調整（中央揃えのまま）
                        let dateTimeX;
                        let yPos = imgY + finalImgHeight + 10; // 画像の下
                        
                        // 現在のチェックボックス状態を直接確認
                        const currentQrEnabled = qrPrintEnabled;
                        if (currentQrEnabled) {
                            // QRコード印刷ありの場合：QRコードの右側に配置
                            dateTimeX = Math.round(canvasWidth / 2) + 110; // 中央より右に110px移動
                            yPos += 20; // QRありの場合20px下に移動
                        } else {
                            // QRコード印刷なしの場合：完全に中央配置
                            dateTimeX = Math.round(canvasWidth / 2); // 完全中央
                        }
                        
                        // 日付行
                        const dateText = `${year}年${month}月${day}日`;
                        compositeCtx.fillText(dateText, dateTimeX, yPos);
                        yPos += fontSize * 1.2;
                        
                        // 時刻行
                        const timeText = `${hour}時${minute}分${second}秒`;
                        compositeCtx.fillText(timeText, dateTimeX, yPos);
                        yPos += 50; // 日付有り印刷の下部余白を50px追加

// --- テキスト印刷 ---
function wrapText(text) {
    text = toZenkaku(text);
    const lines = [];
    const paragraphs = text.split('\n');
    
    for (let paragraph of paragraphs) {
        if (paragraph.length === 0) {
            lines.push('');
            continue;
        }
        
        let remainingText = paragraph;
        while (remainingText.length > 0) {
            let currentLine = '';
            let charCount = 0;
            let widthCount = 0;
            
            for (let i = 0; i < remainingText.length; i++) {
                const char = remainingText[i];
                const isFullWidth = char.match(/[^\x01-\x7E]/) ? true : false;
                const charWidth = isFullWidth ? 2 : 1;
                
                // 文字数制限の判定（テキストボックスと同じルール）
                let shouldBreak = false;
                if (isFullWidth && charCount >= 15) {
                    shouldBreak = true;
                } else if (!isFullWidth && charCount >= 23) {
                    shouldBreak = true;
                } else if (widthCount + charWidth > 30) { // 混在時は全角15文字相当
                    shouldBreak = true;
                }
                
                if (shouldBreak) break;
                
                currentLine += char;
                charCount++;
                widthCount += charWidth;
            }
            
            // 空行でない場合のみ追加
            if (currentLine.length > 0) {
                lines.push(currentLine);
                remainingText = remainingText.substring(currentLine.length);
            } else {
                // 1文字も入らない場合は強制的に1文字追加（無限ループ防止）
                lines.push(remainingText[0]);
                remainingText = remainingText.substring(1);
            }
        }
    }
    return lines;
}
function safeEncodeURIComponent(str) {
    return encodeURIComponent(str)
        .replace(/!/g, '%21')
        .replace(/'/g, '%27')
        .replace(/\(/g, '%28')
        .replace(/\)/g, '%29')
        .replace(/\*/g, '%2A')
        .replace(/%20/g, '%20');
}

// テキスト入力の自動改行機能
function checkTextInputLimit(textarea) {
    const text = textarea.value;
    const cursorPosition = textarea.selectionStart;
    const lines = text.split('\n');
    let newText = '';
    let newCursorPosition = cursorPosition;
    let cursorAdjustment = 0;
    
    for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        let processedLine = '';
        let charCount = 0;
        let widthCount = 0;
        
        for (let j = 0; j < line.length; j++) {
            const char = line[j];
            const isFullWidth = char.match(/[^\x01-\x7E]/) ? true : false;
            const charWidth = isFullWidth ? 2 : 1;
            
            // 文字数制限の判定
            let shouldBreak = false;
            if (isFullWidth && charCount >= 15) {
                shouldBreak = true;
            } else if (!isFullWidth && charCount >= 23) {
                shouldBreak = true;
            } else if (widthCount + charWidth > 30) { // 混在時は全角15文字相当
                shouldBreak = true;
            }
            
            if (shouldBreak) {
                // 自動改行を挿入（最後の文字が改行でない場合のみ）
                if (processedLine.length > 0 && processedLine[processedLine.length - 1] !== '\n') {
                    processedLine += '\n';
                    if (newText.length + processedLine.length <= cursorPosition) {
                        cursorAdjustment += 1; // 改行文字分カーソル位置を調整
                    }
                }
                charCount = 1; // 新しい行の最初の文字
                widthCount = charWidth;
            } else {
                charCount++;
                widthCount += charWidth;
            }
            
            processedLine += char;
        }
        
        newText += processedLine;
        if (i < lines.length - 1) {
            newText += '\n';
        }
    }
    
    // テキストエリアの内容を更新
    if (newText !== text) {
        textarea.value = newText;
        // カーソル位置を調整
        const newPosition = cursorPosition + cursorAdjustment;
        textarea.setSelectionRange(newPosition, newPosition);
    }
}

function autoWrap(textarea) {
    const text = textarea.value;
    const wrappedLines = wrapText(text);
    textarea.value = wrappedLines.join('\n');

// QRコード画像の生成
function generateQRCode(data) {
    try {
        // qrcodeライブラリの確認
        if (typeof qrcode === 'undefined') {
            console.error('QRコード生成ライブラリが読み込まれていません');
            return null;
        }
        
        // データの長さを制限（QRコードの容量制限対応）
        if (data.length > 200) {
            console.warn('QRコードデータが長すぎます:', data.length);
            data = data.substring(0, 200);
        }
        
        const qr = qrcode(0, 'H'); // エラー訂正レベルH（最高品質・欠損に強い・約30%まで復元可能）
        qr.addData(data);
        qr.make();
        
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const size = 200; // QRコードサイズ
        const moduleCount = qr.getModuleCount();
        const margin = 8; // 余白を確保
        
        // 【超高解像度レンダリング】5倍解像度で描画（印刷品質向上）
        const renderScale = 5; // 5倍解像度（印刷時の鮮明度最大化）
        canvas.width = size * renderScale;
        canvas.height = size * renderScale;
        ctx.scale(renderScale, renderScale);
        
        // セルサイズを計算（余白を含めて調整）
        const effectiveSize = size - (margin * 2);
        const cellSize = effectiveSize / moduleCount;
        
        // 【最高画質設定】アンチエイリアス完全無効化
        ctx.imageSmoothingEnabled = false;
        ctx.webkitImageSmoothingEnabled = false;
        ctx.mozImageSmoothingEnabled = false;
        ctx.msImageSmoothingEnabled = false;
        
        // 背景を完全な白で塗りつぶし
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, size, size);
        
        // 【印刷品質最適化】中間の濃さで鮮明に印刷
        ctx.fillStyle = '#404040'; // 75%黒（中間の濃さ）
        
        // QRコードを高精度描画（余白を考慮、セル間の隙間を完全になくす）
        for (let row = 0; row < moduleCount; row++) {
            for (let col = 0; col < moduleCount; col++) {
                if (qr.isDark(row, col)) {
                    // 整数座標で描画（印刷時のぼやけ防止）
                    const x = Math.floor(margin + (col * cellSize));
                    const y = Math.floor(margin + (row * cellSize));
                    // セルサイズを切り上げて隙間を完全になくす
                    const w = Math.ceil(cellSize + 0.5);
                    const h = Math.ceil(cellSize + 0.5);
                    ctx.fillRect(x, y, w, h);
                }
            }
        }
        
        console.log('🔥 高品質QRコード生成完了:', 'サイズ=' + size + 'px', 'セルサイズ=' + cellSize + 'px');
        return canvas;
    } catch (error) {
        console.error('QRコード生成エラー:', error);
        return null;
    }
}

    // モーダル背景クリックで閉じる
    qrReaderModal.onclick = (e) => {
        if (e.target === qrReaderModal) {
            closeQRReader();
        }
    };
}

// QRリーダーを閉じる関数
async function closeQRReader() {
    await stopQRReader();
}

// ライト（フラッシュライト）機能
async function toggleFlashlight() {
    try {
        const flashlightBtn = document.getElementById('flashlightToggle');
        
        if (!currentStream) {
            console.warn('カメラストリームが利用できません');
            return;
        }
        
        const track = currentStream.getVideoTracks()[0];
        if (!track) {
            console.warn('ビデオトラックが見つかりません');
            return;
        }
        
        const capabilities = track.getCapabilities();
        if (!capabilities.torch) {
            console.warn('このデバイスはフラッシュライトをサポートしていません');
            alert('このデバイスはライト機能をサポートしていません');
            return;
        }
        
        flashlightEnabled = !flashlightEnabled;
        
        await track.applyConstraints({
            advanced: [{ torch: flashlightEnabled }]
        });
        
        // ボタンの見た目を更新
        if (flashlightEnabled) {
            flashlightBtn.classList.add('active');
            flashlightBtn.textContent = '🔦';
        } else {
            flashlightBtn.classList.remove('active');
            flashlightBtn.textContent = '💡';
        }
        
        console.log('ライト状態:', flashlightEnabled ? 'ON' : 'OFF');
    } catch (error) {
        console.error('ライト制御エラー:', error);
        alert('ライトの制御に失敗しました');
    }
}

// QRリーダー開始（フォールバック機能付き）
async function startQRReader() {
    // console.log('=== QRスキャナー開始処理 ===');
    
    const qrReaderModal = document.getElementById('qrReaderModal');
    const videoElement = document.getElementById('qrReader');
    const statusElement = document.getElementById('qrReaderStatus');
    
    // モーダルを表示
    qrReaderModal.style.display = 'flex';
    statusElement.textContent = ''; // メッセージ非表示
    
    // ビデオ要素のスタイルをリセット（ズーム防止）
    videoElement.style.transform = 'none';
    videoElement.style.width = '100%';
    videoElement.style.height = '100%';
    videoElement.style.objectFit = 'cover';
    
    // 既存のスキャナーがあれば確実に停止
    if (window.qrScanner) {
        console.log('既存のスキャナーを停止中...');
        try {
            await window.qrScanner.stop();
            window.qrScanner.destroy();
        } catch (e) {
            console.warn('既存スキャナー停止時のエラー:', e);
        }
        window.qrScanner = null;
    }
    
    // 既存のストリームも停止
    if (videoElement.srcObject) {
        try {
            videoElement.srcObject.getTracks().forEach(track => {
                track.stop();
                console.log('ビデオトラック停止:', track.kind);
            });
            videoElement.srcObject = null;
        } catch (e) {
            console.warn('ビデオストリーム停止エラー:', e);
        }
    }
    
    // タイムアウト設定（45秒に延長）
    const timeoutId = setTimeout(() => {
        console.warn('QRスキャナータイムアウト');
        closeQRReader();
        alert('カメラの起動に時間がかかっています。\n・カメラの権限を許可してください\n・明るい場所でお試しください');
    }, 45000);
    
    try {
        console.log('🚀 QRスキャナー起動開始');
        // まずjsQRライブラリを試す（最も安定・高速）
        if (await tryJsQRLibrary(videoElement, statusElement)) {
            clearTimeout(timeoutId);
            return;
        }
        
        // フォールバック1: QrScannerライブラリを試す（高感度版）
        if (await tryQrScannerLibrary(videoElement, statusElement)) {
            clearTimeout(timeoutId);
            return;
        }
        
        // フォールバック2: ZXingライブラリを試す
        if (await tryZXingLibrary(videoElement, statusElement)) {
            clearTimeout(timeoutId);
            return;
        }
        
        // 全て失敗した場合
        clearTimeout(timeoutId);
        statusElement.textContent = 'QRスキャナーの初期化に失敗しました';
        setTimeout(() => {
            closeQRReader();
            alert('QRコードリーダーが利用できません\nブラウザまたはデバイスがサポートしていない可能性があります');
        }, 3000);
    } catch (error) {
        clearTimeout(timeoutId);
        console.error('QRスキャナー開始エラー:', error);
        closeQRReader();
        alert('QRコードリーダーの開始中にエラーが発生しました');
    }
}

// jsQRライブラリを使用（最も安定・高速・高精度）
async function tryJsQRLibrary(videoElement, statusElement) {
    try {
        console.log('🔍 jsQRライブラリを起動中...');
        
        // ライブラリの確認
        if (typeof jsQR === 'undefined') {
            await new Promise(resolve => setTimeout(resolve, 1000));
            if (typeof jsQR === 'undefined') {
                throw new Error('jsQRライブラリが読み込まれていません');
            }
        }
        
        // MediaStreamを取得
        let stream;
        if (currentStream && currentStream.active) {
            console.log('✅ 既存のカメラストリームを再利用');
            stream = currentStream;
        } else {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { 
                    facingMode: 'environment',
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                }
            });
            currentStream = stream;
        }
        
        videoElement.srcObject = stream;
        await videoElement.play();
        
        // Canvasを作成（OffscreenCanvas使用で高速化）
        const canvas = new OffscreenCanvas(videoElement.videoWidth, videoElement.videoHeight);
        const context = canvas.getContext('2d');
        
        // スキャナーオブジェクトを作成
        window.qrScanner = {
            scanning: true,
            stop: () => {
                window.qrScanner.scanning = false;
                if (window.qrScanner.timer) {
                    clearInterval(window.qrScanner.timer);
                }
            },
            destroy: () => {
                window.qrScanner.scanning = false;
                if (window.qrScanner.timer) {
                    clearInterval(window.qrScanner.timer);
                }
            },
            timer: null
        };
        
        // 定期的にスキャン（200ms間隔 - Qiita記事参考）
        window.qrScanner.timer = setInterval(() => {
            if (!window.qrScanner.scanning) return;
            
            try {
                // ビデオからImageDataを取得
                context.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                
                // jsQRでスキャン
                const code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: "dontInvert" // 反転処理をスキップして高速化
                });
                
                if (code && code.data) {
                    console.log('✅ jsQR読み取り成功:', code.data.substring(0, 30) + '...');
                    handleQRScanResult(code.data);
                }
            } catch (e) {
                // エラーは無視して継続
            }
        }, 200);
        
        statusElement.textContent = '';
        console.log('✅ jsQRライブラリ開始成功');
        return true;
        
    } catch (error) {
        console.error('❌ jsQRライブラリ失敗:', error);
        return false;
    }
}

// QrScannerライブラリを使用（感度向上版）
async function tryQrScannerLibrary(videoElement, statusElement) {
    try {
        console.log('🔍 高感度QrScannerライブラリを起動中...');
        
        // ライブラリの確認（少し待機）
        if (typeof QrScanner === 'undefined') {
            await new Promise(resolve => setTimeout(resolve, 1000));
            if (typeof QrScanner === 'undefined') {
                throw new Error('QrScannerライブラリが読み込まれていません');
            }
        }
        
        // カメラサポート確認
        const hasCamera = await QrScanner.hasCamera();
        if (!hasCamera) {
            throw new Error('カメラが見つかりません');
        }
        
        // 【重要】QRスキャナーを作成時に既存ストリームを使用するよう指定
        const scannerConfig = {
            returnDetailedScanResult: false,
            highlightScanRegion: false,
            highlightCodeOutline: false,
            preferredCamera: 'environment',
            maxScansPerSecond: 10, // スキャン頻度を調整（安定性重視）
            // 全画面スキャン（制限なし）
            calculateScanRegion: (video) => ({
                x: 0,
                y: 0,
                width: video.videoWidth,
                height: video.videoHeight
            }),
            // 超高画質カメラ設定
            videoConstraints: {
                facingMode: 'environment',
                width: { ideal: 3840, max: 3840 }, // 4K解像度
                height: { ideal: 2160, max: 2160 },
                focusMode: 'continuous',
                zoom: 1.0
            }
        };
        
        // QRスキャナーを作成（常に新規作成してstart()を呼ぶ）
        console.log('📸 QRスキャナー初期化中...');
        window.qrScanner = new QrScanner(
            videoElement,
            (result) => {
                const qrData = (typeof result === 'object' && result.data) ? result.data : result;
                console.log('✅ QR読み取り成功:', qrData.substring(0, 30) + '...');
                handleQRScanResult(qrData);
            },
            scannerConfig
        );
        
        // 常にstart()を呼んでスキャンを開始（ストリーム再利用は内部で処理される）
        await window.qrScanner.start();
        console.log('✅ QRスキャナー起動完了');
        
        // ストリームを保存（次回の起動で権限ダイアログをスキップ）
        if (videoElement.srcObject) {
            currentStream = videoElement.srcObject;
            console.log('📸 カメラストリーム保存成功');
        }
        
        statusElement.textContent = ''; // メッセージ非表示
        console.log('✅ QrScannerライブラリ開始成功');
        return true;
        
    } catch (error) {
        console.error('❌ QrScannerライブラリ失敗:', error);
        return false;
    }
}

// ZXingライブラリをフォールバックとして使用（高感度版）
async function tryZXingLibrary(videoElement, statusElement) {
    try {
        console.log('🔄 ZXingライブラリにフォールバック中...');
        if (typeof ZXing === 'undefined') {
            await new Promise(resolve => setTimeout(resolve, 1000));
            if (typeof ZXing === 'undefined') {
                throw new Error('ZXingライブラリが読み込まれていません');
            }
        }
        
        // 【改善版】MediaStreamを取得（最高画質・高感度設定）
        // ※ 毎回権限ダイアログを防ぐため、既存のストリームがあれば再利用
        let stream;
        if (currentStream && currentStream.active) {
            console.log('✅ 既存のカメラストリームを再利用');
            stream = currentStream;
        } else {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { 
                    facingMode: 'environment',
                    width: { ideal: 3840, min: 640 }, // 4K解像度理想値
                    height: { ideal: 2160, min: 480 },
                    frameRate: { ideal: 30, min: 15 }, // フレームレートを安定性重視に調整
                    focusMode: 'continuous', // 連続オートフォーカス
                    exposureMode: 'continuous', // 連続露出調整
                    zoom: 1.0 // ズームなし（デフォルト倍率）
                }
            });
            currentStream = stream; // グローバル変数に保存
        }
        
        videoElement.srcObject = stream;
        await videoElement.play();
        
        // 【改善版】QRコードリーダーを作成（多形式対応・高感度）
        const codeReader = new ZXing.BrowserQRCodeReader();
        
        // 継続的にスキャン
        window.qrScanner = {
            scanning: true,
            stop: () => {
                window.qrScanner.scanning = false;
                stream.getTracks().forEach(track => track.stop());
            },
            destroy: () => {
                window.qrScanner.scanning = false;
                stream.getTracks().forEach(track => track.stop());
            }
        };
        
        const scanLoop = async () => {
            if (!window.qrScanner.scanning) return;
            
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = videoElement.videoWidth;
                canvas.height = videoElement.videoHeight;
                
                // 【改善版】画像品質向上処理
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(videoElement, 0, 0);
                
                // パターン1: 通常スキャン（そのまま）
                let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                let code = await codeReader.decodeFromImageData(imageData).catch(() => null);
                
                if (code && code.text) {
                    console.log('✅ ZXing QR読み取り成功（通常）:', code.text.substring(0, 30) + '...');
                    handleQRScanResult(code.text);
                    return;
                }
                
                // パターン2: コントラスト強調（1.5倍）
                const data1 = imageData.data.slice();
                for (let i = 0; i < data1.length; i += 4) {
                    const avg = (data1[i] + data1[i + 1] + data1[i + 2]) / 3;
                    const val = Math.max(0, Math.min(255, (avg - 128) * 1.5 + 128));
                    data1[i] = data1[i + 1] = data1[i + 2] = val;
                }
                const tempImageData1 = new ImageData(data1, canvas.width, canvas.height);
                code = await codeReader.decodeFromImageData(tempImageData1).catch(() => null);
                
                if (code && code.text) {
                    console.log('✅ ZXing QR読み取り成功（コントラスト1.5）:', code.text.substring(0, 30) + '...');
                    handleQRScanResult(code.text);
                    return;
                }
                
                // パターン2.5: 明るさ増加（濃いQRコード用）
                const dataBright = imageData.data.slice();
                for (let i = 0; i < dataBright.length; i += 4) {
                    const avg = (dataBright[i] + dataBright[i + 1] + dataBright[i + 2]) / 3;
                    const val = Math.min(255, avg * 1.3 + 30); // 明るくする
                    dataBright[i] = dataBright[i + 1] = dataBright[i + 2] = val;
                }
                const tempImageDataBright = new ImageData(dataBright, canvas.width, canvas.height);
                code = await codeReader.decodeFromImageData(tempImageDataBright).catch(() => null);
                
                if (code && code.text) {
                    console.log('✅ ZXing QR読み取り成功（明るさ増加）:', code.text.substring(0, 30) + '...');
                    handleQRScanResult(code.text);
                    return;
                }
                
                // パターン3: コントラスト強調（2.0倍）
                const data2 = imageData.data.slice();
                for (let i = 0; i < data2.length; i += 4) {
                    const avg = (data2[i] + data2[i + 1] + data2[i + 2]) / 3;
                    const val = Math.max(0, Math.min(255, (avg - 128) * 2.0 + 128));
                    data2[i] = data2[i + 1] = data2[i + 2] = val;
                }
                const tempImageData2 = new ImageData(data2, canvas.width, canvas.height);
                code = await codeReader.decodeFromImageData(tempImageData2).catch(() => null);
                
                if (code && code.text) {
                    console.log('✅ ZXing QR読み取り成功（コントラスト2.0）:', code.text.substring(0, 30) + '...');
                    handleQRScanResult(code.text);
                    return;
                }
                
                // パターン4: 二値化（閾値128）
                const data3 = imageData.data.slice();
                for (let i = 0; i < data3.length; i += 4) {
                    const avg = (data3[i] + data3[i + 1] + data3[i + 2]) / 3;
                    const val = avg > 128 ? 255 : 0;
                    data3[i] = data3[i + 1] = data3[i + 2] = val;
                }
                const tempImageData3 = new ImageData(data3, canvas.width, canvas.height);
                code = await codeReader.decodeFromImageData(tempImageData3).catch(() => null);
                
                if (code && code.text) {
                    console.log('✅ ZXing QR読ま取り成功（二値化128）:', code.text.substring(0, 30) + '...');
                    handleQRScanResult(code.text);
                    return;
                }
                
                // パターン4.5: 二値化（閾値100 - 濃いQR用）
                const data3b = imageData.data.slice();
                for (let i = 0; i < data3b.length; i += 4) {
                    const avg = (data3b[i] + data3b[i + 1] + data3b[i + 2]) / 3;
                    const val = avg > 100 ? 255 : 0; // 低い閾値
                    data3b[i] = data3b[i + 1] = data3b[i + 2] = val;
                }
                const tempImageData3b = new ImageData(data3b, canvas.width, canvas.height);
                code = await codeReader.decodeFromImageData(tempImageData3b).catch(() => null);
                
                if (code && code.text) {
                    console.log('✅ ZXing QR読み取り成功（二値化100）:', code.text.substring(0, 30) + '...');
                    handleQRScanResult(code.text);
                    return;
                }
                
                // パターン4.7: 二値化（閾値150 - 薄いQR用）
                const data3c = imageData.data.slice();
                for (let i = 0; i < data3c.length; i += 4) {
                    const avg = (data3c[i] + data3c[i + 1] + data3c[i + 2]) / 3;
                    const val = avg > 150 ? 255 : 0; // 高い閾値
                    data3c[i] = data3c[i + 1] = data3c[i + 2] = val;
                }
                const tempImageData3c = new ImageData(data3c, canvas.width, canvas.height);
                code = await codeReader.decodeFromImageData(tempImageData3c).catch(() => null);
                
                if (code && code.text) {
                    console.log('✅ ZXing QR読み取り成功（二値化150）:', code.text.substring(0, 30) + '...');
                    handleQRScanResult(code.text);
                    return;
                }
                
                // パターン5: 適応的二値化（平均値を閾値に）
                const dataAdaptive = imageData.data.slice();
                let sum = 0, count = 0;
                for (let i = 0; i < dataAdaptive.length; i += 4) {
                    sum += (dataAdaptive[i] + dataAdaptive[i + 1] + dataAdaptive[i + 2]) / 3;
                    count++;
                }
                const avgThreshold = sum / count;
                for (let i = 0; i < dataAdaptive.length; i += 4) {
                    const avg = (dataAdaptive[i] + dataAdaptive[i + 1] + dataAdaptive[i + 2]) / 3;
                    const val = avg > avgThreshold ? 255 : 0;
                    dataAdaptive[i] = dataAdaptive[i + 1] = dataAdaptive[i + 2] = val;
                }
                const tempImageDataAdaptive = new ImageData(dataAdaptive, canvas.width, canvas.height);
                code = await codeReader.decodeFromImageData(tempImageDataAdaptive).catch(() => null);
                
                if (code && code.text) {
                    console.log('✅ ZXing QR読み取り成功（適応的二値化）:', code.text.substring(0, 30) + '...');
                    handleQRScanResult(code.text);
                    return;
                }
                
                // 【追加】中央部分重点スキャン（フォールバック）
                const centerX = Math.floor(canvas.width * 0.2);
                const centerY = Math.floor(canvas.height * 0.2);
                const centerWidth = Math.floor(canvas.width * 0.6);
                const centerHeight = Math.floor(canvas.height * 0.6);
                
                // 中央エリアをコントラスト強調してスキャン
                const centerData = ctx.getImageData(centerX, centerY, centerWidth, centerHeight);
                const cData = centerData.data;
                for (let i = 0; i < cData.length; i += 4) {
                    const avg = (cData[i] + cData[i + 1] + cData[i + 2]) / 3;
                    const val = Math.max(0, Math.min(255, (avg - 128) * 2.0 + 128));
                    cData[i] = cData[i + 1] = cData[i + 2] = val;
                }
                code = await codeReader.decodeFromImageData(centerData).catch(() => null);
                
                if (code && code.text) {
                    console.log('✅ ZXing QR読み取り成功（中央強調）:', code.text.substring(0, 30) + '...');
                    handleQRScanResult(code.text);
                    return;
                }
                
            } catch (e) {
                // QRコードが見つからない場合は正常（ログ出力なし）
            }
            
            // 100ms後に再スキャン（複数パターン処理を確実に実行）
            setTimeout(scanLoop, 100);
        };
        
        scanLoop();
        statusElement.textContent = ''; // メッセージ非表示
        console.log('✅ ZXingライブラリ開始成功');
        return true;
        
    } catch (error) {
        console.error('❌ ZXingライブラリ失敗:', error);
        return false;
    }
}

// QRリーダー停止
async function stopQRReader() {
    // console.log('QRスキャナー停止開始...');
    
    // スキャナーの停止
    if (window.qrScanner) {
        try {
            await window.qrScanner.stop();
            window.qrScanner.destroy();
            window.qrScanner = null;
            // console.log('QrScannerライブラリ停止完了');
        } catch (error) {
            console.error('❌ QRスキャナー停止エラー:', error);
        }
    }
    
    // ビデオストリームは停止せず、再利用のために保持（権限ダイアログ回避）
    const videoElement = document.getElementById('qrReader');
    if (videoElement) {
        // srcObjectは削除するが、currentStreamは保持
        videoElement.srcObject = null;
        console.log('✅ ビデオ要素をクリア（ストリームは保持）');
    }
    
    // ライト状態をリセットし、ストリームを停止してライトを消す
