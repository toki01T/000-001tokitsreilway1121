    const flashlightBtn = document.getElementById('flashlightToggle');
    if (flashlightBtn) {
        flashlightBtn.classList.remove('active');
        flashlightBtn.textContent = '💡';
    }
    
    // ストリームを完全に停止してライトを消す
    if (currentStream) {
        try {
            currentStream.getTracks().forEach(track => {
                track.stop();
                console.log('✅ トラック停止（ライトオフ）:', track.kind);
            });
            currentStream = null;
        } catch (e) {
            console.warn('⚠️ ストリーム停止エラー:', e);
        }
    }
    
    // モーダルを閉じる
    const qrReaderModal = document.getElementById('qrReaderModal');
    qrReaderModal.style.display = 'none';
    
    // console.log('QRスキャナー停止完了');
}

// QRコード読み取り結果の処理
function handleQRScanResult(result) {
    try {
        console.log('🔍 QRスキャン結果受信:', result);
        
        // モーダルが表示されているかチェック
        const qrReaderModal = document.getElementById('qrReaderModal');
        if (!qrReaderModal || qrReaderModal.style.display !== 'flex') {
            console.log('⚠️ QRスキャナーモーダルが非表示のため、読み取りを無視');
            return;
        }
        
        if (!result || typeof result !== 'string') {
            console.error('❌ 無効なQRコードデータ:', result);
            alert('❌ 無効なQRコードデータです\n読み取り結果: ' + String(result));
            stopQRReader(); // エラー時はライトを消して停止
            return;
        }
        
        // QRコード読み取り成功 - まずライトを消す
        if (flashlightEnabled && currentStream) {
            const track = currentStream.getVideoTracks()[0];
            if (track && track.getCapabilities().torch) {
                track.applyConstraints({
                    advanced: [{ torch: false }]
                }).then(() => {
                    flashlightEnabled = false;
                    const flashlightBtn = document.getElementById('flashlightToggle');
                    if (flashlightBtn) {
                        flashlightBtn.classList.remove('active');
                        flashlightBtn.textContent = '💡';
                    }
                    console.log('✅ QR読み取り成功後にライトを消灯');
                }).catch(e => console.warn('⚠️ ライト消灯失敗:', e));
            }
        }
        
        // データの前後の空白をトリム
        result = result.trim();
        console.log('📋 処理対象データ:', result, '（長さ:' + result.length + '桁）');
        
        // STAMP形式のQRコードかチェック（STAMP-type-timestamp）
        if (result.startsWith('STAMP-')) {
            console.log('✅ STAMPコレクションQRコード検出:', result);
            
            // モーダルを閉じる
            const modal = document.getElementById('qrReaderModal');
            if (modal) {
                modal.style.display = 'none';
            }
            
            // QR読み取り成功音を再生
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.playSound) {
                window.webkit.messageHandlers.playSound.postMessage({ type: 'success' });
            }
            
            // STAMP-type-timestamp から情報を抽出
            const parts = result.split('-');
            if (parts.length === 3) {
                const type = parts[1];
                const timestamp = parts[2];
                
                // STAMPセクションを表示
                showSection('stamp');
                
                // 選択されたSTAMPタイプを設定
                selectedStampPrintType = type;
                
                // プレビューを表示
                const title = type === 'stamp_frame' ? 'STAMP用紙（枠有）印刷' :
                             type === 'stamp_noframe' ? 'STAMP用紙 印刷' :
                             type === 'memo_frame' ? 'メモ用紙（枠有）印刷' :
                             'メモ用紙 印刷';
                
                showStampPreview(title);
                
                console.log('📋 STAMP QR復元完了 - タイプ:', type, 'タイムスタンプ:', timestamp);
            } else {
                console.error('❌ 無効なSTAMP QRコード形式:', result);
                alert('❌ 無効なSTAMP QRコード形式です');
                stopQRReader();
            }
            return;
        }
        
        // 管理番号かチェック（TOKIで始まる16桁）
        if (!result.startsWith('TOKI')) {
            console.warn('⚠️ 外部QRコード検出:', result);
            // QR読み取りエラー音を再生
            console.log('🔊 エラー音再生要求（外部QRコード）');
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.playSound) {
                window.webkit.messageHandlers.playSound.postMessage({ type: 'error' });
                console.log('✅ エラー音メッセージ送信完了');
            } else {
                console.error('❌ playSound messageHandlerが利用できません');
            }
            alert('⚠️ このアプリで生成されたQRコードではありません\n\n読み取った内容:\n' + result + '\n\nアプリ内で印刷したQRコードをスキャンしてください。');
            stopQRReader(); // エラー時のみ停止
            return;
        }
        
        if (result.length !== 16) {
            console.error('❌ 無効な管理番号の長さ:', result, 'length:', result.length);
            // QR読み取りエラー音を再生
            console.log('🔊 エラー音再生要求（無効な管理番号の長さ）');
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.playSound) {
                window.webkit.messageHandlers.playSound.postMessage({ type: 'error' });
                console.log('✅ エラー音メッセージ送信完了');
            } else {
                console.error('❌ playSound messageHandlerが利用できません');
            }
            alert('❌ 無効な管理番号です\n\n読み取った内容:\n' + result + '\n\n長さ: ' + result.length + '桁\n（正しくは16桁である必要があります）');
            stopQRReader(); // エラー時のみ停止
            return;
        }
        
        console.log('✅ 有効な管理番号を検出:', result);
        
        // モーダルを閉じる（スキャナーは継続）
        const modal = document.getElementById('qrReaderModal');
        if (modal) {
            modal.style.display = 'none';
        }
        
        // QR読み取り成功音を再生
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.playSound) {
            window.webkit.messageHandlers.playSound.postMessage({ type: 'success' });
        }
        
        // 履歴から復元（視覚的フィードバックなしでシンプルに）
        restoreFromManagementId(result);
        
    } catch (error) {
        console.error('❌ QRコード解析エラー:', error);
        alert('❌ QRコード解析に失敗しました\n\nエラー詳細:\n' + error.message + '\n\n再度お試しください。');
        stopQRReader();
    }
}

// 管理番号からコンテンツを復元
async function restoreFromManagementId(managementId) {
    try {
        // 履歴から管理番号で対象アイテムを検索
        const historyList = await getAllHistory();
        
        if (historyList.length === 0) {
            console.error('❌ 履歴データがありません');
            alert('履歴データがありません。\n印刷履歴を確認してください。');
            return;
        }
        
        // 完全一致検索
        const targetItem = historyList.find(item => 
            item.managementId === managementId
        );
        
        if (targetItem) {
            // データの存在確認
            if (!targetItem.data) {
                console.error('❌ 履歴データが不完全:', targetItem);
                alert('履歴データが破損しています。\n管理番号: ' + managementId);
                return;
            }
            
            // 復元実行（静かに処理、ポップアップなし）
            restoreContentFromHistory(targetItem);
            
        } else {
            console.error('❌ 履歴検索失敗 - 管理番号:', managementId);
            console.error('履歴の管理番号一覧:', historyList.map(item => item.managementId).filter(id => id));
            
            // QR読み取りエラー音を再生
            console.log('🔊 エラー音再生要求（履歴検索失敗）');
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.playSound) {
                window.webkit.messageHandlers.playSound.postMessage({ type: 'error' });
                console.log('✅ エラー音メッセージ送信完了');
            } else {
                console.error('❌ playSound messageHandlerが利用できません');
            }
            
            // より詳細なエラー情報
            const tokiItems = historyList.filter(item => 
                item.managementId && item.managementId.startsWith('TOKI')
            );
            
            let errorMessage = `❌ この管理番号のデータは履歴にありません\n\n`;
            errorMessage += `読み取った管理番号: ${managementId}\n`;
            errorMessage += `総履歴件数: ${historyList.length}件\n`;
            errorMessage += `管理番号付き履歴: ${tokiItems.length}件\n`;
            
            if (tokiItems.length > 0) {
                errorMessage += `\n📋 履歴内の管理番号 (最新3件):\n`;
                tokiItems.slice(-3).forEach((item, index) => {
                    errorMessage += `${index + 1}. ${item.managementId} (${item.type})\n`;
                });
            } else {
                errorMessage += `\n⚠️ QRコード付きの印刷履歴がありません`;
            }
            
            alert(errorMessage);
        }
    } catch (error) {
        console.error('❌ 履歴取得エラー:', error);
        alert('❌ 履歴の取得に失敗しました: ' + error.message);
    }
}

// 履歴から完全復元
function restoreContentFromHistory(item) {
    try {
        if (item.type === 'image') {
            showSection('image');
            
            const previewContainer = document.getElementById('imagePreviewContainer');
            previewContainer.innerHTML = '';
            
            const img = new Image();
            img.src = item.data;
            img.onload = function() {
                let containerW = Math.min(window.innerWidth * 0.98, 480);
                let containerH = 360;
            let ratio = Math.min(containerW / img.naturalWidth, containerH / img.naturalHeight, 1);
            let displayW = Math.round(img.naturalWidth * ratio);
            let displayH = Math.round(img.naturalHeight * ratio);
            img.style.width = displayW + "px";
            img.style.height = displayH + "px";
            img.style.maxWidth = "100%";
            img.style.maxHeight = "360px";
            img.style.display = "block";
            img.style.margin = "0 auto";
        };
        previewContainer.appendChild(img);
        
        // 設定を復元
        document.getElementById('dateTimeChoice').style.display = 'flex';
        const chips = document.querySelectorAll('#dateTimeChoice .chip');
        chips.forEach(chip => chip.classList.remove('selected'));
        if (item.dateTime === 'with') chips[0].classList.add('selected');
        else chips[1].classList.add('selected');
        selectedChip = item.dateTime;
        
        // 印刷時刻を復元
        window.restoredDateTime = item.timestamp || item.created;
        console.log('📅 画像履歴復元 - 印刷時刻:', new Date(window.restoredDateTime));
        
        document.getElementById('copiesSelect').value = item.copies;
        
        // QRチェックボックスの復元を段階的に確実に処理
        console.log('=== 画像QR復元開始 ===', 'qrPrinted:', item.qrPrinted);
        
        const restoreQRCheckbox = () => {
            const qrCheckbox = document.getElementById('qrPrintCheckbox');
            console.log('QRチェックボックス要素:', qrCheckbox);
            
            if (qrCheckbox) {
                const qrValue = item.qrPrinted;

                const shouldCheck = qrValue === true || qrValue === 'true' || qrValue === 1 || qrValue === '1';
                console.log('復元判定:', qrValue, '→', shouldCheck);
                
                // 強制的に状態をリセット
                qrCheckbox.checked = false;
                qrCheckbox.removeAttribute('checked');
                
                // DOM更新を強制
                qrCheckbox.offsetHeight; // reflow強制
                
                // 新しい状態を設定
                if (shouldCheck) {
                    qrCheckbox.checked = true;
                    qrCheckbox.setAttribute('checked', 'checked');
                    qrCheckbox.setAttribute('data-restored', 'true');
                } else {
                    qrCheckbox.checked = false;
                    qrCheckbox.removeAttribute('checked');
                    qrCheckbox.removeAttribute('data-restored');
                }
                
                console.log('復元後チェック状態:', qrCheckbox.checked, 'shouldCheck:', shouldCheck);
                
                // changeイベントとclickイベントの両方を発火
                qrCheckbox.dispatchEvent(new Event('change', { bubbles: true }));
                qrCheckbox.dispatchEvent(new Event('input', { bubbles: true }));
                
                // 最終確認（少し時間をおいて）
                setTimeout(() => {
                    console.log('最終チェック状態:', qrCheckbox.checked);

                return qrCheckbox.checked === shouldCheck;

        // 即座に実行してから複数回試行

// === T's券機能 ===
let selectedTicketTemplate = null;

// T's券テンプレートボタンのイベントハンドラー
document.addEventListener('DOMContentLoaded', () => {
    const templateButtons = document.querySelectorAll('.ticket-template-btn');
    const ticketChipWith = document.getElementById('ticketChipWith');
    const ticketChipWithout = document.getElementById('ticketChipWithout');
    const ticketPrintButton = document.getElementById('ticketPrintButton');
    const ticketDateTimeChoice = document.getElementById('ticketDateTimeChoice');
    const ticketPrintOptions = document.getElementById('ticketPrintOptions');
    
    // テンプレートボタンのクリックイベント
    templateButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            // 操作音を再生
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.playSound) {
                window.webkit.messageHandlers.playSound.postMessage({});
            }
            
            // 選択状態を更新
            templateButtons.forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedTicketTemplate = btn.dataset.template;
            
            // 日付・時刻選択を表示
            ticketDateTimeChoice.style.display = 'flex';
            
            // チップが選択されている場合は印刷オプションを表示
            if (ticketChipWith.classList.contains('selected') || ticketChipWithout.classList.contains('selected')) {
                ticketPrintOptions.style.display = 'flex';
                updateTicketPrintButtonState();
            }
        });
    });
    
    // 日付・時刻ありチップ
    if (ticketChipWith) {
        ticketChipWith.addEventListener('click', () => {
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.playSound) {
                window.webkit.messageHandlers.playSound.postMessage({});
            }
            ticketChipWith.classList.add('selected');
            ticketChipWithout.classList.remove('selected');
            ticketPrintOptions.style.display = 'flex';
            updateTicketPrintButtonState();
        });
    }
    
    // 日付・時刻なしチップ
    if (ticketChipWithout) {
        ticketChipWithout.addEventListener('click', () => {
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.playSound) {
                window.webkit.messageHandlers.playSound.postMessage({});
            }
            ticketChipWithout.classList.add('selected');
            ticketChipWith.classList.remove('selected');
            ticketPrintOptions.style.display = 'flex';
            updateTicketPrintButtonState();
        });
    }
    
    // 印刷ボタン
    if (ticketPrintButton) {
        ticketPrintButton.addEventListener('click', preventDoubleTouch(() => {
            if (!ticketPrintButton.classList.contains('disabled')) {
                executeTicketPrint();
            }
        }));
    }
});

function updateTicketPrintButtonState() {
    const ticketPrintButton = document.getElementById('ticketPrintButton');
    const ticketChipWith = document.getElementById('ticketChipWith');
    const ticketChipWithout = document.getElementById('ticketChipWithout');
    
    if (ticketPrintButton && selectedTicketTemplate && 
        (ticketChipWith.classList.contains('selected') || ticketChipWithout.classList.contains('selected'))) {
        ticketPrintButton.classList.remove('disabled');
    } else if (ticketPrintButton) {
        ticketPrintButton.classList.add('disabled');
    }
}

// STAMP用画像データを生成（見本画像1,2,3,4.pngに準拠）
// ★★★ TM-P20・20II専用 STAMP印刷（203dpi、10cm = 約799px）
async function generateStampImageDataTMP20(type, dateStr) {
    return new Promise((resolve, reject) => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        
        // TM-P20・20II設定（203dpi）
        const widthMM = 48;
        const heightMM = 150; // 15cm（枠+QR+日付に対応）
        const dpi = 203;
        const mmToPx = dpi / 25.4;
        const widthPx = Math.floor(widthMM * mmToPx);    // 約383px
        const heightPx = Math.floor(heightMM * mmToPx);  // 約1199px（15cm）
        
        canvas.width = widthPx;
        canvas.height = heightPx;
        
        // 白背景
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // ★★★ 見本通り：破線枠の設定（枠ありの場合のみ）
        const topMargin = 25;
        const sideMargin = 18;
        const frameX = sideMargin;
        const frameY = topMargin;
        const frameWidth = canvas.width - (sideMargin * 2);
        const frameHeight = 903; // さらに5cm下に拡大（510 + 393）
        
        // 枠あり・なしの判定（_frame で終わるかどうか）
        const hasFrame = type.endsWith('_frame');
        const isMemo = type.includes('memo');
        
        if (hasFrame) {
            // 破線枠描画
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([6, 3]);
            ctx.strokeRect(frameX, frameY, frameWidth, frameHeight);
            ctx.setLineDash([]);
        }
        
        // ★★★ 枠内テキスト（修正版）
        ctx.fillStyle = '#000000';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        
        if (isMemo) {
            // メモ用紙の場合は「メモ(MEMO)」のみ（枠あり・なし両方）
            ctx.font = buildCanvasFont(28, { weight: 'bold' });
            ctx.fillText('メモ(MEMO)', canvas.width / 2, frameY + 9);
        } else {
            // STAMP用紙の場合（枠あり・なし両方）
            // "STAMP" タイトル（2mm上に = 約16px上）
            ctx.font = buildCanvasFont(28, { weight: 'bold' });
            ctx.fillText('STAMP', canvas.width / 2, frameY + 9);
            
            // サブタイトル1: チケッター・スタンパー（STAMPのすぐ下）
            ctx.font = buildCanvasFont(15);
            ctx.fillText('チケッター・スタンパー', canvas.width / 2, frameY + 45);
            
            // サブタイトル2: 入鋏印・無効印・下車印
            ctx.fillText('入鋏印・無効印・下車印', canvas.width / 2, frameY + 66);
            
            // サブタイトル3: その他(スタンプカード用スタンプ)
            ctx.font = buildCanvasFont(13);
            ctx.fillText('その他(スタンプカード用スタンプ)', canvas.width / 2, frameY + 87);
            
            // サブタイトル4: 収集用紙
            ctx.font = buildCanvasFont(16);
            ctx.fillText('収集用紙', canvas.width / 2, frameY + 110);
        }
        
        // ★★★ フッター（枠の外、もっと大きく）
        ctx.font = buildCanvasFont(20, { weight: 'bold' });
        ctx.fillText('toki01Ⓣ TPOS T-0001', canvas.width / 2, frameY + frameHeight + 18);
        
        // ★★★ 画像印刷と同じロジック：QRコード生成
        const printTimestamp = Date.now();
        const qrData = `STAMP-${type}-${printTimestamp}`;
        let qrCodeCanvas = null;
        let qrCodePosition = null;
        
        try {
            qrCodeCanvas = generateQRCode(qrData);
            if (qrCodeCanvas) {
                const qrSize = 110; // STAMP用に小さく
                const qrX = 18; // 左側に配置
                const qrY = frameY + frameHeight + 50;
                qrCodePosition = { x: qrX, y: qrY, size: qrSize };
            }
        } catch (error) {
            console.warn('QRコード生成エラー:', error);
        }
        
        // ★★★ 画像印刷と同じロジック：QRコード描画（白背景保護）
        if (qrCodeCanvas && qrCodePosition) {
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(
                qrCodePosition.x - 5,
                qrCodePosition.y - 5,
                qrCodePosition.size + 10,
                qrCodePosition.size + 10
            );
            ctx.drawImage(qrCodeCanvas, qrCodePosition.x, qrCodePosition.y, qrCodePosition.size, qrCodePosition.size);
        }
        
        // ★★★ 画像印刷と同じロジック：日付・時刻描画
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        const day = now.getDate();
        const hour = now.getHours();
        const minute = now.getMinutes();
        const second = now.getSeconds();
        
        const fontSize = 32; // STAMP用に小さく
        ctx.fillStyle = '#000000';
        ctx.font = buildCanvasFont(fontSize);
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        
        // QRコードの右側に配置（左寄せ）
        const dateTimeX = qrCodePosition ? qrCodePosition.x + qrCodePosition.size + 15 : canvas.width / 2;
        let yPos = qrCodePosition ? qrCodePosition.y + 10 : frameY + frameHeight + 70;
        
        // 日付行
        const dateText = `${year}年${month}月${day}日`;
        ctx.fillText(dateText, dateTimeX, yPos);
        yPos += fontSize * 1.2;
        
        // 時刻行
        const timeText = `${hour}時${minute}分${second}秒`;
        ctx.fillText(timeText, dateTimeX, yPos);
        
        console.log('✅ [TM-P20] STAMP Canvas生成: 幅=' + widthPx + 'px, 高さ=' + heightPx + 'px (15cm)、枠=' + frameHeight + 'px');
        
        if (isSmS210iFamilyPrinter()) {
            enhanceCanvasForThermalPrint(canvas, {
                contrast: 1.1,
                gamma: 0.95,
                threshold: 182,
                ditherAlgorithm: 'floyd'
            });
        }
        
        // Base64データとして返す
        try {
            const imageData = canvas.toDataURL('image/png').split(',')[1];
            resolve(imageData);
        } catch (error) {
            reject(error);
        }
    });
}

        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 枠設定（topMarginとframeHeightは上で定義済み）
        const sideMargin = 18;
        const frameX = sideMargin;
        const frameY = topMargin;
        const frameWidth = canvas.width - (sideMargin * 2);
        
        // 枠あり・なしの判定（_frame で終わるかどうか）
        const hasFrame = type.endsWith('_frame');
        const isMemo = type.includes('memo');
        
        if (hasFrame) {
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([6, 3]);
            ctx.strokeRect(frameX, frameY, frameWidth, frameHeight);
            ctx.setLineDash([]);
        }
        
        // テキスト描画
        ctx.fillStyle = '#000000';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        
        const fontScale = printerType === 'MP-B20' ? 0.97 : 1.0;
        
        if (isMemo) {
            // メモ用紙の場合は「メモ(MEMO)」のみ（枠あり・なし両方）
            ctx.font = buildCanvasFont(Math.floor(28 * fontScale), { weight: 'bold' });
            ctx.fillText('メモ(MEMO)', canvas.width / 2, frameY + 9);
        } else {
            // STAMP用紙の場合（枠あり・なし両方）
            ctx.font = buildCanvasFont(Math.floor(28 * fontScale), { weight: 'bold' });
            ctx.fillText('STAMP', canvas.width / 2, frameY + 9);
            
            ctx.font = buildCanvasFont(Math.floor(15 * fontScale));
            ctx.fillText('チケッター・スタンパー', canvas.width / 2, frameY + 45);
            ctx.fillText('入鋏印・無効印・下車印', canvas.width / 2, frameY + 66);
            
            ctx.font = buildCanvasFont(Math.floor(13 * fontScale));
            ctx.fillText('その他(スタンプカード用スタンプ)', canvas.width / 2, frameY + 87);
            
            ctx.font = buildCanvasFont(Math.floor(16 * fontScale));
            ctx.fillText('収集用紙', canvas.width / 2, frameY + 110);
        }
        
        ctx.font = buildCanvasFont(Math.floor(20 * fontScale), { weight: 'bold' });
        ctx.fillText('toki01Ⓣ TPOS T-0001', canvas.width / 2, frameY + frameHeight + 18);
        
        console.log('✅ [STAMP履歴用] Canvas生成: 幅=' + widthPx + 'px, 高さ=' + heightPx + 'px (QR・日付なし)');
        
        try {
            const imageData = canvas.toDataURL('image/png').split(',')[1];
            resolve(imageData);
        } catch (error) {
            reject(error);
        }
    });
}

// STAMP選択画面 → プレビュー画面に遷移
function showStampPreview(title) {
    const selectScreen = document.querySelector('.stamp-select-screen');
    const previewScreen = document.querySelector('.stamp-preview-screen');
    const previewFrame = document.getElementById('stampPreviewFrame');
    const previewHeader = document.querySelector('.stamp-preview-header');
    const previewFooter = document.querySelector('.stamp-preview-footer');
    
    console.log('showStampPreview called:', { selectScreen: !!selectScreen, previewScreen: !!previewScreen, previewFrame: !!previewFrame });
    
    if (selectScreen && previewScreen && previewFrame) {
        selectScreen.style.display = 'none';
        previewScreen.style.display = 'flex';
        
        // ヘッダーとフッターを非表示（画像内に含まれているため）
        if (previewHeader) previewHeader.style.display = 'none';
        if (previewFooter) previewFooter.style.display = 'none';
        
        // プレビューフレームをクリア
        previewFrame.innerHTML = '<div style="text-align:center; padding:2rem; color:#999;">プレビュー生成中...</div>';
        
        // 選択されたタイプに応じた画像を生成して表示
        const type = selectedStampPrintType;
        if (type) {
            generateStampImageDataForHistory(type).then(imageData => {
                previewFrame.innerHTML = '';
                const img = new Image();
                img.src = 'data:image/png;base64,' + imageData;
                img.onload = function() {
                    // 画像を大きく表示（余白を2mm程度に）
                    let containerW = window.innerWidth * 0.995;
                    let containerH = window.innerHeight * 0.75;
                    let ratio = Math.min(containerW / img.naturalWidth, containerH / img.naturalHeight, 1);
                    let displayW = Math.round(img.naturalWidth * ratio);
                    let displayH = Math.round(img.naturalHeight * ratio);
                    img.style.width = displayW + "px";
                    img.style.height = displayH + "px";
                    img.style.maxWidth = "100%";
                    img.style.display = "block";
                    img.style.margin = "0";
                };
                previewFrame.appendChild(img);
                console.log(`📄 プレビュー表示完了: ${title}`);
            }).catch(err => {
                console.error('プレビュー生成エラー:', err);
                previewFrame.innerHTML = '<div style="text-align:center; padding:2rem; color:#f44;">プレビュー生成エラー</div>';
            });
        } else {
            console.error('selectedStampPrintType が未設定です');
        }
    } else {
        console.error('Elements not found for showStampPreview');
    }
}

// プレビュー画面 → 選択画面に戻る
function hideStampPreview() {
    const selectScreen = document.querySelector('.stamp-select-screen');
    const previewScreen = document.querySelector('.stamp-preview-screen');
    const previewHeader = document.querySelector('.stamp-preview-header');
    const previewFooter = document.querySelector('.stamp-preview-footer');
    
    if (selectScreen && previewScreen) {
        previewScreen.style.display = 'none';
        selectScreen.style.display = 'grid';
        
        // ヘッダーとフッターを再表示
        if (previewHeader) previewHeader.style.display = '';
        if (previewFooter) previewFooter.style.display = '';
        
        console.log('📋 選択画面に戻りました');
    }
}

// STAMP印刷実行
function executeStampPrint(type) {
    // ダブルプリント防止：既に印刷中の場合は処理中止
    if (isStampPrinting) {
        console.warn('⚠️ 既に印刷処理中です。二重実行を防止しました');
        return;
    }
    
    // 印刷フラグをON
    isStampPrinting = true;
    
    // 発行ボタンを無効化
    const stampExecuteBtn = document.getElementById('stampExecuteBtn');
    if (stampExecuteBtn) {
        stampExecuteBtn.disabled = true;
        stampExecuteBtn.style.opacity = '0.5';
        stampExecuteBtn.style.cursor = 'not-allowed';
        console.log('🔒 発行ボタンを無効化しました');
    }
    
    // 自動的にQRコードと日付を付与して印刷
    const now = new Date();
    const dateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
    
    const printData = {
        type: type.startsWith('memo') ? 'memo' : 'stamp',
        paperType: type,
        includeQR: true,
        includeDateTime: true,
        dateTime: dateStr
    };
    
    console.log('📄 印刷実行:', printData);
    
    // STAMP用の画像データを生成
    generateStampImageData(type, dateStr).then(imageData => {
        console.log('✅ STAMP画像生成完了: ' + imageData.length + '文字');
        
        // ★★★ 履歴用に別途QR・日付なし画像を生成
        generateStampImageDataForHistory(type).then(historyImageData => {
            console.log('✅ STAMP履歴用画像生成完了');
            
            // ★★★ 履歴にSTAMP収集モードとして保存
            const printTimestamp = Date.now();
            const qrData = `STAMP-${type}-${printTimestamp}`;
            const historyItem = {
                type: 'stamp',  // STAMP収集モード
                mode: 'stamp',
                data: 'data:image/png;base64,' + historyImageData,  // QR・日付なし画像
                dateTime: '日付・時刻なし',
                copies: 1,
                created: printTimestamp,
                timestamp: printTimestamp,
                paperType: type,
                qrPrinted: false,  // QRなし
                managementId: qrData  // QRコードデータを管理番号として保存
            };
            
            addHistory(historyItem).then(() => {
                console.log('✅ STAMP印刷履歴保存完了 (モード: STAMP収集):', historyItem.managementId);
            }).catch(error => {
                console.error('❌ STAMP印刷履歴保存失敗:', error);
            });
        }).catch(error => {
            console.error('❌ STAMP履歴用画像生成エラー:', error);
        });
        
        // ★★★ プリンター種類判定：SM-S210i（旧TM-P20/TM-P20II）の場合はTM Print Assistant使用
        const printerType = window.g_currentPrinterType || '';
        const useTMPrintAssistant = printerType.includes('SM-S210i') || printerType.includes('TM-P20');
        
        if (useTMPrintAssistant) {
            console.log('📱 TM Print Assistant経由で印刷します (プリンター: ' + printerType + ')');
            
            // Base64画像データをePOS-Print XML形式に変換
            const eposPrintXML = generateEposPrintXML(imageData, type);
            console.log('📄 ePOS-Print XML生成完了: ' + eposPrintXML.length + '文字');
            
            // TM Print Assistantを起動
            callTMPrintAssistant(eposPrintXML);
            
            // 印刷完了待機（5秒でタイムアウト）→選択画面に戻る
            setTimeout(() => {
                hideStampPreview();
                selectedStampPrintType = null;
                resetStampPrintingState();
                console.log('✅ STAMP印刷完了 - 発行ボタンを再度有効化');
            }, 5000);
            
        } else if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.printStamp) {
            // ★★★ Swift側のprintStampメソッドを呼び出す（辞書形式）
            const stampRequest = {
                type: type.startsWith('memo') ? 'memo' : 'stamp',
                imageData: 'data:image/png;base64,' + imageData,
                copies: 1
            };
            console.log('📤 SwiftにSTAMP印刷データ送信:', stampRequest);
            window.webkit.messageHandlers.printStamp.postMessage(stampRequest);
            
            // 印刷完了待機（5秒でタイムアウト）→選択画面に戻る
            setTimeout(() => {
                hideStampPreview();
                selectedStampPrintType = null;
                resetStampPrintingState();
                console.log('✅ STAMP印刷完了 - 発行ボタンを再度有効化');
            }, 5000);
        } else {
            console.log('WebKit通信不可 - デモ実行');
            alert(`印刷: ${type}\n日時: ${dateStr}\nQRコード: 自動付与`);
            // デモ時も状態をリセット
            resetStampPrintingState();
        }
    }).catch(error => {
        console.error('❌ STAMP画像生成エラー:', error);
        alert('画像生成に失敗しました');
        resetStampPrintingState();
    });
}

// STAMP印刷状態をリセット

    isStampPrinting = false;
    const stampExecuteBtn = document.getElementById('stampExecuteBtn');
    if (stampExecuteBtn) {

        stampExecuteBtn.style.opacity = '1';
        stampExecuteBtn.style.cursor = 'pointer';
        console.log('🔓 発行ボタンを再度有効化しました');
    }
}

// ================================================================================
// TM Print Assistant 統合機能
// ================================================================================

/**
 * Base64画像データをePOS-Print XML形式に変換
 * @param {string} base64ImageData - Base64エンコードされた画像データ（data:image/png;base64,なしのデータ部分のみ）
 * @param {string} paperType - 用紙タイプ (stamp_frame, stamp_noframe, memo_frame, memo_noframe)
 * @returns {string} - ePOS-Print XML文字列
 */
function generateEposPrintXML(base64ImageData, paperTypeOrOptions) {
    // 画像サイズは48mm幅を基準（TM-P20/TM-P20IIの印字領域幅）
    let widthMM = 48;
    let dpi = 203; // TM-P20/TM-P20IIの解像度
    let feedLines = 3;
    if (paperTypeOrOptions && typeof paperTypeOrOptions === 'object') {
        if (paperTypeOrOptions.widthMM) {
            widthMM = paperTypeOrOptions.widthMM;
        }
        if (paperTypeOrOptions.dpi) {
            dpi = paperTypeOrOptions.dpi;
        }
        if (typeof paperTypeOrOptions.feedLines === 'number') {
            feedLines = paperTypeOrOptions.feedLines;
        }
    }
    const mmToPx = dpi / 25.4;
    const widthPx = Math.floor(widthMM * mmToPx);
    
    // 高さは画像データから自動算出される（ePOS SDKが自動調整）
    // color="color_1" は白黒指定、mode="mono" はモノクロモード
    
    const xml = 
        '<epos-print xmlns="http://www.epson-pos.com/schemas/2011/03/epos-print">\n' +
        '  <image width="' + widthPx + '" color="color_1" mode="mono">' + base64ImageData + '</image>\n' +
        '  <feed line="' + feedLines + '"/>\n' +
        '  <cut type="feed"/>\n' +
        '</epos-print>';
    
    return xml;
}

/**
 * TM Print AssistantアプリをURLスキーム経由で呼び出し
 * @param {string} eposPrintXML - ePOS-Print XML形式の印刷データ
 */
function resolveTMPrintAssistantCallbackUrl() {
    const fallbackCallback = 'toki01ts://print-result';
    const callbackUrl = resolvePrintCallbackUrl(window.location.href);

    try {
        const parsed = new URL(callbackUrl, window.location.href);
        const allowedProtocols = ['toki01ts:', 'com.toki01ts.callback:', 'http:', 'https:'];
        if (allowedProtocols.indexOf(parsed.protocol) !== -1) {
            return parsed.href;
        }
    } catch (error) {
        console.warn('⚠️ TM callback URL解析失敗:', error);
    }

    return fallbackCallback;
}

function callTMPrintAssistant(eposPrintXML) {
    // URLスキームのパラメータ
    const appscheme = 'tmprintassistant://';
    const host = 'tmprintassistant.epson.com/';
    const action = 'print?';
    
    // 戻り先URL（不正スキーム回避）
    const callbackUrl = resolveTMPrintAssistantCallbackUrl();
    
    // パラメータ設定
    const params = {
        'success': callbackUrl,        // 成功時の戻り先URL
        'error': callbackUrl,          // エラー時の戻り先URL
        'ver': '1',                    // バージョン（固定値）
        'data-type': 'eposprintxml',   // データ形式: eposprintxml または pdf
        'data': eposPrintXML,          // 印刷データ（XMLまたはBase64 PDF）
        'reselect': 'yes',             // 通信エラー時にプリンター再設定を促す
        'cut': 'feed',                 // カット設定: feed（フィード後カット）
        'paper-width': '58'            // 用紙幅（mm）TM-P20は58mm
    };
    
    // URLエンコード
    const queryString = Object.keys(params)
        .map(key => key + '=' + encodeURIComponent(params[key]))
        .join('&');
    
    const urlData = appscheme + host + action + queryString;
    
    console.log('🚀 TM Print Assistant起動:');
    console.log('   URL: ' + urlData.substring(0, 150) + '...');
    console.log('   Data type: eposprintxml');
    console.log('   Paper width: 58mm');
    
    // URLスキームでTM Print Assistantを起動
    location.href = urlData;
}

/**
 * TM Print Assistantからのエラーコールバック処理
 * URL例: toki01ts://callback?code=XXX&message=YYY
 */
function handleTMPrintAssistantCallback() {
    const urlParams = new URLSearchParams(window.location.search);
    const errorCode = urlParams.get('code');
    const errorMessage = urlParams.get('message');
    
    if (errorCode && errorMessage) {
        const alertMsg = 
            'TM Print Assistant エラー\n\n' +
            'エラーコード: ' + decodeURIComponent(errorCode) + '\n' +
            'エラーメッセージ: ' + decodeURIComponent(errorMessage);
        
        console.error('❌ TM Print Assistant エラー:', alertMsg);
        alert(alertMsg);
        
        // エラー後は印刷状態をリセット
        if (typeof resetStampPrintingState === 'function') {
            resetStampPrintingState();
        }
    }
}

// ページ読み込み時にエラーコールバックをチェック
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', handleTMPrintAssistantCallback);
} else {
    handleTMPrintAssistantCallback();
}
